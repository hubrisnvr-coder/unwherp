<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 170 - Salary Pay Manager Staff List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 11px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header & Settings Gear */
        .page-header-main { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .settings-gear { 
            position: absolute; right: 15px; top: 6px; color: #f0ad4e; font-size: 18px; cursor: pointer; 
            border: 1px solid #f0ad4e; border-radius: 4px; padding: 2px 6px; background: #fff8ee; 
        }

        /* Top Navigation Buttons */
        .nav-container { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        .erp-btn {
            display: inline-block; margin: 2px; font-size: 11px; padding: 5px 12px; border-radius: 4px;
            color: #ffffff !important; border: none; cursor: pointer; text-decoration: none !important; font-weight: 500;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }
        .bg-orange { background-color: #f0ad4e; }
        .bg-light-blue { background-color: #5bc0de; }

        /* Filter Section Styling */
        .filter-wrapper { margin: 15px; border: 1px solid #c8d9e2; border-radius: 4px; overflow: hidden; background: #fff; }
        .filter-header { 
            background: #fff; padding: 8px; text-align: center; color: #337ab7; 
            cursor: pointer; font-weight: bold; border-bottom: 1px solid #eee; font-size: 12px;
        }
        .filter-content { display: block; padding: 20px; background: #f9f9f9; }
        
        /* Input Box Grouping */
        .label-box { 
            background: #eee; border: 1px solid #ddd; padding: 6px; font-weight: bold; 
            text-align: right; display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase; height: 32px;
        }
        .input-box { border-radius: 0; border: 1px solid #ddd; height: 32px; font-size: 11px; width: 100%; }
        .input-box:focus { border-color: #66afea; outline: 0; box-shadow: none; }

        /* Table Styling */
        .table-title { color: #337ab7; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .table-container { background: #fff; margin: 0 15px; border: 1px solid #ddd; border-top: 2px solid #337ab7; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 10px; text-align: center; font-size: 11px; text-transform: uppercase;
        }
        .erp-table tbody td { border: 1px solid #eee; padding: 8px; text-align: center; color: #666; }
        
        /* Required red line in header as per ERP style */
        .header-divider { border-bottom: 2px solid red !important; }

        .btn-filter-submit { background-color: #337ab7; color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; }
        .btn-filter-submit:hover { background-color: #286090; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7;">Salary Pay Manager</strong> <span style="color:#999;">» Staff List</span>
    <div class="settings-gear" onclick="logAction('Settings Icon Clicked')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="logAction('Student Fee Module')"><i class="fa fa-users"></i> Student Fee</button>
    <button class="erp-btn bg-green" onclick="logAction('Staff Payroll Module')"><i class="fa fa-user-tie"></i> Staff Payroll</button>
    <button class="erp-btn bg-blue" onclick="logAction('Ledger Module')"><i class="fa fa-book"></i> Ledger</button>
    <button class="erp-btn bg-blue" onclick="logAction('Transactions Module')"><i class="fa fa-exchange-alt"></i> Transactions</button>
    <button class="erp-btn bg-blue" onclick="logAction('Bank Module')"><i class="fa fa-university"></i> Bank</button>
</div>

<div class="nav-container" style="background:#f9f9f9; padding: 5px;">
    <button class="erp-btn bg-blue" onclick="logAction('Pay History Tab')"><i class="fa fa-history"></i> Pay History</button>
    <button class="erp-btn bg-blue" onclick="logAction('Payroll Detail Tab')"><i class="fa fa-list"></i> Payroll Detail</button>
    <button class="erp-btn bg-blue" onclick="logAction('Add Payroll Tab')"><i class="fa fa-plus"></i> Add Payroll</button>
    <button class="erp-btn bg-green" onclick="logAction('Pay Salary Tab')"><i class="fa fa-money-bill-wave"></i> Pay Salary</button>
    <button class="erp-btn bg-orange" onclick="logAction('Balance Salary Tab')"><i class="fa fa-wallet"></i> Balance Salary</button>
    <button class="erp-btn bg-blue" onclick="logAction('Payroll Head Tab')"><i class="fa fa-heading"></i> Payroll Head</button>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down ms-2" id="filterIcon"></i> Filter Staffs <i class="fa fa-filter ms-2"></i>
    </div>
    <div class="filter-content" id="filterBox">
        <form id="staffFilterForm" method="GET" action="">
            <div class="row g-0 align-items-center">
                <div class="col-md-1 label-box">REG.NO.</div>
                <div class="col-md-2">
                    <input type="text" name="reg_no" class="form-control input-box" placeholder="Registration No.">
                </div>
                
                <div class="col-md-1 label-box">JOIN DATE</div>
                <div class="col-md-3 d-flex">
                    <input type="text" name="join_from" class="form-control input-box" placeholder="YYYY-MM-DD">
                    <span class="label-box" style="width:40px; justify-content:center;"><i class="fa fa-exchange-alt"></i></span>
                    <input type="text" name="join_to" class="form-control input-box" placeholder="YYYY-MM-DD">
                </div>

                <div class="col-md-1 label-box">DESIGNATION</div>
                <div class="col-md-2">
                    <select name="designation" class="form-select input-box">
                        <option value="">Select Designation</option>
                        <option value="teacher">Teacher</option>
                        <option value="clerk">Clerk</option>
                    </select>
                </div>

                <div class="col-md-1 label-box">STATUS</div>
                <div class="col-md-1">
                    <select name="status" class="form-select input-box">
                        <option value="">Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">In-Active</option>
                    </select>
                </div>
            </div>
            
            <div class="text-end mt-3">
                <button type="submit" class="btn-filter-submit" onclick="logAction('Filter Submit Clicked')">
                    <i class="fa fa-filter"></i> Filter
                </button>
            </div>
        </form>
    </div>
</div>

<div class="table-title">
    <i class="fa fa-list"></i> Staffs List
</div>

<div class="table-container">
    <div class="table-responsive">
        <table class="erp-table">
            <thead>
                <tr class="header-divider">
                    <th width="60px">S.N.</th>
                    <th>REG. NUM.</th>
                    <th>NAME</th>
                    <th>DESIGNATION</th>
                    <th>QUALIFICATION</th>
                    <th>CONTACT NUM.</th>
                    <th width="80px"></th>
                </tr>
            </thead>
            <tbody id="staffTableBody">
                <tr>
                    <td colspan="7" style="text-align: left; padding: 12px; color: #888; font-style: italic;">
                        No Staffs data found. Please Filter Staffs to show.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Console Action Logger
    function logAction(msg) {
        console.log("%c [ERP-170 LOG]: " + msg, "color: #fff; background: #337ab7; padding: 3px 10px; border-radius: 4px; font-weight: bold;");
    }

    // 2. Filter Hide/Show Toggle
    function toggleFilter() {
        const box = document.getElementById('filterBox');
        const icon = document.getElementById('filterIcon');
        
        if (box.style.display === "none") {
            box.style.display = "block";
            icon.className = "fa fa-chevron-down ms-2";
            logAction("Filter Section Displayed");
        } else {
            box.style.display = "none";
            icon.className = "fa fa-chevron-up ms-2";
            logAction("Filter Section Hidden");
        }
    }

    // 3. Form Submit Handling
    document.getElementById('staffFilterForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        let params = {};
        formData.forEach((value, key) => { params[key] = value; });
        
        console.table(params); // Showing filter data in console
        logAction("Data Filtered with values shown above.");
    });

    // Page Load Message
    window.onload = function() {
        console.log("Salary Pay Manager (ERP-170) Page Loaded Successfully.");
    };
</script>

</body>
</html>
