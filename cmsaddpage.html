<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Navbar Styling */
        .breadcrumb-container {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .home-link { text-decoration: none; color: #337ab7; font-size: 14px; }
        .settings-btn { background: #f0ad4e; color: white; padding: 5px 10px; border-radius: 4px; border: none; }

        /* Header */
        .page-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; }
        .page-title span { color: #999; font-weight: normal; }

        /* Form Styling */
        .form-section { background: #fff; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .form-row { display: flex; border-bottom: 1px solid #eee; align-items: center; }
        .form-label-side { 
            background-color: #f1f3f4; 
            width: 200px; 
            padding: 12px 15px; 
            font-weight: bold; 
            font-size: 12px; 
            color: #555; 
            text-transform: uppercase;
            text-align: right;
            border-right: 1px solid #ddd;
        }
        .form-input-side { flex: 1; padding: 8px 15px; }
        .form-control, .form-select { border-radius: 0; font-size: 14px; border-color: #ccc; }
        
        /* WYSIWYG Editor Mockup */
        .editor-toolbar { background: #337ab7; padding: 5px; display: flex; gap: 5px; flex-wrap: wrap; }
        .editor-toolbar .btn { padding: 2px 8px; font-size: 12px; color: white; border: 1px solid rgba(255,255,255,0.3); }
        .editor-area { border: 1px solid #ddd; min-height: 200px; padding: 10px; }

        /* Footer Buttons */
        .form-footer { background: #f1f3f4; padding: 15px; text-align: center; border-top: 1px solid #ddd; }
        .btn-submit { background: #337ab7; color: white; border: none; padding: 6px 20px; border-radius: 3px; }
        .btn-reset { background: #999; color: white; border: none; padding: 6px 20px; border-radius: 3px; margin-right: 10px; }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row { flex-direction: column; align-items: flex-start; }
            .form-label-side { width: 100%; text-align: left; border-right: none; border-bottom: 1px solid #ddd; }
        }
    </style>
</head>
<body>

    <div class="breadcrumb-container">
        <div>
            <a href="index.html" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"><i class="fa fa-angle-right mx-1"></i> Page</span>
        </div>
        <button class="settings-btn"><i class="fa fa-cog"></i></button>
    </div>

    <div class="container-fluid mt-3">
        <div class="page-title">Page Manager <span>» Add form</span></div>
        
        <div class="text-center mb-3">
            <a href="page-list.html" class="btn btn-sm btn-primary" style="background-color: #337ab7;">
                <i class="fa fa-list"></i> All Page
            </a>
        </div>

        <form class="form-section shadow-sm mb-5">
            
            <div class="form-row">
                <div class="form-label-side">Choose Parent</div>
                <div class="form-input-side">
                    <select class="form-select">
                        <option>Is Parent</option>
                        <option>About Us</option>
                        <option>Contact Us</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">Title</div>
                <div class="form-input-side">
                    <input type="text" class="form-control" placeholder="Enter Page Title">
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">Short Description</div>
                <div class="form-input-side">
                    <input type="text" class="form-control" placeholder="Short Description">
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">Page Type</div>
                <div class="form-input-side">
                    <select class="form-select">
                        <option>Content Page</option>
                        <option>Link Page</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">Page Banner</div>
                <div class="form-input-side">
                    <input type="file" class="form-control mb-1">
                    <small class="text-primary"><i class="fa fa-question-circle"></i> Recommended Image Size: 870px X 439px (72dpi)</small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">Description</div>
                <div class="form-input-side">
                    <div class="editor-toolbar">
                        <button type="button" class="btn"><i class="fa fa-bold"></i></button>
                        <button type="button" class="btn"><i class="fa fa-italic"></i></button>
                        <button type="button" class="btn"><i class="fa fa-underline"></i></button>
                        <button type="button" class="btn"><i class="fa fa-align-left"></i></button>
                        <button type="button" class="btn"><i class="fa fa-link"></i></button>
                        <button type="button" class="btn"><i class="fa fa-image"></i></button>
                        <button type="button" class="btn"><i class="fa fa-code"></i></button>
                    </div>
                    <textarea class="form-control" rows="8"></textarea>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">SEO Title</div>
                <div class="form-input-side">
                    <input type="text" class="form-control" placeholder="SEO Title">
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">SEO Keyword</div>
                <div class="form-input-side">
                    <input type="text" class="form-control" placeholder="SEO Keywords">
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">SEO Description</div>
                <div class="form-input-side">
                    <textarea class="form-control" rows="3"></textarea>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label-side">Status</div>
                <div class="form-input-side">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="active" checked>
                        <label class="form-check-label" for="active">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="inactive">
                        <label class="form-check-label" for="inactive">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <button type="reset" class="btn-reset"><i class="fa fa-undo"></i> Reset</button>
                <button type="submit" class="btn-submit"><i class="fa fa-save"></i> Submit</button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
