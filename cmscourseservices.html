<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course/Services Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation Header */
        .erp-top-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-breadcrumb { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .cog-settings-btn { background: #f0ad4e; color: white; border: none; padding: 5px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title */
        .main-page-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; margin-bottom: 0; }
        .main-page-title span { color: #999; font-weight: normal; font-size: 15px; }

        /* Button Groups (All Anchor Tags) */
        .btn-container-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .erp-a-btn { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .erp-btn-blue { background-color: #337ab7; }
        .erp-btn-dark-blue { background-color: #286090; }
        .erp-btn-orange { background-color: #f0ad4e; }
        .erp-btn-red { background-color: #d9534f; }
        .erp-a-btn:hover { opacity: 0.8; }

        /* Filter Box Section */
        .filter-strip-bar { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold;
        }

        /* Table UI - Matching erp24.png */
        .table-outer-wrapper { padding: 0 5px; }
        .erp-data-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .erp-data-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Required Red Line */
            font-size: 13px; text-transform: uppercase;
        }
        .erp-data-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .empty-row-text { color: #333; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div class="erp-top-nav">
        <div>
            <a href="#" class="nav-breadcrumb"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Slider</span>
        </div>
        <a href="#" class="cog-settings-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-3">
        <h2 class="main-page-title">Course/Services Manager <span>» List</span></h2>
        
        <div class="btn-container-row mt-3">
            <a href="#" class="erp-a-btn erp-btn-blue"><i class="fa fa-list"></i> All Course/Services</a>
            <a href="cmsaddnewcourse.html" class="erp-a-btn erp-btn-dark-blue"><i class="fa fa-plus"></i> Add Course/Services</a>
        </div>

        <a href="javascript:void(0);" class="filter-strip-bar shadow-sm" onclick="alert('Filter Course/Services menu opened!')">
            <i class="fa fa-angle-double-right"></i> Filter Course/Services <i class="fa fa-filter"></i>
        </a>

        <div class="btn-container-row">
            <a href="#" class="erp-a-btn erp-btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-a-btn erp-btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-a-btn erp-btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-outer-wrapper">
            <table class="erp-data-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="checkAllItems"></th>
                        <th style="width: 40%;">TITLE</th>
                        <th>RANK</th>
                        <th>STATUS</th>
                        <th style="width: 50px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="empty-row-text">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox Select All Logic
        document.getElementById('checkAllItems').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(chk => chk.checked = this.checked);
        }
    </script>

</body>
</html>
