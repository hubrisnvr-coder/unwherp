<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faq Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Breadcrumb Bar */
        .erp-top-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .breadcrumb-link { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .settings-btn { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title Styling */
        .page-main-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; margin-bottom: 0; }
        .page-main-title span { color: #999; font-weight: normal; font-size: 15px; }

        /* Anchor Buttons Design */
        .action-flex-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .erp-btn-anchor { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; 
        }
        .color-primary { background-color: #337ab7; }
        .color-success { background-color: #286090; }
        .color-warning { background-color: #f0ad4e; }
        .color-danger { background-color: #d9534f; }

        /* Filter Section Strip */
        .filter-clickable-strip { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #d9534f; font-weight: bold;
        }
        .filter-clickable-strip span { color: #337ab7; }

        /* Table UI - Matching erp30.png */
        .table-data-wrap { padding: 0 5px; }
        .faq-data-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .faq-data-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Iconic Red Top Border */
            font-size: 13px; text-transform: uppercase;
        }
        .faq-data-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .empty-row-text { color: #333; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div class="erp-top-nav">
        <div>
            <a href="#" class="breadcrumb-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Faq</span>
        </div>
        <a href="#" class="settings-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-3">
        <h2 class="page-main-title">Faq Manager <span>» List</span></h2>
        
        <div class="action-flex-container mt-3">
            <a href="#" class="erp-btn-anchor color-primary"><i class="fa fa-list"></i> All Faq</a>
            <a href="cmsaddnewfaqs.html" class="erp-btn-anchor color-success"><i class="fa fa-plus"></i> Add Faq</a>
        </div>

        <a href="javascript:void(0);" class="filter-clickable-strip shadow-sm" onclick="alert('Filter Faq menu toggle!')">
            <i class="fa fa-angle-double-right"></i> <span>Filter Faq</span> <i class="fa fa-filter"></i>
        </a>

        <div class="action-flex-container">
            <a href="#" class="erp-btn-anchor color-primary"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-btn-anchor color-warning"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-btn-anchor color-danger"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-data-wrap">
            <table class="faq-data-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="checkAll"></th>
                        <th style="width: 45%;">QUESTION/ANSWER</th>
                        <th style="width: 15%;">RANK</th>
                        <th>STATUS</th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="empty-row-text">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Select All Logic
        document.getElementById('checkAll').onclick = function() {
            let boxes = document.querySelectorAll('input[type="checkbox"]');
            boxes.forEach(b => b.checked = this.checked);
        }
    </script>

</body>
</html>
