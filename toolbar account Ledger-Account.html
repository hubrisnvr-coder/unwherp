<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 161 - Ledger Transaction Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 11px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header & Nav */
        .page-header-main { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .header-text { font-size: 13px; font-weight: bold; color: #337ab7; margin: 0; }
        .settings-gear { position: absolute; right: 15px; top: 8px; color: #f0ad4e; font-size: 16px; cursor: pointer; }
        
        .nav-container { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        .erp-btn {
            display: inline-block;
            text-decoration: none !important;
            margin: 2px;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 3px;
            color: #ffffff !important;
            border: none;
            cursor: pointer;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }
        .bg-orange { background-color: #f0ad4e; }
        .bg-red { background-color: #d9534f; }

        /* Action Bar */
        .action-bar { padding: 10px; text-align: center; }
        .toggle-section { display: none; margin: 10px; padding: 15px; background: #fff; border: 1px solid #ddd; }

        /* Data Table Styling */
        .table-container { background: #fff; margin: 10px; border: 1px solid #ddd; padding: 15px; border-radius: 4px; }
        .data-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 10px; text-align: center; font-size: 11px; text-transform: uppercase;
            border-bottom: 2px solid red; /* Screenshot matching red line */
        }
        .erp-table tbody td { border: 1px solid #eee; padding: 8px; text-align: center; vertical-align: middle; }
        
        /* Custom UI Elements */
        .status-active { background: #337ab7; color: white; padding: 2px 8px; border-radius: 3px; font-size: 10px; border: none; }
        .btn-edit { background: #5cb85c; color: white; border: none; padding: 4px 8px; border-radius: 3px; margin-right: 3px; }
        .btn-delete { background: #d9534f; color: white; border: none; padding: 4px 8px; border-radius: 3px; }
        
        .pagination-info { font-size: 12px; color: #777; }
        .search-box { border: 1px solid #ccc; padding: 4px 8px; border-radius: 3px; width: 150px; }

        .form-control-sm { font-size: 11px; height: 30px; }
    </style>
</head>
<body>

<div class="page-header-main">
    <p class="header-text">Ledger Transaction Manager <span style="color:#999; font-weight:normal;">» Detail</span></p>
    <div class="settings-gear" onclick="logAction('Settings Opened')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="logAction('Student Fee')"><i class="fa fa-users"></i> Student Fee</button>
    <button class="erp-btn bg-blue" onclick="logAction('Staff Payroll')"><i class="fa fa-user-tie"></i> Staff Payroll</button>
    <button class="erp-btn bg-green" onclick="logAction('Ledger')"><i class="fa fa-book"></i> Ledger</button>
    <button class="erp-btn bg-green" onclick="logAction('Transactions')"><i class="fa fa-exchange-alt"></i> Transactions</button>
    <button class="erp-btn bg-blue" onclick="logAction('Bank')"><i class="fa fa-university"></i> Bank</button>
</div>

<div class="nav-container" style="background: #f9f9f9;">
    <button class="erp-btn bg-blue" onclick="logAction('Detail')"><i class="fa fa-list"></i> Detail</button>
    <button class="erp-btn bg-blue" onclick="logAction('Add Transaction')"><i class="fa fa-plus"></i> Transaction</button>
    <button class="erp-btn bg-blue" onclick="logAction('Multi Adj')"><i class="fa fa-plus"></i> Multi Adjustment Transaction</button>
    <button class="erp-btn bg-blue" onclick="logAction('Acc To Acc')"><i class="fa fa-exchange-alt"></i> Acc To Acc</button>
    <button class="erp-btn bg-green" onclick="logAction('Ledgers List')"><i class="fa fa-address-book"></i> Ledgers</button>
    <button class="erp-btn bg-blue" onclick="logAction('Acc Group')"><i class="fa fa-layer-group"></i> Acc Group</button>
</div>

<div class="action-bar">
    <button class="erp-btn bg-blue" onclick="togglePanel('createPanel')"><i class="fa fa-plus"></i> Create New Ledger</button>
    <button class="erp-btn bg-blue" onclick="togglePanel('searchPanel')"><i class="fa fa-search"></i> Search</button>
    <br><br>
    <button class="erp-btn bg-blue" onclick="logAction('Set Active')"><i class="fa fa-check"></i> Active</button>
    <button class="erp-btn bg-orange" onclick="logAction('Set In-Active')"><i class="fa fa-times"></i> In-Active</button>
    <button class="erp-btn bg-red" onclick="logAction('Bulk Delete')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div id="searchPanel" class="toggle-section">
    <h6>Search Filter</h6>
    <div class="row g-2">
        <div class="col-md-4">
            <input type="text" class="form-control form-control-sm" placeholder="Ledger Name...">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary btn-sm w-100" onclick="logAction('Filter Applied')">Filter</button>
        </div>
    </div>
</div>

<div class="table-container">
    <div class="data-header">
        <div class="pagination-info">Display 
            <select class="form-select-sm border-1" id="displayLimit">
                <option>All</option>
                <option>10</option>
                <option>50</option>
            </select> records
        </div>
        <div class="table-tools">
            <button class="btn btn-outline-primary btn-sm" onclick="logAction('Refresh')"><i class="fa fa-sync"></i> Refresh</button>
            <button class="btn btn-outline-danger btn-sm" onclick="logAction('Export PDF')"><i class="fa fa-file-pdf"></i></button>
            <button class="btn btn-outline-warning btn-sm" onclick="logAction('Export Excel')"><i class="fa fa-file-excel"></i></button>
            <button class="btn btn-outline-info btn-sm" onclick="logAction('Print Table')"><i class="fa fa-print"></i></button>
            <span class="ms-2">Search:</span>
            <input type="text" class="search-box ms-1" onkeyup="logAction('Live Search: ' + this.value)">
        </div>
    </div>

    <table class="erp-table">
        <thead>
            <tr>
                <th width="40px"><input type="checkbox" onclick="toggleSelectAll(this)"></th>
                <th width="60px">S.N. <i class="fa fa-sort"></i></th>
                <th>LEDGER TRANSACTION <i class="fa fa-sort"></i></th>
                <th>GROUP <i class="fa fa-sort"></i></th>
                <th>BALANCE <i class="fa fa-sort"></i></th>
                <th>STATUS <i class="fa fa-sort"></i></th>
                <th width="120px">ACTION</th>
            </tr>
        </thead>
        <tbody id="ledgerData">
            <tr>
                <td><input type="checkbox" class="row-checkbox"></td>
                <td>1</td>
                <td class="text-start text-primary" style="cursor:pointer;">Cash A/C</td>
                <td class="text-primary">CASH</td>
                <td>0</td>
                <td>
                    <button class="status-active">Active <i class="fa fa-caret-down"></i></button>
                </td>
                <td>
                    <button class="btn-edit" onclick="logAction('Edit ID: 1')"><i class="fa fa-edit"></i></button>
                    <button class="btn-delete" onclick="logAction('Delete ID: 1')"><i class="fa fa-trash"></i></button>
                </td>
            </tr>
            <tr>
                <td><input type="checkbox" class="row-checkbox"></td>
                <td>2</td>
                <td class="text-start text-primary" style="cursor:pointer;">Purchase A/C</td>
                <td class="text-primary">PURCHASES</td>
                <td>0</td>
                <td>
                    <button class="status-active">Active <i class="fa fa-caret-down"></i></button>
                </td>
                <td>
                    <button class="btn-edit" onclick="logAction('Edit ID: 2')"><i class="fa fa-edit"></i></button>
                    <button class="btn-delete" onclick="logAction('Delete ID: 2')"><i class="fa fa-trash"></i></button>
                </td>
            </tr>
            <tr>
                <td><input type="checkbox" class="row-checkbox"></td>
                <td>3</td>
                <td class="text-start text-primary" style="cursor:pointer;">Sales A/C</td>
                <td class="text-primary">SALES</td>
                <td>0</td>
                <td>
                    <button class="status-active">Active <i class="fa fa-caret-down"></i></button>
                </td>
                <td>
                    <button class="btn-edit" onclick="logAction('Edit ID: 3')"><i class="fa fa-edit"></i></button>
                    <button class="btn-delete" onclick="logAction('Delete ID: 3')"><i class="fa fa-trash"></i></button>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <div class="pagination-info">Showing 1 to 3 of 3 entries</div>
        <nav>
            <ul class="pagination pagination-sm m-0">
                <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item disabled"><a class="page-link" href="#">Next</a></li>
            </ul>
        </nav>
    </div>
</div>

<script>
    // Console Action Logger
    function logAction(msg) {
        console.log("%c [ERP-161]: " + msg, "color: #337ab7; font-weight: bold; background: #eee; padding: 2px 5px;");
    }

    // Toggle Search/Filter Panels
    function togglePanel(panelId) {
        const panel = document.getElementById(panelId);
        const isVisible = panel.style.display === "block";
        
        // Hide all panels first
        document.querySelectorAll('.toggle-section').forEach(p => p.style.display = "none");
        
        // Toggle the clicked one
        panel.style.display = isVisible ? "none" : "block";
        logAction("Panel " + panelId + (isVisible ? " Hidden" : " Shown"));
    }

    // Select All Checkboxes
    function toggleSelectAll(source) {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
        logAction(source.checked ? "All rows selected" : "All rows deselected");
    }

    // Initial Load
    window.onload = function() {
        logAction("Page Ready for PHP Integration");
    };
</script>

</body>
</html>
