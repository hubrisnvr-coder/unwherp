<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faq Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation/Breadcrumb */
        .top-erp-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .top-erp-nav a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .gear-icon-btn { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Heading */
        .erp-title-header { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .erp-title-header span { color: #999; font-weight: normal; font-size: 14px; }

        /* Anchor Buttons */
        .btn-list-view { text-decoration: none !important; background-color: #337ab7; color: white !important; padding: 7px 15px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }

        /* Form Container Box */
        .erp-form-card { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-bottom: 30px; }
        .form-row-custom { display: flex; border-bottom: 1px solid #eee; min-height: 48px; }
        .label-cell { 
            background: #f1f3f4; width: 220px; padding: 12px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-cell { flex: 1; padding: 10px 15px; display: flex; align-items: center; }
        
        .form-control { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 5px 12px; }
        .form-control:focus { box-shadow: none; border-color: #337ab7; }

        /* Mandatory Red Border for Rank */
        .rank-req { border-left: 2px solid red !important; }

        /* Bottom Footer Buttons */
        .erp-footer { background: #f1f3f4; padding: 15px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 8px; }
        .footer-btn-a { text-decoration: none; padding: 8px 22px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-reset-gray { background: #999; }
        .btn-submit-blue { background: #286090; }
        .footer-btn-a:hover { opacity: 0.9; }

        @media (max-width: 768px) { .form-row-custom { flex-direction: column; } .label-cell { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>

    <div class="top-erp-nav">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"> <i class="fa fa-angle-right mx-1"></i> Faq</span>
        </div>
        <a href="#" class="gear-icon-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="erp-title-header">Faq Manager <span>» Add form</span></h2>
        
        <div class="text-center mb-3">
            <a href="faq-list.html" class="btn-list-view"><i class="fa fa-list"></i> All Faq</a>
        </div>

        <div class="erp-form-card shadow-sm">
            
            <div class="form-row-custom">
                <div class="label-cell">Question</div>
                <div class="input-cell">
                    <input type="text" class="form-control w-100" placeholder="Enter Question">
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell" style="align-items: flex-start; padding-top: 15px;">Answer</div>
                <div class="input-cell">
                    <textarea class="form-control w-100" rows="10" placeholder="Give Answer"></textarea>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Faq Rank</div>
                <div class="input-cell">
                    <input type="number" class="form-control w-100 rank-req" value="10">
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Status</div>
                <div class="input-cell">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="faq_status" id="activeFaq" checked>
                        <label class="form-check-label" for="activeFaq" style="font-size: 13px;">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="faq_status" id="inactiveFaq">
                        <label class="form-check-label" for="inactiveFaq" style="font-size: 13px;">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="erp-footer">
                <a href="#" class="footer-btn-a btn-reset-gray" onclick="window.location.reload();">
                    <i class="fa fa-undo"></i> Reset
                </a>
                <a href="javascript:void(0)" class="footer-btn-a btn-submit-blue" onclick="alert('Faq Entry Saved Successfully!')">
                    <i class="fa fa-save"></i> Submit
                </a>
            </div>

        </div>
    </div>

</body>
</html>
