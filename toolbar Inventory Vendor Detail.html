<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 193 - Vendor Manager List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header Title */
        .page-header-main { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-icon { position: absolute; right: 15px; top: 10px; color: #f0ad4e; font-size: 20px; }

        /* Nav Tabs */
        .nav-container { background: #fff; padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; gap: 5px; }
        .erp-btn { font-size: 12px; padding: 6px 12px; border-radius: 4px; color: #fff !important; border: none; font-weight: 600; cursor: pointer; text-decoration: none; }
        .bg-detail { background-color: #449d44; } /* Green for Active */
        .bg-blue { background-color: #337ab7; }

        /* Filter Section */
        .filter-wrapper { margin: 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        .filter-header { background: #f9f9f9; padding: 10px; color: #337ab7; font-weight: bold; text-align: center; cursor: pointer; border-bottom: 1px solid #ddd; }
        .filter-body { padding: 20px; transition: all 0.3s ease; }
        
        /* Form Styling */
        .f-row { display: flex; align-items: stretch; margin-bottom: 5px; }
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 120px; text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: flex-end; }
        .f-input-box { border: 1px solid #ddd; height: 35px; width: 100%; padding: 0 10px; outline: none; }
        
        .filter-btn-container { background: #f9f9f9; padding: 15px; border-top: 1px solid #eee; text-align: right; }
        .btn-filter-submit { background: #1a4d80; color: #fff; border: none; padding: 8px 25px; border-radius: 4px; font-weight: bold; }

        /* Table Section */
        .action-bar { text-align: center; margin: 15px 0; }
        .btn-action { font-size: 11px; padding: 4px 12px; color: #fff; border-radius: 4px; border: none; font-weight: bold; margin: 0 2px; }
        
        .table-container { margin: 0 15px; background: #fff; border: 1px solid #ddd; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 10px; text-align: center; font-size: 12px; text-transform: uppercase; 
        }
        .red-line-top { border-top: 3px solid red !important; }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 12px; text-align: center; color: #888; font-style: italic; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 15px;">Vendor Manager</strong> <span style="color:#999;">» List</span>
    <i class="fa fa-cog gear-icon"></i>
</div>

<div class="nav-container">
    <a href="#" class="erp-btn bg-detail" onclick="btnLog('Detail Tab', 'green')"><i class="fa fa-list"></i> Detail</a>
    <a href="#" class="erp-btn bg-blue" onclick="btnLog('Add Vendor Tab', 'blue')"><i class="fa fa-plus-circle"></i> Add</a>
    <a href="#" class="erp-btn bg-blue" onclick="btnLog('Bulk Import Tab', 'blue')"><i class="fa fa-upload"></i> Bulk Import</a>
    <a href="#" class="erp-btn bg-blue" onclick="btnLog('Documents Tab', 'blue')"><i class="fa fa-file-alt"></i> Documents</a>
    <a href="#" class="erp-btn bg-blue" onclick="btnLog('Notes Tab', 'blue')"><i class="fa fa-sticky-note"></i> Notes</a>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down me-1" id="filterIcon"></i> Filter Vendor <i class="fa fa-filter ms-1"></i>
    </div>
    <div id="filterContent" class="filter-body">
        <form action="vendor_list.php" method="GET" id="filterForm">
            <div class="row g-2">
                <div class="col-md-4">
                    <div class="f-row">
                        <div class="f-label">REGNO</div>
                        <input type="text" name="regno" class="f-input-box">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="f-row">
                        <div class="f-label">NAME</div>
                        <input type="text" name="name" class="f-input-box">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="f-row">
                        <div class="f-label">E-MAIL</div>
                        <input type="email" name="email" class="f-input-box">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="f-row">
                        <div class="f-label">TEL</div>
                        <input type="text" name="tel" class="f-input-box">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="f-row">
                        <div class="f-label">MOBILE</div>
                        <input type="text" name="mobile" class="f-input-box">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="f-row">
                        <div class="f-label">STATUS</div>
                        <select name="status" class="f-input-box">
                            <option value="">Status</option>
                            <option value="1">Active</option>
                            <option value="0">In-Active</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="filter-btn-container mt-3">
                <button type="submit" class="btn-filter-submit" onclick="btnLog('Filtering Data...', 'navy')">
                    <i class="fa fa-filter me-1"></i> Filter
                </button>
            </div>
        </form>
    </div>
</div>

<div class="action-bar">
    <button class="btn-action bg-primary" onclick="btnLog('Action: Mark Active', 'blue')"><i class="fa fa-check"></i> Active</button>
    <button class="btn-action" style="background:#f0ad4e;" onclick="btnLog('Action: Mark In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
    <button class="btn-action" style="background:#d9534f;" onclick="btnLog('Action: Delete Record', 'red')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div class="table-container">
    <table class="erp-table">
        <thead>
            <tr class="red-line-top">
                <th width="40"><input type="checkbox" onclick="btnLog('Select All Clicked', 'black')"></th>
                <th>REGNO</th>
                <th>VENDOR</th>
                <th>ADDRESS</th>
                <th>MOBILE</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="6">No Vendor data found.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Console Log Helper
    function btnLog(msg, color) {
        console.log(`%c [ERP-193] %c ${msg}`, 
        `color: white; background: ${color}; padding: 3px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #000; font-weight: bold;");
    }

    // Toggle Filter Section
    function toggleFilter() {
        const content = document.getElementById('filterContent');
        const icon = document.getElementById('filterIcon');
        
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.classList.replace('fa-chevron-right', 'fa-chevron-down');
            btnLog("Filter Section: Opened", "green");
        } else {
            content.classList.add('hidden');
            icon.classList.replace('fa-chevron-down', 'fa-chevron-right');
            btnLog("Filter Section: Closed", "red");
        }
    }

    // PHP Form Simulation
    document.getElementById('filterForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog("Form submitted for PHP processing", "purple");
        alert("Filter Applied! Processing GET request...");
    };

    window.onload = function() {
        btnLog("ERP 193 Vendor List Page Loaded", "black");
    };
</script>

</body>
</html>
