<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Breadcrumb Bar */
        .erp-breadcrumb {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-breadcrumb a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .gear-config-btn { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title */
        .erp-page-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .erp-page-title span { color: #999; font-weight: normal; font-size: 14px; }

        /* Main Action Buttons (Anchor Tags) */
        .erp-action-container { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .erp-btn-anchor { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; 
        }
        .btn-sky { background-color: #337ab7; }
        .btn-navy { background-color: #286090; }
        .btn-gold { background-color: #f0ad4e; }
        .btn-danger-red { background-color: #d9534f; }

        /* Filter Strip matching erp38.png */
        .filter-header-strip { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold; font-size: 14px;
        }

        /* Table Design */
        .erp-table-box { padding: 0 5px; }
        .erp-list-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .erp-list-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* ERP Signature Red Border */
            font-size: 13px; text-transform: uppercase;
        }
        .erp-list-table td { border: 1px solid #ddd; padding: 12px 10px; font-size: 13px; color: #333; }
        .no-data-msg { text-align: left; padding-left: 15px !important; color: #333; }
    </style>
</head>
<body>

    <div class="erp-breadcrumb">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Staffs</span>
        </div>
        <a href="#" class="gear-config-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="erp-page-title">Staff Manager <span>» List</span></h2>
        
        <div class="erp-action-container mt-3">
            <a href="#" class="erp-btn-anchor btn-sky"><i class="fa fa-list"></i> All Staff</a>
            <a href="cmsaddnewstaff.html" class="erp-btn-anchor btn-navy"><i class="fa fa-plus"></i> Add Staff</a>
        </div>

        <a href="javascript:void(0);" class="filter-header-strip shadow-sm" onclick="alert('Filter Toggle')">
            <i class="fa fa-angle-double-right"></i> Filter Staff <i class="fa fa-filter"></i>
        </a>

        <div class="erp-action-container">
            <a href="#" class="erp-btn-anchor btn-sky"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-btn-anchor btn-gold"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-btn-anchor btn-danger-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="erp-table-box">
            <table class="erp-list-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="checkAll"></th>
                        <th>DETAIL</th>
                        <th>RANK</th>
                        <th>STATUS</th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="no-data-msg">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Master Checkbox Logic
        document.getElementById('checkAll').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(c => c.checked = this.checked);
        }
    </script>

</body>
</html>
