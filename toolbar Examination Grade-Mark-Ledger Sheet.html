<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 216 - Mark Sheet Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --erp-blue: #337ab7;
            --erp-green: #5cb85c;
            --erp-bg: #f4f7f6;
            --table-header-bg: #d9edf7;
            --label-bg: #eeeeee;
        }

        body { background-color: var(--erp-bg); font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header & Settings */
        .page-header { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-icon { position: absolute; right: 20px; top: 15px; color: #f0ad4e; font-size: 20px; cursor: pointer; }

        /* Top Navigation Buttons */
        .nav-wrap { background: #fff; padding: 12px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; gap: 8px; }
        .btn-erp { font-size: 12px; padding: 6px 15px; border-radius: 4px; border: none; color: #fff !important; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .bg-blue { background-color: var(--erp-blue); }

        /* Filter Section */
        .filter-container { margin: 20px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
        .filter-header { background: #fff; padding: 10px; text-align: center; color: var(--erp-blue); font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; font-size: 15px; }
        .filter-body { padding: 20px; transition: 0.3s; }
        
        /* Custom Input Groups */
        .input-group-custom { display: flex; flex: 1; min-width: 250px; margin-bottom: 12px; align-items: stretch; }
        .label-custom { background: var(--label-bg); padding: 5px 10px; border: 1px solid #ccc; font-weight: bold; width: 140px; text-align: center; color: #000; text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .field-custom { flex-grow: 1; border: 1px solid #ccc; padding: 6px; outline: none; height: 38px; font-size: 12px; }

        /* Participants Header & Options */
        .section-divider { text-align: center; color: var(--erp-blue); font-weight: bold; margin: 20px 0 10px 0; display: block; }
        .print-options-bar { background: #fff; padding: 10px 20px; border-top: 1px solid #ddd; display: flex; align-items: center; gap: 15px; }
        .radio-item { font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .radio-item input { transform: scale(1.2); }

        .btn-print { background: var(--erp-blue); color: white; border: none; padding: 8px 18px; border-radius: 4px; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 13px; margin-left: auto; }

        /* Table Styling */
        .info-bar { background: var(--erp-blue); color: #fff; padding: 10px 15px; margin: 0 20px; font-weight: bold; }
        .table-outer { background: #fff; border: 1px solid #ddd; margin: 0 20px 20px 20px; overflow-x: auto; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead tr { border-bottom: 3px solid red; } 
        .erp-table th { background: var(--table-header-bg); color: #31708f; padding: 12px; text-align: center; border: 1px solid #bce8f1; font-weight: bold; text-transform: uppercase; }
        .erp-table td { padding: 15px; border: 1px solid #eee; text-align: center; color: #555; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:var(--erp-blue); font-size: 16px;">Mark Sheet Manager</strong> <span style="color:#999; font-size: 14px;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="erpLog('Settings Triggered', 'orange')"></i>
</div>

<div class="nav-wrap">
    <button class="btn-erp bg-blue" onclick="erpLog('Nav: Exam Type')"><i class="fa fa-list-alt"></i> Exam Type</button>
    <button class="btn-erp bg-blue" onclick="erpLog('Nav: Schedule')"><i class="fa fa-calendar-alt"></i> Schedule</button>
    <button class="btn-erp bg-blue" onclick="erpLog('Nav: Manage Mark Ledger')"><i class="fa fa-share-nodes"></i> Manage Mark Ledger</button>
</div>

<div class="filter-container">
    <div class="filter-header" onclick="toggleFilter('filterBody')">
        <i class="fa fa-search"></i> Filter Exam
    </div>
    <div id="filterBody" class="filter-body">
        <div class="row">
            <div class="col-md-3">
                <div class="input-group-custom"><div class="label-custom">Year</div><select class="field-custom"><option>Select Year</option></select></div>
            </div>
            <div class="col-md-3">
                <div class="input-group-custom"><div class="label-custom">Month</div><select class="field-custom"><option>Select Year</option></select></div>
            </div>
            <div class="col-md-6">
                <div class="input-group-custom"><div class="label-custom">Exam</div><select class="field-custom"><option>Select Exams</option></select></div>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-md-4">
                <div class="input-group-custom"><div class="label-custom">Program/Class</div><select class="field-custom"><option>Select Program/Class</option></select></div>
            </div>
            <div class="col-md-4">
                <div class="input-group-custom"><div class="label-custom">Semester/Section</div><select class="field-custom"><option>Select Sem./Sec....</option></select></div>
            </div>
            <div class="col-md-4">
                <div class="input-group-custom"><div class="label-custom">Batch</div><select class="field-custom"><option>Select Batch</option></select></div>
            </div>
        </div>
    </div>
</div>

<span class="section-divider"><i class="fa fa-list"></i> Participants List</span>

<div class="print-options-bar">
    <label class="radio-item"><input type="radio" name="sheet_type" checked> Grading</label>
    <label class="radio-item"><input type="radio" name="sheet_type"> UniversityGrading</label>
    <label class="radio-item"><input type="radio" name="sheet_type"> Percentage</label>
    <label class="radio-item"><input type="radio" name="sheet_type"> Ledger</label>
    
    <button class="btn-print" onclick="erpLog('Printing Mark Sheets...', '#5cb85c')">
        <i class="fa fa-print"></i> Print Mark Sheets
    </button>
</div>

<div class="info-bar">
    Exams Record list on table. Filter Exams using the filter.
</div>
<div class="table-outer">
    <table class="erp-table">
        <thead>
            <tr>
                <th style="width: 50px;"><input type="checkbox" style="transform: scale(1.2);"></th>
                <th style="width: 80px;">S.N.</th>
                <th>REG.NUMBER</th>
                <th>NAME OF STUDENT</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="4" style="padding: 30px; color: #999;">No Exams data found. Please Filter Exams to show.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Hide/Show Filter Section
    function toggleFilter(id) {
        const target = document.getElementById(id);
        target.classList.toggle('hidden');
        erpLog(target.classList.contains('hidden') ? "Filter Closed" : "Filter Opened");
    }

    // Console Logging System
    function erpLog(msg, color = "#337ab7") {
        console.log(
            `%c [ERP-216] %c ${msg}`, 
            `color: white; background: ${color}; padding: 4px 12px; border-radius: 4px; font-weight: bold;`, 
            "color: #333; font-weight: 500;"
        );
    }

    window.onload = function() {
        erpLog("Mark Sheet Manager Module Initialized");
        erpLog("PHP hooks for grading system ready", "green");
    };
</script>

</body>
</html>
