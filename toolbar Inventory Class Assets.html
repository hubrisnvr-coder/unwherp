<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 184 - Sem/Sec Assets Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 14px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header Section */
        .page-header-main { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }

        /* Top Blue/Green Navigation */
        .nav-container { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: flex-end; gap: 5px; }
        .erp-btn { font-size: 13px; padding: 6px 14px; border-radius: 4px; color: #fff !important; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .bg-blue-dark { background-color: #337ab7; }
        .bg-green-dark { background-color: #449d44; }

        /* Action Bar (List / Add) */
        .action-nav { padding: 15px; display: flex; justify-content: center; gap: 5px; }

        /* Filter Section Styling */
        .filter-wrapper { margin: 0 15px 20px 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        .filter-header { 
            background: #fff; padding: 10px; text-align: center; color: #337ab7; 
            cursor: pointer; font-weight: bold; font-size: 15px; border-bottom: 1px solid #eee;
        }
        .filter-content { display: block; padding: 25px; background: #fdfdfd; }
        
        /* Form Label & Input Design */
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 180px; text-transform: uppercase; font-size: 12px; }
        .f-input-box { border: 1px solid #ddd; height: 38px; width: 100%; padding: 0 10px; outline: none; border-radius: 0 4px 4px 0; }
        .btn-filter-submit { background-color: #1a4d80; color: white; border: none; padding: 8px 25px; border-radius: 4px; font-weight: bold; }

        /* Table Area Styling */
        .list-header-label { text-align: center; padding: 10px; color: #337ab7; font-weight: bold; border-bottom: 1px solid #ddd; margin: 0 15px; }
        .table-container { background: #fff; margin: 0 15px; border: 1px solid #ddd; }
        .info-blue-bar { background-color: #337ab7; color: #fff; padding: 10px; font-size: 13px; border-bottom: 1px solid #ddd; }
        
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 12px; text-align: center; font-size: 13px; text-transform: uppercase;
        }
        .red-line-top { border-top: 3px solid red !important; }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 15px; text-align: center; color: #888; font-style: italic; }

    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 18px;">Sem./Sec. Assets Manager</strong> <span style="color:#999;">» Detail</span>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue-dark" onclick="btnLog('Assets Main Tab Clicked', 'blue')"><i class="fa fa-list"></i> Assets</button>
    <button class="erp-btn bg-green-dark" onclick="btnLog('Sem Assets Active Tab', 'green')"><i class="fa fa-th-list"></i> Sem Assets</button>
</div>

<div class="action-nav">
    <button class="erp-btn bg-green-dark" onclick="btnLog('Sem Assets List Clicked', 'green')"><i class="fa fa-list"></i> Sem Assets List</button>
    <button class="erp-btn bg-blue-dark" onclick="btnLog('Add Assets on Sem Clicked', 'blue')"><i class="fa fa-plus-circle"></i> Add Assets on Sem</button>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down me-2" id="toggleIcon"></i> Filter Sem./Sec. Assets <i class="fa fa-filter"></i>
    </div>
    <div class="filter-content" id="filterBox">
        <form action="sem_assets_process.php" method="POST" id="filterForm">
            <div class="row g-0 align-items-center">
                <div class="col-md-5 d-flex">
                    <div class="f-label">PROGRAM/CLASS</div>
                    <select name="program_class" class="f-input-box">
                        <option value="">Select Program/Class</option>
                        <option value="btech">B.Tech</option>
                        <option value="mca">MCA</option>
                    </select>
                </div>
                <div class="col-md-5 d-flex ms-md-3">
                    <div class="f-label">SEMESTER/SECTION</div>
                    <select name="semester_section" class="f-input-box">
                        <option value="">Select Semester/Section</option>
                        <option value="sem1">Semester 1</option>
                        <option value="sem2">Semester 2</option>
                    </select>
                </div>
                <div class="col-md-1 text-end ms-auto">
                    <button type="submit" class="btn-filter-submit" onclick="btnLog('Filter Button Executed', 'navy')">
                        <i class="fa fa-filter"></i> Filter
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="list-header-label">
    <i class="fa fa-list"></i> Sem./Sec. Assets List
</div>
<div class="table-container">
    <div class="info-blue-bar">
        Sem./Sec. Assets Record list on table. Filter Sem./Sec. Assets using the filter.
    </div>
    <table class="erp-table">
        <thead>
            <tr class="red-line-top">
                <th width="80">S.N.</th>
                <th>PROGRAM/CLASS</th>
                <th>SEMESTER/SEC.</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="3">No Sem./Sec. Assets data found. Please Filter Sem./Sec. Assets to show.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Console Logger Function
    function btnLog(msg, color) {
        console.log(`%c [ERP-184] %c ${msg}`, 
        `color: white; background: ${color}; padding: 3px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #000; font-weight: bold;");
    }

    // 2. Hide/Show Filter Section
    function toggleFilter() {
        const box = document.getElementById('filterBox');
        const icon = document.getElementById('toggleIcon');
        if (box.style.display === "none") {
            box.style.display = "block";
            icon.className = "fa fa-chevron-down me-2";
            btnLog("Filter Section Shown", "#1a4d80");
        } else {
            box.style.display = "none";
            icon.className = "fa fa-chevron-up me-2";
            btnLog("Filter Section Hidden", "#1a4d80");
        }
    }

    // 3. Form Submit Logic (PHP Ready)
    document.getElementById('filterForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog("Form data ready for sem_assets_process.php", "purple");
        alert("Filtering data for selected Class and Semester...");
    };

    window.onload = function() {
        btnLog("ERP 184 Page Loaded Successfully (No Settings Gear)", "black");
    };
</script>

</body>
</html>
