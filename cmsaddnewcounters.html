<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation Bar */
        .erp-header-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-header-nav a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .settings-gear { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title Styling */
        .erp-page-heading { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .erp-page-heading span { color: #999; font-weight: normal; font-size: 14px; }

        /* All Counter Button (Anchor Tag) */
        .btn-view-list { 
            text-decoration: none !important; background-color: #337ab7; color: white !important; 
            padding: 7px 15px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; 
        }

        /* Form Layout Design */
        .erp-form-card { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-bottom: 30px; margin-top: 10px; }
        .form-row-erp { display: flex; border-bottom: 1px solid #eee; min-height: 48px; }
        .label-column { 
            background: #f1f3f4; width: 220px; padding: 12px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-column { flex: 1; padding: 10px 15px; display: flex; align-items: center; }
        
        .form-control, .form-select { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 6px 12px; }
        .form-control:focus, .form-select:focus { box-shadow: none; border-color: #337ab7; }

        /* Mandatory Red Border as per erp33.png */
        .required-field { border-left: 2px solid red !important; }

        /* Footer Action Buttons (Anchor Tags) */
        .erp-footer-strip { background: #f1f3f4; padding: 15px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 8px; }
        .action-anchor { text-decoration: none; padding: 8px 24px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-reset { background: #999; }
        .btn-save { background: #286090; }
        .action-anchor:hover { opacity: 0.9; }

        /* Mobile View */
        @media (max-width: 768px) { .form-row-erp { flex-direction: column; } .label-column { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>
<br>
    <div class="erp-header-nav">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Counter</span>
        </div>
        <!--
        <a href="#" class="settings-gear"><i class="fa fa-cog"></i></a>
        -->
    </div>

    <div class="container-fluid mt-2">
        <h2 class="erp-page-heading">Counter Manager <span>» Add form</span></h2>
        
        <div class="text-center mb-2">
            <a href="counter-list.html" class="btn-view-list"><i class="fa fa-list"></i> All Counter</a>
        </div>

        <div class="erp-form-card shadow-sm">
            
            <div class="form-row-erp">
                <div class="label-column">Display Page Type</div>
                <div class="input-column">
                    <select class="form-select w-100">
                        <option selected>Choose Target Page</option>
                    </select>
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-column">Icon</div>
                <div class="input-column">
                    <input type="text" class="form-control w-100 required-field" placeholder="">
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-column">Title</div>
                <div class="input-column">
                    <input type="text" class="form-control w-100 required-field" placeholder="Enter Title">
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-column">Counter Number</div>
                <div class="input-column">
                    <input type="number" class="form-control w-100 required-field" value="0">
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-column">Counter Rank</div>
                <div class="input-column">
                    <input type="number" class="form-control w-100 required-field" value="10">
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-column">Status</div>
                <div class="input-column">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="active" checked>
                        <label class="form-check-label" for="active" style="font-size: 13px;">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="inactive">
                        <label class="form-check-label" for="inactive" style="font-size: 13px;">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="erp-footer-strip">
                <a href="javascript:void(0)" class="action-anchor btn-reset" onclick="window.location.reload();">
                    <i class="fa fa-undo"></i> Reset
                </a>
                <a href="javascript:void(0)" class="action-anchor btn-save" onclick="alert('Counter details saved successfully!')">
                    <i class="fa fa-save"></i> Submit
                </a>
            </div>

        </div>
    </div>

</body>
</html>
