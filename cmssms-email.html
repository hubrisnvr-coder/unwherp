<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS / Email Manager - Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation Header */
        .erp-header-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: flex-end; align-items: center;
        }
        .gear-config-btn { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Main Heading Styling */
        .erp-main-heading { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 15px; margin-bottom: 0; }
        .erp-main-heading span { color: #999; font-weight: normal; font-size: 14px; }

        /* Button Group Wrapper */
        .btn-flex-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        
        /* Specialized Link Buttons */
        .erp-btn-link { 
            text-decoration: none !important; padding: 8px 16px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; transition: 0.2s;
        }
        .bg-erp-blue { background-color: #337ab7; }
        .bg-erp-orange { background-color: #f0ad4e; }
        .bg-erp-red { background-color: #d9534f; }
        .erp-btn-link:hover { opacity: 0.9; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Filter Banner Strip */
        .filter-banner-link { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 15px; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; 
            color: #337ab7; font-weight: bold; font-size: 15px;
        }

        /* Table Design to match erp49.png */
        .table-section { padding: 0 15px; }
        .sms-email-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .sms-email-table th { 
            background: #eef7fb; color: #31708f; padding: 12px 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Signature Red Line */
            font-size: 13px; text-transform: uppercase;
        }
        .sms-email-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }
        .empty-data-msg { text-align: left; padding-left: 20px !important; color: #666; }
    </style>
</head>
<body>

    <div class="erp-header-nav">
        <a href="#" class="gear-config-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="erp-main-heading">SMS / Email Manager <span>» Detail</span></h2>
        
        <div class="btn-flex-row mt-3">
            <a href="cmscontactdetail.html" class="erp-btn-link bg-erp-blue"><i class="fa fa-list"></i> Detail</a>
            <a href="cmsstaff.html" class="erp-btn-link bg-erp-blue"><i class="fa fa-user-tie"></i> Staff</a>
            <a href="cmscontactgroup.html" class="erp-btn-link bg-erp-blue"><i class="fa fa-users"></i> Contact Group</a>
            <a href="cmsindividual.html" class="erp-btn-link bg-erp-blue"><i class="fa fa-plus"></i> Individual</a>
            <a href="cmssubscribers.html" class="erp-btn-link bg-erp-blue"><i class="fa fa-envelope"></i> Subscribers</a>
        </div>

        <a href="javascript:void(0);" class="filter-banner-link shadow-sm" onclick="alert('Filtering SMS/Email...')">
            <i class="fa fa-angle-double-right" style="color: #f0ad4e;"></i> Filter SMS / Email <i class="fa fa-filter"></i>
        </a>

        <div class="btn-flex-row">
            <a href="#" class="erp-btn-link bg-erp-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-btn-link bg-erp-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-btn-link bg-erp-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-section">
            <table class="sms-email-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="masterCheck"></th>
                        <th style="width: 150px;">S.N.</th>
                        <th>MESSAGE DETAIL</th>
                        <th style="width: 100px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="empty-data-msg py-3">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check All Checkboxes function
        document.getElementById('masterCheck').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(box => box.checked = this.checked);
        }
    </script>

</body>
</html>
