<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 159 - Transaction Manager Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 11px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Top Page Header */
        .page-header-main { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .header-text { font-size: 13px; font-weight: bold; color: #337ab7; margin: 0; }
        .settings-gear { position: absolute; right: 15px; top: 8px; color: #f0ad4e; font-size: 16px; cursor: pointer; }

        /* Navigation Containers */
        .nav-container { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        .erp-btn {
            display: inline-block;
            text-decoration: none !important;
            margin: 2px;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 3px;
            color: #ffffff !important;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        /* ERP Theme Colors */
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }
        .bg-active-green { background-color: #5cb85c; }
        .bg-orange { background-color: #f0ad4e; }
        .bg-red { background-color: #d9534f; }

        /* Filter Section Styling */
        .filter-container { margin: 10px; border: 1px solid #ddd; background: #fff; border-radius: 2px; }
        .filter-header { 
            background: #fff; padding: 6px; cursor: pointer; color: #337ab7; 
            font-weight: bold; text-align: center; font-size: 11px;
        }
        .filter-body { padding: 15px; border-top: 1px solid #eee; }
        
        .form-label-box { 
            background: #f9f9f9; border: 1px solid #ddd; font-weight: bold; 
            padding: 5px; display: flex; align-items: center; justify-content: center; 
            height: 32px; text-align: center; font-size: 10px; text-transform: uppercase;
        }
        .form-control-custom { border-radius: 0; border: 1px solid #ddd; height: 32px; font-size: 11px; padding: 2px 8px; width: 100%; outline: none; }

        /* Table Styling */
        .record-section { background: #fff; margin: 10px; padding: 10px; border: 1px solid #ddd; }
        .action-bar { text-align: center; margin-bottom: 10px; }
        
        .erp-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .erp-table thead th { 
            border: 1px solid #dee2e6; background: #eef5f9; color: #337ab7; 
            padding: 8px; font-size: 11px; text-align: center; border-bottom: 2px solid red;
        }
        .erp-table tbody td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 11px; }

        /* Checkbox Styling */
        .custom-checkbox { width: 16px; height: 16px; cursor: pointer; }

    </style>
</head>
<body>

<div class="page-header-main">
    <p class="header-text">Transaction Manager <span style="color:#999; font-weight:normal;">» Detail</span></p>
    <div class="settings-gear" onclick="logAction('Settings')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="logAction('Student Fee')"><i class="fa fa-users"></i> Student Fee</button>
    <button class="erp-btn bg-blue" onclick="logAction('Staff Payroll')"><i class="fa fa-user-tie"></i> Staff Payroll</button>
    <button class="erp-btn bg-blue" onclick="logAction('Ledger')"><i class="fa fa-book"></i> Ledger</button>
    <button class="erp-btn bg-green" onclick="logAction('Transactions')"><i class="fa fa-exchange-alt"></i> Transactions</button>
    <button class="erp-btn bg-blue" onclick="logAction('Bank')"><i class="fa fa-university"></i> Bank</button>
</div>

<div class="nav-container" style="background: #f9f9f9; padding: 5px;">
    <button class="erp-btn bg-active-green" onclick="logAction('Detail Tab')"><i class="fa fa-list"></i> Detail</button>
    <button class="erp-btn bg-blue" onclick="logAction('Add Transaction')"><i class="fa fa-plus"></i> Transaction</button>
    <button class="erp-btn bg-blue" onclick="logAction('Multi Adjustment')"><i class="fa fa-plus"></i> Multi Adjustment Transaction</button>
    <button class="erp-btn bg-blue" onclick="logAction('Acc To Acc')"><i class="fa fa-exchange-alt"></i> Acc To Acc</button>
    <button class="erp-btn bg-blue" onclick="logAction('Ledgers List')"><i class="fa fa-address-book"></i> Ledgers</button>
    <button class="erp-btn bg-blue" onclick="logAction('Acc Group')"><i class="fa fa-layer-group"></i> Acc Group</button>
</div>

<div class="filter-container">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-angle-double-down" id="toggleIcon" style="color:#337ab7;"></i> Filter Transaction <i class="fa fa-filter"></i>
    </div>
    <div id="filterBody" class="filter-body">
        <div class="row g-0 align-items-center">
            <div class="col-md-1"><div class="form-label-box">LEDGER</div></div>
            <div class="col-md-4">
                <select class="form-control-custom" id="filterLedger">
                    <option value="">Choose a Ledger...</option>
                </select>
            </div>
            <div class="col-md-2 offset-md-1"><div class="form-label-box">DATE RANGE</div></div>
            <div class="col-md-3">
                <div class="input-group g-0">
                    <input type="date" class="form-control-custom" id="dateFrom" placeholder="YYYY-MM-DD">
                    <span class="input-group-text p-1" style="height:32px; font-size:10px; background:#fff; border-radius:0;">⇌</span>
                    <input type="date" class="form-control-custom" id="dateTo" placeholder="YYYY-MM-DD">
                </div>
            </div>
        </div>
        <div class="text-end mt-3">
            <button class="erp-btn bg-blue px-4" onclick="applyFilter()">
                <i class="fa fa-filter"></i> Filter
            </button>
        </div>
    </div>
</div>

<div class="record-section">
    <div class="action-bar">
        <button class="erp-btn bg-blue" onclick="logAction('Set Active')"><i class="fa fa-check"></i> Active</button>
        <button class="erp-btn bg-orange" onclick="logAction('Set In-Active')"><i class="fa fa-times"></i> In-Active</button>
        <button class="erp-btn bg-red" onclick="logAction('Delete Selected')"><i class="fa fa-trash"></i> Delete</button>
    </div>

    <table class="erp-table">
        <thead>
            <tr>
                <th width="40px"><input type="checkbox" class="custom-checkbox" onclick="toggleAll(this)"></th>
                <th width="60px">S.N.</th>
                <th width="120px">DATE</th>
                <th>LEDGER/HEAD</th>
                <th width="150px">DR AMOUNT</th>
                <th width="150px">CR AMOUNT</th>
                <th>DESCRIPTION</th>
                <th width="100px">ACTION</th>
            </tr>
        </thead>
        <tbody id="transactionBody">
            <tr>
                <td colspan="8" style="color: #999; padding: 30px;">
                    No Transaction data found. Please Filter Transaction to show.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Console Action Tracker
    function logAction(msg) {
        console.log("%c [ERP 159 Action]: " + msg, "color: #449d44; font-weight: bold; background: #f0f0f0; padding: 2px 5px; border-radius: 3px;");
    }

    // Filter Toggle Function
    function toggleFilter() {
        const body = document.getElementById('filterBody');
        const icon = document.getElementById('toggleIcon');
        
        if (body.style.display === "none") {
            body.style.display = "block";
            icon.className = "fa fa-angle-double-down";
            logAction("Filter Section Opened");
        } else {
            body.style.display = "none";
            icon.className = "fa fa-angle-double-right";
            logAction("Filter Section Hidden");
        }
    }

    // Apply Filter Function
    function applyFilter() {
        const ledger = document.getElementById('filterLedger').value;
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;
        
        logAction(`Filter Applied - Ledger: ${ledger || 'All'}, From: ${from || 'Any'}, To: ${to || 'Any'}`);
        alert("Filter Applied! Check Console for parameters.");
    }

    // Select All Checkboxes
    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.custom-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
        logAction(source.checked ? "All items selected" : "All items deselected");
    }

    // Initialize Page
    window.onload = function() {
        // Form controls initialization log
        logAction("Page Loaded - Ready for PHP Data");
    };
</script>

</body>
</html>
