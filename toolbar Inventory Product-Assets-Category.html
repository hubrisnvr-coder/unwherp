<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 187 - Product Category Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header */
        .page-header-main { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }

        /* Navigation Tabs */
        .nav-container { background: #fff; padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; gap: 5px; }
        .erp-btn { font-size: 12px; padding: 6px 12px; border-radius: 4px; color: #fff !important; border: none; font-weight: 600; cursor: pointer; }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }

        /* Split Layout */
        .main-content { display: flex; padding: 15px; gap: 15px; flex-wrap: wrap; }
        .create-section { flex: 0 0 40%; min-width: 350px; background: #fff; border: 1px solid #ddd; border-radius: 4px; height: fit-content; }
        .list-section { flex: 1; min-width: 400px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }

        /* Section Headers */
        .section-title { background: #fff; padding: 10px; color: #337ab7; font-weight: bold; font-size: 14px; border-bottom: 1px solid #eee; text-align: center; cursor: pointer; }

        /* Form Styling */
        .form-body { padding: 20px; background: #fdfdfd; }
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: center; width: 100px; text-transform: uppercase; font-size: 11px; }
        .f-input-box { border: 1px solid #ddd; height: 38px; width: 100%; padding: 0 10px; outline: none; border-left: 2px solid red; }
        
        /* Dynamic Row Styling */
        .add-row-header { background: #eef5f9; display: flex; align-items: stretch; margin-top: 15px; border-top: 2px solid red; }
        .label-blue { background: #eef5f9; color: #337ab7; padding: 10px; font-weight: bold; flex: 1; text-align: center; border: 1px solid #ddd; border-top: none; }
        .btn-add-inline { background: #337ab7; color: white; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }
        
        .dynamic-row { display: flex; align-items: center; border: 1px solid #ddd; border-top: none; }
        .row-index { width: 100px; background: #f9f9f9; padding: 8px; text-align: center; border-right: 1px solid #ddd; font-weight: bold; }
        .dynamic-input { border: none; outline: none; padding: 8px; flex: 1; }
        .btn-remove { color: #d9534f; border: none; background: none; padding: 0 10px; cursor: pointer; }

        /* Footer Button */
        .btn-create-submit { background-color: #1a4d80; color: white; border: none; padding: 10px 30px; border-radius: 4px; font-weight: bold; float: right; margin-top: 20px; }

        /* Table Area */
        .table-controls { padding: 10px; text-align: right; }
        .btn-status { font-size: 11px; padding: 4px 10px; border-radius: 4px; color: #fff; border: none; font-weight: bold; margin-left: 2px; }
        
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; padding: 10px; text-align: center; font-size: 12px; }
        .red-line-top { border-top: 3px solid red !important; }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 10px; text-align: center; color: #888; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 16px;">Product Category Manager</strong> <span style="color:#999;">» Detail</span>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="btnLog('Detail Tab', 'blue')"><i class="fa fa-list"></i> Detail</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Registration Tab', 'blue')"><i class="fa fa-plus-circle"></i> Registration</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Bulk Registration', 'blue')"><i class="fa fa-upload"></i> Bulk Registration</button>
    <button class="erp-btn bg-green" onclick="btnLog('Category Tab Active', 'green')"><i class="fa fa-tags"></i> Category</button>
</div>

<div class="main-content">
    
    <div class="create-section">
        <div class="section-title" onclick="toggleCreateSection()">
            <i class="fa fa-plus-circle me-1"></i> Create Product Category
        </div>
        <div class="form-body" id="createFormBox">
            <form action="category_process.php" method="POST" id="categoryForm">
                <div class="d-flex align-items-center">
                    <div class="f-label">TITLE</div>
                    <input type="text" name="category_title" class="f-input-box" placeholder="e.g. Printer" required>
                </div>
                
                <div class="add-row-header">
                    <div class="label-blue">NAME</div>
                    <div style="flex: 2; border: 1px solid #ddd; background: #fff; border-top: none;"></div>
                    <button type="button" class="btn-add-inline" id="addRowBtn">
                        <i class="fa fa-plus"></i> Add
                    </button>
                </div>

                <div id="dynamicRowsContainer">
                    <div class="dynamic-row">
                        <div class="row-index">1</div>
                        <input type="text" name="sub_category[]" class="dynamic-input" placeholder="Enter name...">
                        <button type="button" class="btn-remove" onclick="removeRow(this)"><i class="fa fa-times"></i></button>
                    </div>
                </div>

                <div class="clearfix">
                    <button type="submit" class="btn-create-submit" onclick="btnLog('Final Create Submitted', 'navy')">
                        Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="list-section">
        <div class="table-controls">
            <button class="btn-status bg-primary" onclick="btnLog('Bulk Active', 'blue')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-status" style="background:#f0ad4e;" onclick="btnLog('Bulk In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-status" style="background:#d9534f;" onclick="btnLog('Bulk Delete', 'red')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <table class="erp-table">
            <thead>
                <tr class="red-line-top">
                    <th width="40"><input type="checkbox" onclick="btnLog('Master Check', 'black')"></th>
                    <th>S.N.</th>
                    <th>CATEGORY</th>
                    <th>SUB-CATEGORY</th>
                    <th>STATUS</th>
                    <th width="50"></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6" style="padding: 20px; font-style: italic;">No Product Category data found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function btnLog(msg, color) {
        console.log(`%c [ERP-187] %c ${msg}`, 
        `color: white; background: ${color}; padding: 3px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #111; font-weight: bold;");
    }

    // Toggle logic
    function toggleCreateSection() {
        const box = document.getElementById('createFormBox');
        box.style.display = (box.style.display === "none") ? "block" : "none";
        btnLog("Create Section Toggled", "gray");
    }

    // Dynamic Row Logic
    const container = document.getElementById('dynamicRowsContainer');
    const addBtn = document.getElementById('addRowBtn');

    addBtn.addEventListener('click', function() {
        const rowCount = container.getElementsByClassName('dynamic-row').length + 1;
        
        const newRow = document.createElement('div');
        newRow.className = 'dynamic-row';
        newRow.innerHTML = `
            <div class="row-index">${rowCount}</div>
            <input type="text" name="sub_category[]" class="dynamic-input" placeholder="Enter name...">
            <button type="button" class="btn-remove" onclick="removeRow(this)"><i class="fa fa-times"></i></button>
        `;
        
        container.appendChild(newRow);
        btnLog("New Row Added: Index " + rowCount, "green");
    });

    function removeRow(btn) {
        const rows = container.getElementsByClassName('dynamic-row');
        if (rows.length > 1) {
            btn.closest('.dynamic-row').remove();
            // Re-indexing
            Array.from(rows).forEach((row, index) => {
                row.querySelector('.row-index').innerText = index + 1;
            });
            btnLog("Row Removed", "red");
        } else {
            alert("At least one row is required.");
        }
    }

    document.getElementById('categoryForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog("Data ready for PHP: " + new FormData(this), "purple");
        alert("Success: Categories sent for processing!");
    };
</script>

</body>
</html>
