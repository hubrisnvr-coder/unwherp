<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation/Breadcrumb */
        .erp-nav-bar {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-nav-bar a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .config-icon-btn { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Heading */
        .page-header-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .page-header-title span { color: #999; font-weight: normal; font-size: 14px; }

        /* Action Buttons (Anchor Tags) */
        .action-btn-wrapper { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .erp-a-btn { 
            text-decoration: none !important; padding: 6px 15px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; 
        }
        .btn-sky-blue { background-color: #337ab7; }
        .btn-dark-navy { background-color: #286090; }
        .btn-warning-orange { background-color: #f0ad4e; }
        .btn-danger-red { background-color: #d9534f; }

        /* Filter Box */
        .filter-strip { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold; font-size: 15px;
        }

        /* List Title */
        .list-section-title { text-align: center; color: #337ab7; font-size: 14px; font-weight: 500; margin-bottom: 15px; }

        /* Blue Info Bar matching erp42.png */
        .info-blue-bar { 
            background-color: #337ab7; color: white; padding: 10px 15px; 
            font-size: 14px; margin-bottom: 0; border-radius: 2px 2px 0 0;
        }

        /* Registration Table Styling */
        .table-wrap { padding: 0 5px; }
        .registration-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .registration-table th { 
            background: #eef7fb; color: #31708f; padding: 12px 8px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* ERP Signature Red Border */
            font-size: 12px; text-transform: uppercase;
        }
        .registration-table td { border: 1px solid #ddd; padding: 12px 10px; font-size: 13px; color: #333; }
    </style>
</head>
<body>

    <div class="erp-nav-bar">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Notice</span>
        </div>
        <a href="#" class="config-icon-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="page-header-title">Registration Manager <span>» List</span></h2>
        
        <div class="action-btn-wrapper mt-3">
            <a href="#" class="erp-a-btn btn-sky-blue"><i class="fa fa-list"></i> All Registration</a>
            <a href="#" class="erp-a-btn btn-dark-navy"><i class="fa fa-plus"></i> Add Registration</a>
        </div>

        <a href="javascript:void(0);" class="filter-strip shadow-sm" onclick="alert('Filter Toggle')">
            <i class="fa fa-angle-double-right"></i> Filter Registration <i class="fa fa-filter"></i>
        </a>

        <div class="list-section-title">
            <i class="fa fa-list"></i> Registration List
        </div>

        <div class="action-btn-wrapper">
            <a href="#" class="erp-a-btn btn-sky-blue"><i class="fa fa-check"></i> Approve</a>
            <a href="#" class="erp-a-btn btn-warning-orange"><i class="fa fa-times"></i> Reject</a>
            <a href="#" class="erp-a-btn btn-danger-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-wrap">
            <div class="info-blue-bar">
                Registration Record list on table. Filter Registration using the filter.
            </div>
            <table class="registration-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 45px;"><input type="checkbox" id="masterCheck"></th>
                        <th>APPLICATION FOR</th>
                        <th>REGNO.</th>
                        <th>NAME</th>
                        <th>CONTACT</th>
                        <th>REG.DATE</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" class="ps-3 py-3">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox logic
        document.getElementById('masterCheck').onclick = function() {
            let boxes = document.querySelectorAll('input[type="checkbox"]');
            boxes.forEach(b => b.checked = this.checked);
        }
    </script>

</body>
</html>
