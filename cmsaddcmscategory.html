<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation / Breadcrumb */
        .top-nav { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .home-link { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .cog-icon { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Header Title */
        .page-header-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .page-header-title span { color: #999; font-weight: normal; font-size: 14px; }

        /* Form Container Matching erp21.png */
        .form-main-container { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-bottom: 30px; }
        .custom-row { display: flex; border-bottom: 1px solid #eee; min-height: 42px; }
        .label-part { 
            background: #f1f3f4; width: 220px; padding: 10px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-part { flex: 1; padding: 8px 15px; display: flex; align-items: center; }
        
        .form-control, .form-select { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 5px 10px; height: 32px; }
        textarea.form-control { height: auto; resize: vertical; }

        /* Action Buttons */
        .all-category-btn { text-decoration: none !important; background-color: #337ab7; color: white !important; padding: 7px 15px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 15px; }

        .footer-btns { background: #f1f3f4; padding: 15px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 6px; }
        .a-btn-footer { text-decoration: none; padding: 7px 20px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-reset { background: #999; }
        .btn-submit { background: #286090; }

        /* Mobile Responsive */
        @media (max-width: 768px) { .custom-row { flex-direction: column; } .label-part { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>
            <a href="#" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"> <i class="fa fa-angle-right mx-1"></i> Category</span>
        </div>
        <a href="#" class="cog-icon"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="page-header-title">Category Manager <span>» Add form</span></h2>
        
        <div class="text-center">
            <a href="category-list.html" class="all-category-btn"><i class="fa fa-list"></i> All Category</a>
        </div>

        <div class="form-main-container shadow-sm">
            
            <div class="custom-row">
                <div class="label-part">Choose Parent</div>
                <div class="input-part">
                    <select class="form-select w-100">
                        <option>Is Parent</option>
                    </select>
                </div>
            </div>

            <div class="custom-row">
                <div class="label-part">Title</div>
                <div class="input-part">
                    <input type="text" class="form-control w-100">
                </div>
            </div>

            <div class="custom-row">
                <div class="label-part">Description</div>
                <div class="input-part">
                    <textarea class="form-control w-100" rows="10" placeholder="Description"></textarea>
                </div>
            </div>

            <div class="custom-row">
                <div class="label-part">Image</div>
                <div class="input-part">
                    <input type="file" class="form-control">
                </div>
            </div>

            <div class="custom-row">
                <div class="label-part">Status</div>
                <div class="input-part">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="active" checked>
                        <label class="form-check-label" for="active" style="font-size: 14px;">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="inactive">
                        <label class="form-check-label" for="inactive" style="font-size: 14px;">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="footer-btns">
                <a href="#" class="a-btn-footer btn-reset" onclick="location.reload();"><i class="fa fa-undo"></i> Reset</a>
                <a href="javascript:void(0)" class="a-btn-footer btn-submit" onclick="alert('Category successfully added!')"><i class="fa fa-save"></i> Submit</a>
            </div>

        </div>
    </div>

</body>
</html>
