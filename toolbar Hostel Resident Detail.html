<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 223 - Resident Manager Detail</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --erp-blue: #337ab7;
            --erp-green: #5cb85c;
            --erp-dark-blue: #2e6da4;
            --erp-orange: #f0ad4e;
            --erp-red: #d9534f;
            --erp-bg: #f4f7f6;
            --label-bg: #eeeeee;
            --table-header-bg: #d9edf7;
        }

        body { background-color: var(--erp-bg); font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Top Header Navigation */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-icon { position: absolute; right: 20px; top: 12px; color: #f0ad4e; font-size: 18px; cursor: pointer; }

        .nav-section { background: #fff; padding: 10px; display: flex; justify-content: flex-end; gap: 5px; border-bottom: 1px solid #ddd; padding-right: 50px; }
        .btn-erp-nav { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; text-decoration: none; display: flex; align-items: center; gap: 5px; border: none; }
        
        .sub-nav { background: #fff; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #ddd; }
        .btn-sub-tab { font-size: 12px; padding: 5px 15px; border-radius: 4px; color: #fff !important; border: none; display: flex; align-items: center; gap: 6px; }

        .bg-blue { background-color: var(--erp-blue); }
        .bg-green { background-color: var(--erp-green); }

        /* Filter Section Styling */
        .filter-container { margin: 20px; background: #fff; border: 1px solid #bce8f1; border-radius: 4px; }
        .filter-header { background: #fff; padding: 8px; text-align: center; color: var(--erp-blue); font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; font-size: 15px; }
        .filter-body { padding: 20px; transition: 0.3s ease; }
        
        /* Input Custom Styling */
        .input-group-custom { display: flex; align-items: stretch; margin-bottom: 12px; }
        .label-custom { background: var(--label-bg); padding: 6px 10px; border: 1px solid #ccc; font-weight: bold; width: 110px; text-align: center; color: #000; text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .field-custom { flex-grow: 1; border: 1px solid #ccc; padding: 6px; outline: none; height: 35px; font-size: 13px; }
        
        .btn-filter-main { background: var(--erp-dark-blue); color: white; border: none; padding: 8px 25px; border-radius: 4px; float: right; font-weight: bold; display: flex; align-items: center; gap: 8px; }

        /* Table & List Styling */
        .list-title { text-align: center; font-weight: bold; color: var(--erp-blue); margin: 25px 0 10px 0; display: block; font-size: 15px; }
        
        /* Inline Filter Bar */
        .inline-filter-bar { background: #fff; padding: 10px 20px; display: flex; gap: 20px; border-top: 1px solid #eee; }

        .info-bar { background: var(--erp-blue); color: #fff; padding: 10px 15px; margin: 0 20px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        
        .action-btns { padding: 10px 20px; display: flex; gap: 5px; }
        .btn-action { padding: 4px 10px; font-size: 12px; color: #fff; border-radius: 3px; border: none; display: flex; align-items: center; gap: 5px; }

        .table-wrap { background: #fff; border: 1px solid #ddd; margin: 0 20px 30px 20px; overflow-x: auto; }
        .erp-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .erp-table thead tr { border-bottom: 2px solid #ff0000; }
        .erp-table th { background: var(--table-header-bg); color: #31708f; padding: 10px; text-align: center; border: 1px solid #bce8f1; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .erp-table td { padding: 12px; border: 1px solid #eee; text-align: center; color: #555; }

        .hidden { display: none; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:var(--erp-blue);">Resident Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="erpLog('Setting Icon Clicked', 'orange')"></i>
</div>

<div class="nav-section">
    <button class="btn-erp-nav bg-green" onclick="erpLog('Resident Module Active')"><i class="fa fa-users"></i> Resident</button>
    <button class="btn-erp-nav bg-green" onclick="erpLog('Hostel Module Clicked')"><i class="fa fa-bed"></i> Hostel</button>
    <button class="btn-erp-nav bg-blue" onclick="erpLog('Food & Meal Module Clicked')"><i class="fa fa-cutlery"></i> Food & Meal</button>
</div>

<div class="sub-nav">
    <button class="btn-sub-tab bg-green" onclick="erpLog('Detail View Active')"><i class="fa fa-list"></i> Detail</button>
    <button class="btn-sub-tab bg-blue" onclick="erpLog('Registration Page Redirect')"><i class="fa fa-plus"></i> Registration</button>
    <button class="btn-sub-tab bg-blue" onclick="erpLog('History Page Redirect')"><i class="fa fa-history"></i> History</button>
</div>

<div class="filter-container">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-angle-double-down"></i> Filter Resident <i class="fa fa-filter"></i>
    </div>
    <div id="filterArea" class="filter-body">
        <form id="residentFilterForm">
            <div class="row">
                <div class="col-md-4">
                    <div class="input-group-custom">
                        <div class="label-custom">Type</div>
                        <select name="res_type" class="field-custom">
                            <option>Select Type</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group-custom">
                        <div class="label-custom">Reg No.</div>
                        <input type="text" name="reg_no" class="field-custom">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group-custom">
                        <div class="label-custom">Hostel</div>
                        <select name="hostel_id" class="field-custom">
                            <option>Select Hostel...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="input-group-custom">
                        <div class="label-custom">Room</div>
                        <select name="room_id" class="field-custom">
                            <option>Select Room</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group-custom">
                        <div class="label-custom">Bed</div>
                        <select name="bed_id" class="field-custom">
                            <option>Select Bed</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group-custom">
                        <div class="label-custom">Status</div>
                        <select name="status" class="field-custom">
                            <option>Select Status...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="clearfix">
                <button type="button" class="btn-filter-main" onclick="erpLog('Filtering Resident Records...')">
                    <i class="fa fa-filter"></i> Filter
                </button>
            </div>
        </form>
    </div>
</div>

<span class="list-title"><i class="fa fa-list"></i> Resident List</span>

<div class="inline-filter-bar">
    <div class="input-group-custom" style="width: 300px; margin-bottom: 0;">
        <div class="label-custom">Hostel</div>
        <select class="field-custom"><option>Select Hostel...</option></select>
    </div>
    <div class="input-group-custom" style="width: 250px; margin-bottom: 0;">
        <div class="label-custom">Room</div>
        <select class="field-custom"><option>Select Room...</option></select>
    </div>
    <div class="input-group-custom" style="width: 250px; margin-bottom: 0;">
        <div class="label-custom">Bed</div>
        <select class="field-custom"><option>Select Bed...</option></select>
    </div>
</div>

<div class="action-btns">
    <button class="btn-action bg-blue" onclick="erpLog('Shift Action Clicked')"><i class="fa fa-exchange"></i> Shift Now</button>
    <button class="btn-action bg-blue" onclick="erpLog('Status set to Active')"><i class="fa fa-check"></i> Active</button>
    <button class="btn-action bg-orange" onclick="erpLog('Status set to Leave')"><i class="fa fa-sign-out"></i> Leave</button>
    <button class="btn-action bg-red" onclick="erpLog('Delete Action Clicked')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div class="info-bar">
    Resident Record list on table. Filter Resident using the filter.
</div>

<div class="table-wrap">
    <table class="erp-table">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox"></th>
                <th style="width: 50px;">S.N.</th>
                <th>Hostel</th>
                <th>Room</th>
                <th>Bed</th>
                <th>Type</th>
                <th>Reg. No.</th>
                <th>Name</th>
                <th>Status</th>
                <th style="width: 80px;">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="10" style="padding: 40px; color: #999; font-style: italic;">
                    No Resident data found. Please Filter Resident to show.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    /**
     * Filter Hide/Show Functionality
     */
    function toggleFilter() {
        const filterArea = document.getElementById('filterArea');
        filterArea.classList.toggle('hidden');
        erpLog(filterArea.classList.contains('hidden') ? "Filter Panel Hidden" : "Filter Panel Visible");
    }

    /**
     * Professional Logging System
     */
    function erpLog(message, color = "#337ab7") {
        const timestamp = new Date().toLocaleTimeString();
        console.log(
            `%c [ERP-223] %c ${timestamp} %c ${message}`, 
            `color: white; background: ${color}; padding: 2px 8px; border-radius: 3px; font-weight: bold;`, 
            "color: #888;",
            "color: #333; font-weight: 500;"
        );
    }

    // Initial Load Log
    window.onload = function() {
        erpLog("Resident Manager Detail Page Loaded", "#5cb85c");
    };
</script>

</body>
</html>
