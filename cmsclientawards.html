<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client/Award Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Navigation Header */
        .erp-nav-breadcrumb {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-nav-breadcrumb a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .settings-gear-btn { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title */
        .page-main-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .page-main-title span { color: #999; font-weight: normal; font-size: 14px; }

        /* Top Action Buttons (Anchor Tags) */
        .btn-group-center { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; }
        .anchor-btn { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; 
        }
        .btn-blue { background-color: #337ab7; }
        .btn-dark-blue { background-color: #286090; }
        .btn-orange { background-color: #f0ad4e; }
        .btn-red { background-color: #d9534f; }

        /* Filter Section Strip */
        .filter-section-strip { 
            border: 1px solid #ddd; background: #fff; padding: 10px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold; font-size: 14px;
        }

        /* Table Design matching erp34.png */
        .table-responsive-erp { padding: 0 2px; }
        .data-table-custom { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .data-table-custom th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Iconic Red Top Border */
            font-size: 13px; text-transform: uppercase;
        }
        .data-table-custom td { border: 1px solid #ddd; padding: 12px 10px; font-size: 13px; color: #333; }
        .no-records { text-align: left; padding-left: 15px !important; }

        /* Bulk Actions Row */
        .bulk-action-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="erp-nav-breadcrumb">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Client</span>
        </div>
        <a href="#" class="settings-gear-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="page-main-title">Client/Award Manager <span>» List</span></h2>
        
        <div class="btn-group-center mt-3">
            <a href="#" class="anchor-btn btn-blue"><i class="fa fa-list"></i> All Client/Award</a>
            <a href="cmsaddnewclientawards.html" class="anchor-btn btn-dark-blue"><i class="fa fa-plus"></i> Add Client/Award</a>
        </div>

        <a href="javascript:void(0);" class="filter-section-strip shadow-sm" onclick="alert('Filter Section Toggle')">
            <i class="fa fa-angle-double-right"></i> Filter Client/Award <i class="fa fa-filter"></i>
        </a>

        <div class="bulk-action-row">
            <a href="#" class="anchor-btn btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="anchor-btn btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="anchor-btn btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-responsive-erp">
            <table class="data-table-custom shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="checkMaster"></th>
                        <th>DETAIL</th>
                        <th>RANK</th>
                        <th>STATUS</th>
                        <th style="width: 100px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="no-records">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox All Selection logic
        document.getElementById('checkMaster').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = this.checked);
        }
    </script>

</body>
</html>
