<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 197 - Vendor Notes Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header & Breadcrumb */
        .page-header-main { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-icon { position: absolute; right: 15px; top: 10px; color: #f0ad4e; font-size: 20px; cursor: pointer; }

        /* Navigation Tabs */
        .nav-container { background: #fff; padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; gap: 5px; }
        .erp-btn { font-size: 12px; padding: 6px 12px; border-radius: 4px; color: #fff !important; border: none; font-weight: 600; cursor: pointer; text-decoration: none; }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }

        /* Main Content Grid */
        .main-wrapper { padding: 15px; display: flex; gap: 20px; flex-wrap: wrap; }
        .left-form-panel { flex: 1; min-width: 380px; background: #fff; border: 1px solid #c8d9e2; border-radius: 4px; height: fit-content; }
        .right-table-panel { flex: 2; min-width: 500px; }

        /* Title with Toggle */
        .panel-header { color: #337ab7; padding: 12px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 14px; text-align: center; cursor: pointer; }
        .panel-header:hover { background: #f9f9f9; }

        /* Input Styling */
        .f-row { display: flex; align-items: stretch; margin-bottom: 6px; padding: 0 15px; }
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 130px; text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: flex-end; }
        .f-input-box { border: 1px solid #ddd; height: 35px; width: 100%; padding: 0 10px; outline: none; }
        .req-mark { border-left: 2px solid red; }

        /* Action Buttons */
        .btn-action-group { text-align: center; margin-bottom: 12px; }
        .btn-status { font-size: 11px; padding: 4px 12px; color: #fff; border-radius: 4px; border: none; font-weight: bold; margin: 0 2px; }
        
        .footer-action-bar { background: #f9f9f9; border-top: 1px solid #eee; padding: 20px; text-align: right; }
        .btn-create { background-color: #1a4d80; color: white; border: none; padding: 8px 30px; border-radius: 4px; font-weight: bold; font-size: 14px; }

        /* Table Design */
        .erp-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 10px; text-align: center; font-size: 12px; text-transform: uppercase; 
        }
        .table-red-top { border-top: 3px solid red !important; }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 20px; text-align: center; color: #888; font-style: italic; }

        .hide-form { display: none; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 15px;">Vendor Notes Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="btnLog('Settings Clicked', 'orange')"></i>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="btnLog('Detail Tab', 'blue')"><i class="fa fa-list"></i> Detail</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Add Vendor', 'blue')"><i class="fa fa-plus-circle"></i> Add</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Bulk Import', 'blue')"><i class="fa fa-upload"></i> Bulk Import</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Documents Tab', 'blue')"><i class="fa fa-file-alt"></i> Documents</button>
    <button class="erp-btn bg-green" onclick="btnLog('Notes Tab Active', 'green')"><i class="fa fa-sticky-note"></i> Notes</button>
</div>

<div class="main-wrapper">
    
    <div class="left-form-panel">
        <div class="panel-header" onclick="toggleNoteForm()">
            <i class="fa fa-search me-1"></i> Create Vendor Notes
        </div>
        <div id="noteFormSection">
            <form action="process_vendor_note.php" method="POST" id="vendorNoteForm">
                <div class="py-3">
                    <div class="f-row">
                        <div class="f-label">REG.NO.</div>
                        <input type="text" name="regno" class="f-input-box req-mark" placeholder="Vendor Reg No.">
                    </div>
                    <div class="f-row">
                        <div class="f-label">SUB</div>
                        <input type="text" name="subject" class="f-input-box req-mark" placeholder="Note Subject">
                    </div>
                    <div class="f-row">
                        <div class="f-label">NOTE</div>
                        <textarea name="note_text" class="f-input-box" style="height: 120px; padding: 10px;"></textarea>
                    </div>
                </div>
                <div class="footer-action-bar">
                    <button type="submit" class="btn-create" onclick="btnLog('Creating Note...', 'navy')">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div class="right-table-panel">
        <div class="btn-action-group">
            <button class="btn-status bg-primary" onclick="btnLog('Status: Active', 'blue')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-status" style="background:#f0ad4e;" onclick="btnLog('Status: In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-status" style="background:#d9534f;" onclick="btnLog('Action: Delete Note', 'red')"><i class="fa fa-trash"></i> Delete</button>
        </div>
        
        <table class="erp-table">
            <thead>
                <tr class="table-red-top">
                    <th width="40"><input type="checkbox" onclick="btnLog('Toggle All Selection', 'black')"></th>
                    <th>S.N.</th>
                    <th>REG.NO.</th>
                    <th>VENDOR NOTES</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5">No Vendor Notes data found.</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    // 1. Console Logger
    function btnLog(msg, bgColor) {
        console.log(`%c [ERP-197] %c ${msg}`, 
        `color: white; background: ${bgColor}; padding: 2px 8px; border-radius: 3px; font-weight: bold;`, 
        "color: #000; font-weight: normal;");
    }

    // 2. Hide/Show Form Logic (Filter Button ki tarah handle kiya gaya hai)
    function toggleNoteForm() {
        const formDiv = document.getElementById('noteFormSection');
        if (formDiv.classList.contains('hide-form')) {
            formDiv.classList.remove('hide-form');
            btnLog("Form Section: Visible", "green");
        } else {
            formDiv.classList.add('hide-form');
            btnLog("Form Section: Hidden", "red");
        }
    }

    // 3. Form Handling for PHP
    document.getElementById('vendorNoteForm').onsubmit = function(e) {
        // e.preventDefault(); // Testing ke waqt active rakh sakte hain
        const regno = document.getElementsByName('regno')[0].value;
        const sub = document.getElementsByName('subject')[0].value;

        if(!regno || !sub) {
            alert("Please fill REG.NO and SUB fields.");
            btnLog("Validation Failed: Empty fields", "red");
            return false;
        }

        btnLog("Form data sent to process_vendor_note.php", "purple");
    };

    window.onload = function() {
        btnLog("Vendor Notes Page Loaded", "black");
    };
</script>

</body>
</html>
