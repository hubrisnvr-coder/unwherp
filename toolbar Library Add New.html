<script>
    // 1. Console Logging
    function log(msg, color = "#1a4d80") {
        console.log(`%c [ERP-199] %c ${msg}`, 
        `color: white; background: ${color}; padding: 2px 8px; border-radius: 3px; font-weight: bold;`, 
        "color: #000; font-weight: bold;");
    }

    // 2. Toggle Form (Filter Button logic)
    function toggleForm() {
        const form = document.getElementById('registrationForm');
        if (form.classList.contains('hidden')) {
            form.classList.remove('hidden');
            log("Registration Form: Visible", "green");
        } else {
            form.classList.add('hidden');
            log("Registration Form: Hidden", "red");
        }
    }

    // 3. Validation and Calculation
    window.onload = function() {
        log("Books Add Page Initialized");
        
        // Example logic for Start/End Code calculation (Dynamic feeling for PHP)
        const startInput = document.getElementsByName('start')[0];
        const endInput = document.getElementsByName('end')[0];
        const totalInput = document.getElementsByName('total_qty')[0];

        function calculate() {
            const s = parseInt(startInput.value) || 0;
            const e = parseInt(endInput.value) || 0;
            if(e >= s) {
                totalInput.value = (e - s) + 1;
            }
        }

        startInput.oninput = calculate;
        endInput.oninput = calculate;
    };
</script>
