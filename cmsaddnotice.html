<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Manager - Add Form (ERP17 Clone)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation */
        .top-nav { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .home-link { text-decoration: none; color: #337ab7; font-size: 13px; }
        .setting-btn { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }

        /* Header */
        .page-header { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; border-bottom: 1px dotted #ccc; margin-bottom: 10px; }
        .page-header span { color: #999; font-weight: normal; font-size: 14px; }

        /* Form Layout */
        .form-main { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-bottom: 50px; }
        .form-row-custom { display: flex; border-bottom: 1px solid #eee; min-height: 45px; }
        .label-cell { 
            background: #f1f3f4; width: 220px; padding: 10px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-cell { flex: 1; padding: 8px 15px; display: flex; align-items: center; flex-wrap: wrap; }
        
        .form-control, .form-select { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 5px 10px; height: 32px; }
        textarea.form-control { height: auto; }

        /* Red Mandatory Border */
        .required-border { border-left: 2px solid red !important; }

        /* Editor Toolbar Mockup */
        .editor-container { width: 100%; border: 1px solid #ccc; }
        .editor-toolbar { background: #337ab7; padding: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
        .t-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 2px 7px; font-size: 11px; cursor: pointer; }
        .t-btn:hover { background: rgba(255,255,255,0.1); }

        /* Footer */
        .form-footer { background: #f1f3f4; padding: 12px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 5px; }
        .a-btn { text-decoration: none; padding: 6px 18px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; border: none; }
        .btn-gray { background: #999; }
        .btn-blue { background: #337ab7; }

        @media (max-width: 768px) { .form-row-custom { flex-direction: column; } .label-cell { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>
            <a href="#" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"> <i class="fa fa-angle-right mx-1"></i> Notice</span>
        </div>
        <a href="#" class="setting-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <div class="page-header">Notice Manager <span>» Add form</span></div>
        
        <div class="text-center mb-3">
            <a href="#" class="a-btn btn-blue"><i class="fa fa-list"></i> All Notice</a>
        </div>

        <form class="form-main shadow-sm">
            <div class="form-row-custom">
                <div class="label-cell">Title</div>
                <div class="input-cell">
                    <input type="text" class="form-control w-100 required-border" placeholder="Title">
                </div>
            </div>

            <div class="form-row-custom" style="min-height: 250px;">
                <div class="label-cell">Description</div>
                <div class="input-cell p-0">
                    <div class="editor-container w-100 h-100 d-flex flex-column">
                        <div class="editor-toolbar">
                            <button type="button" class="t-btn"><i class="fa fa-magic"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-bold"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-italic"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-underline"></i></button>
                            <button type="button" class="t-btn">Open Sans <i class="fa fa-caret-down"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-font"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-align-left"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-align-center"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-table"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-link"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-image"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-video"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-times"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-code"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-question-circle"></i></button>
                        </div>
                        <textarea class="form-control w-100 border-0 flex-grow-1 required-border" rows="8"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Image</div>
                <div class="input-cell">
                    <input type="file" class="form-control w-auto me-2">
                    <small class="text-primary"><i class="fa fa-question-circle"></i> Recommended Image Size: 870px X 439px(72dpi)</small>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Attachment File</div>
                <div class="input-cell"><input type="file" class="form-control w-auto"></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Publish Date</div>
                <div class="input-cell"><input type="date" class="form-control" style="width: 200px;"></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">SEO Title</div>
                <div class="input-cell"><input type="text" class="form-control w-100" placeholder="SEO Title"></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">SEO Keyword</div>
                <div class="input-cell"><input type="text" class="form-control w-100" placeholder="abc, efg"></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">SEO Description</div>
                <div class="input-cell"><textarea class="form-control w-100" rows="3" placeholder="Seo Description"></textarea></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Status</div>
                <div class="input-cell">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="active" checked>
                        <label class="form-check-label" for="active">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="inactive">
                        <label class="form-check-label" for="inactive">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <a href="#" class="a-btn btn-gray"><i class="fa fa-undo"></i> Reset</a>
                <a href="#" class="a-btn btn-blue"><i class="fa fa-save"></i> Submit</a>
            </div>
        </form>
    </div>

</body>
</html>
