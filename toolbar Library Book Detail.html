<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 198 - Books Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 12px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header Section */
        .page-title-bar { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-btn { position: absolute; right: 15px; top: 10px; color: #f0ad4e; font-size: 18px; cursor: pointer; }

        /* Multi-level Navigation */
        .nav-level-1, .nav-level-2 { background: #fff; padding: 8px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .nav-level-1 { border-bottom: 1px solid #eee; }
        .nav-level-2 { border-bottom: 1px solid #ddd; }

        .btn-erp { font-size: 11px; padding: 5px 10px; border-radius: 4px; border: none; color: #fff !important; font-weight: 600; cursor: pointer; text-decoration: none; }
        .bg-green { background-color: #5cb85c; }
        .bg-blue { background-color: #337ab7; }
        .bg-orange { background-color: #f0ad4e; }

        /* Filter Section */
        .filter-container { margin: 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        .filter-header { background: #f9f9f9; padding: 10px; text-align: center; color: #337ab7; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; }
        
        .f-row { display: flex; align-items: stretch; margin-bottom: 4px; }
        .f-label { background: #eee; border: 1px solid #ddd; padding: 6px; font-weight: bold; text-align: right; width: 140px; text-transform: uppercase; font-size: 10px; display: flex; align-items: center; justify-content: flex-end; }
        .f-input { border: 1px solid #ddd; height: 32px; width: 100%; padding: 0 8px; outline: none; }
        
        .filter-action-area { background: #f9f9f9; padding: 15px; text-align: right; border-top: 1px solid #eee; }
        .btn-filter { background: #337ab7; color: #fff; border: none; padding: 6px 20px; border-radius: 4px; }

        /* Table Section */
        .table-wrapper { margin: 0 15px; }
        .status-btns { text-align: center; margin-bottom: 10px; }
        .btn-st { font-size: 11px; padding: 4px 12px; color: #fff; border-radius: 4px; border: none; font-weight: bold; margin: 0 2px; }

        .erp-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 8px; text-align: center; font-size: 11px; text-transform: uppercase; 
        }
        .red-top-border { border-top: 3px solid red !important; }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 15px; text-align: center; color: #777; }

        .hide-section { display: none; }
    </style>
</head>
<body>

<div class="page-title-bar">
    <strong style="color:#337ab7;">Books Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-btn"></i>
</div>

<div class="nav-level-1">
    <button class="btn-erp bg-green" onclick="logAction('Book Detail View')"><i class="fa fa-book"></i> Book Detail</button>
    <button class="btn-erp bg-blue" onclick="logAction('Issue History')"><i class="fa fa-history"></i> Issue History</button>
    <button class="btn-erp bg-blue" onclick="logAction('Membership List')"><i class="fa fa-users"></i> Membership</button>
    <button class="btn-erp bg-blue" onclick="logAction('Students Member')"><i class="fa fa-user-graduate"></i> Students Member</button>
    <button class="btn-erp bg-blue" onclick="logAction('Staffs Member')"><i class="fa fa-user-tie"></i> Staffs Member</button>
    <button class="btn-erp bg-blue" onclick="logAction('Student Request')"><i class="fa fa-user-plus"></i> Student Request</button>
    <button class="btn-erp bg-blue" onclick="logAction('Staff Request')"><i class="fa fa-user-tag"></i> Staff Request</button>
    <button class="btn-erp bg-orange" onclick="logAction('Return Period Over')"><i class="fa fa-clock"></i> Return Period Over</button>
</div>

<div class="nav-level-2">
    <button class="btn-erp bg-green" onclick="logAction('Book Detail Active')"><i class="fa fa-book-open"></i> Book Detail</button>
    <button class="btn-erp bg-blue" onclick="logAction('Add New Book')"><i class="fa fa-plus-circle"></i> New Book</button>
    <button class="btn-erp bg-blue" onclick="logAction('Bulk Import Books')"><i class="fa fa-upload"></i> Bulk Import</button>
    <button class="btn-erp bg-blue" onclick="logAction('Book Category Manager')"><i class="fa fa-list"></i> Book Category</button>
</div>

<div class="filter-container">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down me-1"></i> Filter Books <i class="fa fa-filter ms-1"></i>
    </div>
    <div id="filterContent">
        <form action="search_books.php" method="GET" id="filterForm">
            <div class="p-3">
                <div class="row g-0 f-row">
                    <div class="col-md-4 d-flex">
                        <div class="f-label">ISBN NUMBER</div>
                        <input type="text" name="isbn" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">CODE</div>
                        <input type="text" name="code" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">CATEGORY</div>
                        <select name="category" class="f-input">
                            <option value="">Choose a Category...</option>
                        </select>
                    </div>
                </div>
                <div class="row g-0 f-row">
                    <div class="col-md-4 d-flex">
                        <div class="f-label">BOOK NAME</div>
                        <input type="text" name="book_name" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">AUTHOR</div>
                        <input type="text" name="author" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">RACK LOCATION</div>
                        <input type="text" name="rack" class="f-input">
                    </div>
                </div>
                <div class="row g-0 f-row">
                    <div class="col-md-4 d-flex">
                        <div class="f-label">LANGUAGE</div>
                        <input type="text" name="language" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">PUBLISHER</div>
                        <input type="text" name="publisher" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">PUBLISH YEAR</div>
                        <input type="text" name="publish_year" class="f-input">
                    </div>
                </div>
                <div class="row g-0 f-row">
                    <div class="col-md-4 d-flex">
                        <div class="f-label">EDITION</div>
                        <input type="text" name="edition" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">SERIES</div>
                        <input type="text" name="series" class="f-input">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">EDITION YEAR</div>
                        <input type="text" name="edition_year" class="f-input">
                    </div>
                </div>
            </div>
            <div class="filter-action-area">
                <button type="submit" class="btn-filter" onclick="logAction('Applying Filters...', 'navy')"><i class="fa fa-filter"></i> Filter</button>
            </div>
        </form>
    </div>
</div>

<div class="table-wrapper">
    <div class="status-btns">
        <button class="btn-st bg-primary" onclick="logAction('Set Active')"><i class="fa fa-check"></i> Active</button>
        <button class="btn-st bg-warning" onclick="logAction('Set In-Active')"><i class="fa fa-times"></i> In-Active</button>
        <button class="btn-st bg-danger" onclick="logAction('Delete Record')"><i class="fa fa-trash"></i> Delete</button>
    </div>

    <table class="erp-table">
        <thead>
            <tr class="red-top-border">
                <th width="30"><input type="checkbox"></th>
                <th>S.N.</th>
                <th>CATEGORY</th>
                <th>IMAGE</th>
                <th>CODE</th>
                <th>NAME</th>
                <th>AUTHOR</th>
                <th>PUBLISHER</th>
                <th>TOTAL</th>
                <th>ISSUED</th>
                <th>AVAILABLE</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="12">No Books data found. Please Filter Books to show.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Working Console Logs
    function logAction(msg, color = "#337ab7") {
        console.log(`%c [ERP-198] %c ${msg}`, 
        `color: white; background: ${color}; padding: 3px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #000; font-weight: bold;");
    }

    // 2. Filter Toggle Hide/Show
    function toggleFilter() {
        const filter = document.getElementById('filterContent');
        if (filter.classList.contains('hide-section')) {
            filter.classList.remove('hide-section');
            logAction("Filter Section: Shown", "green");
        } else {
            filter.classList.add('hide-section');
            logAction("Filter Section: Hidden", "red");
        }
    }

    // 3. PHP Ready Form Handling
    document.getElementById('filterForm').onsubmit = function(e) {
        // e.preventDefault(); // Uncomment to stop page reload during testing
        logAction("Searching with selected parameters...", "purple");
    };

    window.onload = function() {
        logAction("Books Manager Detail Page Loaded Successfully", "black");
    };
</script>

</body>
</html>
