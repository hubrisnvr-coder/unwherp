<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Breadcrumb Style */
        .top-nav { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .home-link { text-decoration: none; color: #337ab7; font-size: 12px; font-weight: 500; }
        .setting-cog { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Header */
        .page-header { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; border-bottom: 1px dotted #ccc; }
        .page-header span { color: #999; font-weight: normal; font-size: 14px; }

        /* Buttons (Anchor Tags) */
        .all-events-btn { text-decoration: none !important; background-color: #337ab7; color: white !important; padding: 7px 15px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }

        /* ERP Layout Form */
        .erp-form-box { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-bottom: 50px; }
        .row-custom { display: flex; border-bottom: 1px solid #eee; min-height: 42px; }
        .label-bg { 
            background: #f1f3f4; width: 220px; padding: 10px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-bg { flex: 1; padding: 8px 15px; display: flex; align-items: center; flex-wrap: wrap; }
        
        .form-control { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 5px 10px; height: 32px; }
        textarea.form-control { height: auto; }

        /* Mandatory Red Border */
        .req-field { border-left: 2px solid red !important; }

        /* Editor Toolbar Mockup */
        .editor-wrap { width: 100%; border: 1px solid #ccc; }
        .toolbar-blue { background: #337ab7; padding: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
        .t-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 2px 7px; font-size: 11px; cursor: pointer; }

        /* Footer Action Bar */
        .form-footer { background: #f1f3f4; padding: 12px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 6px; }
        .footer-a { text-decoration: none; padding: 7px 20px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; }
        .bg-gray { background: #999; }
        .bg-submit { background: #286090; }

        @media (max-width: 768px) { .row-custom { flex-direction: column; } .label-bg { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>
            <a href="#" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"> <i class="fa fa-angle-right mx-1"></i> Events</span>
        </div>
        <a href="#" class="setting-cog"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <div class="page-header">Events Manager <span>» Add form</span></div>
        
        <div class="text-center mb-3 mt-2">
            <a href="events-list.html" class="all-events-btn"><i class="fa fa-list"></i> All Events</a>
        </div>

        <form class="erp-form-box shadow-sm">
            <div class="row-custom">
                <div class="label-bg">Title</div>
                <div class="input-bg">
                    <input type="text" class="form-control w-100 req-field" placeholder="Title">
                </div>
            </div>

            <div class="row-custom" style="min-height: 250px;">
                <div class="label-bg">Description</div>
                <div class="input-bg p-0">
                    <div class="editor-wrap w-100 h-100 d-flex flex-column">
                        <div class="toolbar-blue">
                            <button type="button" class="t-btn"><i class="fa fa-magic"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-bold"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-italic"></i></button>
                            <button type="button" class="t-btn">Open Sans <i class="fa fa-caret-down"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-align-left"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-link"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-image"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-code"></i></button>
                            <button type="button" class="t-btn"><i class="fa fa-question-circle"></i></button>
                        </div>
                        <textarea class="form-control w-100 border-0 flex-grow-1" rows="8"></textarea>
                    </div>
                </div>
            </div>

            <div class="row-custom">
                <div class="label-bg">Image</div>
                <div class="input-bg">
                    <input type="file" class="form-control w-auto me-2">
                    <small class="text-primary"><i class="fa fa-question-circle"></i> Recommended Image Size: 801px X 439px(72dpi)</small>
                </div>
            </div>

            <div class="row-custom">
                <div class="label-bg">Event Date</div>
                <div class="input-bg"><input type="date" class="form-control req-field" style="width: 250px;"></div>
            </div>

            <div class="row-custom">
                <div class="label-bg">Event Place</div>
                <div class="input-bg"><input type="text" class="form-control w-100 req-field"></div>
            </div>

            <div class="row-custom">
                <div class="label-bg">Event Time</div>
                <div class="input-bg"><input type="text" class="form-control w-100" placeholder="4.00 PM - 8.00 PM"></div>
            </div>

            <div class="row-custom">
                <div class="label-bg">SEO Title</div>
                <div class="input-bg"><input type="text" class="form-control w-100" placeholder="SEO Title"></div>
            </div>

            <div class="row-custom">
                <div class="label-bg">SEO Keyword</div>
                <div class="input-bg"><input type="text" class="form-control w-100" placeholder="SEO Keywords"></div>
            </div>

            <div class="row-custom">
                <div class="label-bg">SEO Description</div>
                <div class="input-bg"><textarea class="form-control w-100" rows="3" placeholder="Seo Description"></textarea></div>
            </div>

            <div class="row-custom">
                <div class="label-bg">Status</div>
                <div class="input-bg">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="ev_st" id="act" checked>
                        <label class="form-check-label" for="act">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="ev_st" id="inact">
                        <label class="form-check-label" for="inact">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <a href="#" class="footer-a bg-gray"><i class="fa fa-undo"></i> Reset</a>
                <a href="javascript:void(0)" class="footer-a bg-submit" onclick="alert('Event Saved Successfully!')"><i class="fa fa-save"></i> Submit</a>
            </div>
        </form>
    </div>

</body>
</html>
