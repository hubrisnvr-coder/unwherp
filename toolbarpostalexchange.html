<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postal Exchange Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
        }

        /* Header Navigation Styles */
        .breadcrumb-container {
            text-align: center;
            padding: 10px;
            background: white;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }
        .breadcrumb-container a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
        .breadcrumb-container span {
            color: #999;
        }

        /* Top Button Bar */
        .top-nav-buttons {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .btn-custom {
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 13px;
            color: white !important;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-detail { background-color: #5cb85c; }
        .btn-new { background-color: #337ab7; }
        .btn-type { background-color: #337ab7; }
        .btn-postal { background-color: #5cb85c; }
        .btn-visitor { background-color: #337ab7; }

        /* Filter Section */
        .filter-section {
            border: 1px solid #ddd;
            background: white;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            color: #337ab7;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* Action Buttons (Active/Delete) */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        .btn-sm-custom {
            padding: 2px 10px;
            font-size: 12px;
            border-radius: 3px;
        }

        /* Table Styles */
        .table-container {
            background: white;
            border: 1px solid #ddd;
            overflow-x: auto;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead th {
            background-color: #e3f2fd;
            color: #337ab7;
            text-align: center;
            border-bottom: 2px solid #ff0000; /* Red line as seen in screenshot */
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            border-right: 1px solid #ddd;
        }
        .no-data {
            padding: 10px;
            color: #666;
            font-style: italic;
        }
        
        /* Settings Icon */
        .settings-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #f0ad4e;
            color: white;
            padding: 5px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    
    <div class="container-fluid">
        <div class="breadcrumb-container">
            <a href="#">Postal Exchange Manager</a> <span>» Detail</span>
        </div>

        <div class="top-nav-buttons">
            <a href="javascript:void(0)" class="btn-custom btn-detail" onclick="handleAction('Detail')">
                <i class="fa fa-list me-1"></i> Detail
            </a>
            <a href="javascript:void(0)" class="btn-custom btn-new" onclick="handleAction('New Exchange')">
                <i class="fa fa-plus me-1"></i> New Exchange
            </a>
            <a href="javascript:void(0)" class="btn-custom btn-type" onclick="handleAction('Exchange Type')">
                <i class="fa fa-list-ul me-1"></i> Exchange Type
            </a>
            <a href="javascript:void(0)" class="btn-custom btn-postal" onclick="handleAction('Postal Exchange')">
                <i class="fa fa-envelope me-1"></i> Postal Exchange
            </a>
            <a href="javascript:void(0)" class="btn-custom btn-visitor" onclick="handleAction('Visitor Log')">
                <i class="fa fa-history me-1"></i> Visitor Log
            </a>
        </div>

        <div class="filter-section" onclick="alert('Filter Toggle Clicked')">
            <i class="fa fa-angle-double-right"></i> Filter Postal Exchange <i class="fa fa-filter"></i>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary btn-sm-custom" onclick="handleAction('Active')"><i class="fa fa-check"></i> Active</button>
            <button class="btn btn-warning btn-sm-custom text-white" onclick="handleAction('In-Active')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn btn-danger btn-sm-custom" onclick="handleAction('Delete')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <div class="table-container">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox"></th>
                        <th>S.N.</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Ref</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Subject</th>
                        <th>File</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="10" class="no-data">
                            No Postal Exchange data found. Please Filter Postal Exchange to show.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function handleAction(actionName) {
            console.log("Action Triggered: " + actionName);
            alert("Aapne '" + actionName + "' button par click kiya hai.");
        }
    </script>
<!--
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
-->
</body>
</html>
