<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Breadcrumb Navigation */
        .erp-nav-top { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .erp-nav-top a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .gear-btn { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Heading */
        .erp-page-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .erp-page-title span { color: #999; font-weight: normal; font-size: 14px; }

        /* Anchor Buttons */
        .btn-all-download { text-decoration: none !important; background-color: #337ab7; color: white !important; padding: 7px 15px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-all-download:hover { background-color: #286090; }

        /* Form Layout - ERP Style */
        .form-card { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-bottom: 30px; }
        .field-row { display: flex; border-bottom: 1px solid #eee; min-height: 45px; }
        .field-label { 
            background: #f1f3f4; width: 220px; padding: 12px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .field-input { flex: 1; padding: 10px 15px; display: flex; align-items: center; }
        
        .form-control { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 5px 10px; height: 34px; }
        textarea.form-control { height: auto; }

        /* Red Mandatory Border */
        .border-req { border-left: 2px solid red !important; }

        /* Footer Actions */
        .form-footer { background: #f1f3f4; padding: 15px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 8px; }
        .footer-a-btn { text-decoration: none; padding: 8px 22px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .btn-gray { background: #999; }
        .btn-dark-blue { background: #286090; }

        @media (max-width: 768px) { .field-row { flex-direction: column; } .field-label { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>
<br>
    <div class="erp-nav-top">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"> <i class="fa fa-angle-right mx-1"></i> Download</span>
        </div>
        <!--
        <a href="#" class="gear-btn"><i class="fa fa-cog"></i></a>
        -->
    </div>

    <div class="container-fluid mt-2">
        <h2 class="erp-page-title">Download Manager <span>» Add form</span></h2>
        
        <div class="text-center mb-3">
            <a href="download-list.html" class="btn-all-download"><i class="fa fa-list"></i> All Download</a>
        </div>

        <form class="form-card shadow-sm">
            
            <div class="field-row">
                <div class="field-label">Title</div>
                <div class="field-input">
                    <input type="text" class="form-control w-100 border-req" placeholder="Title">
                </div>
            </div>

            <div class="field-row">
                <div class="field-label">Description</div>
                <div class="field-input">
                    <textarea class="form-control w-100" rows="8" placeholder="Description"></textarea>
                </div>
            </div>

            <div class="field-row">
                <div class="field-label">Download File</div>
                <div class="field-input">
                    <input type="file" class="form-control w-auto me-2">
                    <span class="text-muted" style="font-size: 12px;">No file chosen</span>
                </div>
            </div>

            <div class="field-row">
                <div class="field-label">Status</div>
                <div class="field-input">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status_radio" id="st_active" checked>
                        <label class="form-check-label" for="st_active" style="font-size: 13px;">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status_radio" id="st_inactive">
                        <label class="form-check-label" for="st_inactive" style="font-size: 13px;">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <a href="#" class="footer-a-btn btn-gray" onclick="location.reload();">
                    <i class="fa fa-undo"></i> Reset
                </a>
                <a href="javascript:void(0)" class="footer-a-btn btn-dark-blue" onclick="alert('File and Data Submitted Successfully!')">
                    <i class="fa fa-save"></i> Submit
                </a>
            </div>

        </form>
    </div>

</body>
</html>
