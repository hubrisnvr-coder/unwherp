<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Analytics Overview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .breadcrumb-container {
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Home Anchor Tag Styling */
        .home-link {
            text-decoration: none;
            color: #333; /* Dark color like screenshot */
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .home-link:hover {
            color: #007bff; /* Hover effect */
            text-decoration: underline;
        }
        .breadcrumb-nav {
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        .analytics-header {
            text-align: center;
            padding: 15px 0;
            color: #007bff;
            font-weight: bold;
        }
        .analytics-header span {
            color: #6c757d;
            font-weight: normal;
        }

        .filter-section {
            background: #f1f3f4;
            padding: 15px;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }

        .btn-filter {
            background-color: #337ab7;
            color: white;
            border: none;
            padding: 6px 20px;
        }
        .btn-filter:hover {
            background-color: #286090;
            color: white;
        }

        .settings-icon {
            background: #f0ad4e;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .filter-section .row > div {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="breadcrumb-container">
        <div class="breadcrumb-nav">
            <a href="#" class="home-link">
                <i class="fa fa-home"></i> Home
            </a> 
            <i class="fa fa-angle-right mx-1"></i> Analytics
        </div>
        <div class="settings-icon">
            <i class="fa fa-cog"></i>
        </div>
    </div>

    <div class="analytics-header">
        Google Analytics <span class="ms-2">» overview</span>
    </div>

    <div class="filter-section">
        <div class="container-fluid">
            <form id="filterForm" class="row align-items-center justify-content-center">
                
                <div class="col-auto">
                    <label class="fw-bold me-2 d-none d-md-inline">DATE RANGE</label>
                </div>
                
                <div class="col-md-2 col-5">
                    <input type="date" class="form-control form-control-sm" id="startDate">
                </div>

                <div class="col-auto px-0 text-center">
                    <i class="fa fa-exchange-alt text-muted"></i>
                </div>

                <div class="col-md-2 col-5">
                    <input type="date" class="form-control form-control-sm" id="endDate">
                </div>

                <div class="col-auto ms-md-4">
                    <label class="fw-bold me-2 d-none d-md-inline">PERIOD</label>
                </div>

                <div class="col-md-2 col-10">
                    <select class="form-select form-select-sm">
                        <option selected>Days</option>
                        <option value="1">Weeks</option>
                        <option value="2">Months</option>
                    </select>
                </div>

                <div class="col-md-auto col-12 text-center mt-2 mt-md-0">
                    <button type="submit" class="btn btn-filter btn-sm">
                        <i class="fa fa-filter"></i> Filter
                    </button>
                </div>

            </form>
        </div>
    </div>

    <div class="container mt-5">
        <div class="text-center text-muted">
            <p>Information Areya...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
