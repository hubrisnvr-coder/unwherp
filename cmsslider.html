<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Manager - Exact Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Breadcrumb/Nav */
        .breadcrumb-container {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .home-link { text-decoration: none; color: #337ab7; font-size: 14px; }
        .settings-btn { background: #f0ad4e; color: white; padding: 6px 12px; border-radius: 4px; border: none; }

        /* Page Title */
        .page-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; }
        .page-title span { color: #999; font-weight: normal; }

        /* Buttons Styling */
        .btn-action-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-custom { 
            padding: 8px 18px; font-size: 13px; font-weight: 500; border-radius: 3px; 
            color: white !important; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; 
        }
        .btn-blue { background-color: #337ab7; }
        .btn-cyan { background-color: #5bc0de; }
        .btn-orange { background-color: #f0ad4e; }
        .btn-red { background-color: #d9534f; }

        /* Filter Slider Bar */
        .filter-slider-bar { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; color: #337ab7; font-weight: bold; margin: 15px 0;
            text-decoration: none; display: block; cursor: pointer;
        }

        /* Table Design */
        .table-responsive { padding: 0 5px; }
        .custom-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .custom-table th { 
            background: #d9edf7; color: #31708f; padding: 12px; 
            border: 1px solid #bce8f1; text-align: center; font-size: 13px; 
            border-top: 2px solid #d9534f; /* Exact Red Border from Screenshot */
        }
        .custom-table td { border: 1px solid #ddd; padding: 12px; vertical-align: middle; color: #333; font-size: 14px; }
        
        .no-data { padding: 15px !important; color: #333; }
    </style>
</head>
<body>

    <div class="breadcrumb-container">
        <div>
            <a href="index.html" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 13px;"> <i class="fa fa-angle-right mx-1"></i> Slider</span>
        </div>
        <button class="settings-btn"><i class="fa fa-cog"></i></button>
    </div>

    <div class="container-fluid mt-3">
        <div class="page-title">Slider Manager <span>» List</span></div>
        
        <div class="btn-action-group">
            <a href="#" class="btn-custom btn-blue"><i class="fa fa-list"></i> All Slider</a>
            <a href="cmsaddslider.html" class="btn-custom btn-cyan"><i class="fa fa-plus"></i> Add Slider</a>
        </div>

        <a href="#" class="filter-slider-bar">
            <i class="fa fa-angle-double-right"></i> Filter Slider <i class="fa fa-filter"></i>
        </a>

        <div class="btn-action-group">
            <a href="#" class="btn-custom btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="btn-custom btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="btn-custom btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-responsive">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox"></th>
                        <th>TITLE</th>
                        <th style="width: 25%;">RANK</th>
                        <th style="width: 25%;">STATUS</th>
                        <th style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="no-data">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
