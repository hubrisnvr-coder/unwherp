<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager | Import - SoftSolution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary-blue: #337ab7;
            --success-green: #5cb85c;
            --btn-dark-blue: #2e6da4;
            --light-bg: #f9f9f9;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 20px;
            font-size: 13px;
        }

        .main-container {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,.05);
            min-height: 400px;
        }

        .breadcrumb-header {
            text-align: center;
            color: var(--primary-blue);
            font-size: 16px;
            padding: 10px;
            border-bottom: 1px solid #eee;
            margin: 0;
        }

        .breadcrumb-header span {
            color: #999;
            font-weight: normal;
        }

        /* Top Navigation Menu */
        .top-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            padding: 15px;
            border-bottom: 1px solid #f1f1f1;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            border: none;
            background-color: var(--primary-blue);
        }

        /* Active color for Bulk Registration */
        .nav-btn.active {
            background-color: var(--success-green);
        }

        /* Content Section */
        .import-section {
            padding: 20px 40px;
        }

        .section-title {
            color: var(--primary-blue);
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .file-upload-row {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            background: #fcfcfc;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .label-box {
            background-color: #eee;
            padding: 10px 20px;
            font-weight: bold;
            min-width: 100px;
            text-align: right;
            border-right: 1px solid #ddd;
        }

        .input-box {
            padding: 10px 20px;
            flex: 1;
        }

        .import-footer {
            background-color: #f5f5f5;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        .btn-import {
            background-color: var(--btn-dark-blue);
            color: white;
            padding: 8px 25px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            border: 1px solid #2e6da4;
            cursor: pointer;
        }

        .btn-import:hover {
            background-color: #286090;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h3 class="breadcrumb-header">Student Manager <span>» Import</span></h3>

    <div class="top-nav">
        <a class="nav-btn" onclick="handleAction('Detail')"><i class="fa fa-list"></i> Detail</a>
        <a class="nav-btn" onclick="handleAction('Registration')"><i class="fa fa-plus"></i> Registration</a>
        <a class="nav-btn active" onclick="handleAction('Bulk Registration')"><i class="fa fa-upload"></i> Bulk Registration</a>
        <a class="nav-btn" onclick="handleAction('Transfer')"><i class="fa fa-exchange"></i> Transfer</a>
        <a class="nav-btn" onclick="handleAction('Documents')"><i class="fa fa-file-text-o"></i> Documents</a>
        <a class="nav-btn" onclick="handleAction('Notes')"><i class="fa fa-sticky-note-o"></i> Notes</a>
        <a class="nav-btn" onclick="handleAction('Balance Fees')"><i class="fa fa-calculator"></i> Balance Fees</a>
        <a class="nav-btn" onclick="handleAction('Library')"><i class="fa fa-book"></i> Library</a>
        <a class="nav-btn" onclick="handleAction('Attendance')"><i class="fa fa-calendar-check-o"></i> Attendance</a>
    </div>

    <div class="import-section">
        <h1 class="section-title">
            <i class="fa fa-download"></i> CSV Template for Bulk Student Import
        </h1>

        <form id="importForm" action="upload.php" method="POST" enctype="multipart/form-data">
            <div class="file-upload-row">
                <div class="label-box">FILE</div>
                <div class="input-box">
                    <input type="file" name="csv_file" id="csv_file" accept=".csv">
                </div>
            </div>

            <div class="import-footer">
                <a class="btn-import" onclick="submitImport()">
                    <i class="fa fa-upload"></i> Import
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    /**
     * Function to handle Top Menu Buttons
     * Baad mein aap ise PHP routing ya AJAX se connect kar sakte hain
     */
    function handleAction(pageName) {
        console.log("Navigating to: " + pageName);
        alert("Redirecting to " + pageName + " Page...");
        // Example: window.location.href = pageName.toLowerCase() + ".php";
    }

    /**
     * Function to handle the Import Button click
     */
    function submitImport() {
        const fileInput = document.getElementById('csv_file');
        
        if (fileInput.files.length === 0) {
            alert("Please choose a file first!");
            return;
        }

        console.log("Starting Import Process...");
        // Yahan aap AJAX call ya form submit kar sakte hain
        document.getElementById('importForm').submit();
    }
</script>

</body>
</html>
