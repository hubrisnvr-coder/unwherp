<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        body { 
            background: #eef2f7; 
            padding: 25px; 
            font-family: 'Outfit', sans-serif; 
        }

        /* Home > Dashboard Text */
        .breadcrumb-box {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 600;
            color: #32325d;
        }

        /* Card Styling - The "Jaan" of the UI */
        .stat-card { 
            border-radius: 20px; 
            color: white; 
            padding: 30px 15px; 
            text-align: center; 
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            overflow: hidden;
            height: 100%;
        }

        /* Glow & Lift Effect */
        .stat-card:hover { 
            transform: translateY(-12px) scale(1.03); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* Icon Animation */
        .stat-card i { 
            font-size: 35px; 
            margin-bottom: 15px; 
            display: block;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            transition: 0.5s;
        }
        .stat-card:hover i {
            transform: rotateY(360deg) scale(1.2);
        }

        /* Number & Text Styling */
        .stat-card h3 { 
            font-size: 32px; 
            margin: 0; 
            font-weight: 800;
        }
        .stat-card p { 
            font-size: 12px; 
            margin-top: 5px;
            text-transform: uppercase; 
            font-weight: 600; 
            letter-spacing: 1.5px;
            opacity: 0.85;
        }

        /* Background Gradients - Ultra Vivid */
        .bg-slider { background: linear-gradient(135deg, #FF512F 0%, #DD2476 100%); }
        .bg-pages  { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        .bg-blogs  { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .bg-notice { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .bg-events { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
        .bg-service{ background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%); }
        .bg-gallery{ background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); }
        .bg-down   { background: linear-gradient(135deg, #373b44 0%, #4286f4 100%); }
        .bg-faq    { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); }
        .bg-test   { background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%); }
        .bg-staff  { background: linear-gradient(135deg, #f85032 0%, #f16c20 100%); }
        .bg-award  { background: linear-gradient(135deg, #434343 0%, #000000 100%); }

        /* Background Decorative Circles */
        .stat-card::before {
            content: ""; position: absolute; top: -20px; right: -20px;
            width: 80px; height: 80px; background: rgba(255,255,255,0.15);
            border-radius: 50%; z-index: 0;
        }

        /* Contact Message Section - Modern White */
        .contact-box {
            background: white;
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .contact-box:hover { box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .btn-view {
            background: #5e72e4; color: white; border-radius: 30px;
            padding: 8px 25px; font-weight: 600; border: none; transition: 0.3s;
        }
        .btn-view:hover { background: #32325d; transform: scale(1.05); }

        /* Mobile Optimization */
        @media (max-width: 576px) {
            .stat-card { padding: 20px 10px; border-radius: 15px; }
            .stat-card h3 { font-size: 22px; }
            .stat-card i { font-size: 25px; }
            .row.g-3 { --bs-gutter-x: 10px; --bs-gutter-y: 10px; }
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="breadcrumb-box">
            <i class="fa fa-home text-primary"></i> Home <i class="fa fa-chevron-right mx-2 text-muted" style="font-size: 10px;"></i> Dashboard
        </div>

        <div class="row g-3">
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-slider">
                    <i class="fa-regular fa-image"></i>
                    <h3>0</h3>
                    <p>Slider</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-pages">
                    <i class="fa-regular fa-copy"></i>
                    <h3>15</h3>
                    <p>Pages</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-blogs">
                    <i class="fa-solid fa-pen-nib"></i>
                    <h3>0</h3>
                    <p>Blog Posts</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-notice">
                    <i class="fa-solid fa-bell"></i>
                    <h3>0</h3>
                    <p>Notice</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-events">
                    <i class="fa-regular fa-calendar-check"></i>
                    <h3>0</h3>
                    <p>Events</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-service">
                    <i class="fa-solid fa-briefcase"></i>
                    <h3>0</h3>
                    <p>Services</p>
                </div>
            </div>
            
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-gallery">
                    <i class="fa-solid fa-camera-retro"></i>
                    <h3>0</h3>
                    <p>Gallery</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-down">
                    <i class="fa-solid fa-cloud-arrow-down"></i>
                    <h3>0</h3>
                    <p>Download</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-faq">
                    <i class="fa-solid fa-circle-question"></i>
                    <h3>0</h3>
                    <p>FAQ</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-test">
                    <i class="fa-solid fa-comments"></i>
                    <h3>0</h3>
                    <p>Testimonial</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-staff">
                    <i class="fa-solid fa-user-tie"></i>
                    <h3>0</h3>
                    <p>Staffs</p>
                </div>
            </div>
            <div class="col-6 col-sm-4 col-md-2">
                <div class="stat-card bg-award">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>0</h3>
                    <p>Client / Award</p>
                </div>
            </div>
        </div>

        <div class="card contact-box mt-4">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-4 border-0">
                <h5 class="mb-0 fw-bold text-dark">Recent Contact Message</h5>
                <button class="btn btn-danger rounded-pill px-4 btn-sm fw-bold shadow">Contact Us</button>
            </div>
            <div class="card-body text-center py-5">
                <p class="text-muted mb-4">No recent messages to display.</p>
                <a href="#" class="btn-view text-decoration-none">
                    View All Messages
                </a>
            </div>
        </div>
    </div>

</body>
</html>
