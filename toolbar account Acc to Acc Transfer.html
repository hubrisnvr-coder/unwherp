<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 160 - Acc To Acc Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 12px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; }
        
        /* Top Header Navigation */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .page-title { font-size: 14px; font-weight: bold; color: #337ab7; margin-bottom: 5px; }
        .settings-icon { position: absolute; right: 20px; top: 10px; color: #f0ad4e; font-size: 20px; cursor: pointer; }

        /* Main Buttons Bar */
        .main-nav { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .erp-btn {
            display: inline-block;
            text-decoration: none !important;
            margin: 2px;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 4px;
            color: #fff !important;
            border: none;
            transition: 0.3s;
        }
        .btn-student { background-color: #5cb85c; }
        .btn-blue { background-color: #337ab7; }
        .btn-green { background-color: #449d44; }

        /* Secondary Tabs Bar */
        .sub-nav { background: #f9f9f9; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        .tab-btn {
            background-color: #337ab7;
            color: white !important;
            padding: 5px 12px;
            border-radius: 3px;
            margin: 2px;
            font-size: 11px;
            border: none;
        }
        .tab-btn.active { background-color: #5cb85c; }

        /* Form Styling */
        .form-container { background: #fff; margin: 20px auto; padding: 0; max-width: 95%; border: 1px solid #eee; }
        .form-row { display: flex; border-bottom: 1px solid #f1f1f1; align-items: stretch; }
        .label-cell { 
            background-color: #f9f9f9; 
            width: 200px; 
            padding: 12px 15px; 
            font-weight: bold; 
            text-align: right; 
            color: #555;
            text-transform: uppercase;
            font-size: 11px;
        }
        .input-cell { flex: 1; padding: 8px 15px; position: relative; }
        
        /* Mandatory Red Line on Left */
        .red-line { 
            position: absolute; 
            left: 0; 
            top: 5px; 
            bottom: 5px; 
            width: 3px; 
            background-color: #d9534f; 
        }

        .custom-input { 
            border-radius: 2px; 
            border: 1px solid #ccc; 
            height: 34px; 
            font-size: 12px; 
            padding: 6px 12px; 
            width: 100%; 
            outline: none; 
        }
        .custom-input:focus { border-color: #66afe9; box-shadow: inset 0 1px 1px rgba(0,0,0,.075), 0 0 8px rgba(102,175,233,.6); }
        textarea.custom-input { height: 80px; resize: vertical; }

        /* Footer Actions */
        .form-footer { background: #f5f5f5; padding: 15px; text-align: center; border-top: 1px solid #ddd; }
        .action-btn { 
            padding: 8px 20px; 
            font-size: 13px; 
            border-radius: 3px; 
            border: none; 
            margin: 0 5px; 
            color: #fff; 
            cursor: pointer;
        }
        .btn-reset { background-color: #99abb4; }
        .btn-save { background-color: #337ab7; }
        .btn-save-add { background-color: #5cb85c; }

        .star-red { color: #d9534f; margin-left: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="page-title">Acc To Acc Transfer Manager <span style="color:#777; font-weight:normal;">» Add</span></div>
    <div class="settings-icon" onclick="consoleAction('Settings Gear Clicked')"><i class="fa fa-cog"></i></div>
</div>

<div class="main-nav">
    <button class="erp-btn btn-student" onclick="consoleAction('Student Fee')"><i class="fa fa-users"></i> Student Fee</button>
    <button class="erp-btn btn-blue" onclick="consoleAction('Staff Payroll')"><i class="fa fa-user-tie"></i> Staff Payroll</button>
    <button class="erp-btn btn-blue" onclick="consoleAction('Ledger')"><i class="fa fa-book"></i> Ledger</button>
    <button class="erp-btn btn-blue" onclick="consoleAction('Transactions')"><i class="fa fa-exchange-alt"></i> Transactions</button>
    <button class="erp-btn btn-blue" onclick="consoleAction('Bank')"><i class="fa fa-university"></i> Bank</button>
</div>

<div class="sub-nav">
    <button class="tab-btn" onclick="consoleAction('Detail Tab')"><i class="fa fa-list"></i> Detail</button>
    <button class="tab-btn" onclick="consoleAction('Transaction Tab')"><i class="fa fa-plus"></i> Transaction</button>
    <button class="tab-btn" onclick="consoleAction('Multi Adj Tab')"><i class="fa fa-plus"></i> Multi Adjustment Transaction</button>
    <button class="tab-btn active" onclick="consoleAction('Acc To Acc Tab')"><i class="fa fa-exchange-alt"></i> Acc To Acc</button>
    <button class="tab-btn" onclick="consoleAction('Ledgers Tab')"><i class="fa fa-address-book"></i> Ledgers</button>
    <button class="tab-btn" onclick="consoleAction('Acc Group Tab')"><i class="fa fa-layer-group"></i> Acc Group</button>
</div>

<div class="form-container">
    <form id="transferForm" action="your_php_script.php" method="POST">
        
        <div class="form-row">
            <div class="label-cell">Date <span class="star-red">*</span></div>
            <div class="input-cell">
                <div class="red-line"></div>
                <input type="date" name="transfer_date" id="transfer_date" class="custom-input">
            </div>
        </div>

        <div class="form-row">
            <div class="label-cell">Source Ledger <span class="star-red">*</span></div>
            <div class="input-cell">
                <div class="red-line"></div>
                <select name="source_ledger" class="custom-input">
                    <option value="">Choose a Ledger...</option>
                    <option value="1">Cash Account</option>
                    <option value="2">Bank Account</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="label-cell">Target Ledger <span class="star-red">*</span></div>
            <div class="input-cell">
                <div class="red-line"></div>
                <select name="target_ledger" class="custom-input">
                    <option value="">Choose a Ledger...</option>
                    <option value="1">Cash Account</option>
                    <option value="2">Bank Account</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="label-cell">Amount <span class="star-red">*</span></div>
            <div class="input-cell">
                <div class="red-line"></div>
                <input type="number" name="amount" class="custom-input" placeholder="Amount" step="0.01">
            </div>
        </div>

        <div class="form-row">
            <div class="label-cell">Description <span class="star-red">*</span></div>
            <div class="input-cell">
                <div class="red-line"></div>
                <textarea name="description" class="custom-input" placeholder="Description"></textarea>
            </div>
        </div>

        <div class="form-footer">
            <button type="button" class="action-btn btn-reset" onclick="resetForm()">
                <i class="fa fa-undo"></i> Reset
            </button>
            <button type="button" class="action-btn btn-save" onclick="submitForm('Save')">
                <i class="fa fa-save"></i> Save
            </button>
            <button type="button" class="action-btn btn-save-add" onclick="submitForm('Save And Add Another')">
                <i class="fa fa-plus-circle"></i> Save And Add Another
            </button>
        </div>
    </form>
</div>

<script>
    // Action Logger for Buttons
    function consoleAction(msg) {
        console.log("%c Action: " + msg, "color: #337ab7; font-weight: bold; border-left: 4px solid #f0ad4e; padding-left: 10px;");
    }

    // Reset Form
    function resetForm() {
        if(confirm("Are you sure you want to reset the form?")) {
            document.getElementById('transferForm').reset();
            consoleAction("Form Reset Successfully");
        }
    }

    // Form Submission Logic
    function submitForm(btnType) {
        const form = document.getElementById('transferForm');
        const formData = new FormData(form);
        
        // Log Data to Console
        console.log("%c Submitting Form Data (" + btnType + "):", "color: #449d44; font-weight: bold;");
        for (let [key, value] of formData.entries()) {
            console.log(key + ": " + value);
        }

        // Basic Validation
        let amount = formData.get('amount');
        if(!amount || amount <= 0) {
            alert("Please enter a valid amount!");
            return;
        }

        alert(btnType + " Successful! Check Browser Console for data.");
    }

    // Auto-set Today's Date
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('transfer_date').value = today;
        consoleAction("Page Loaded - Ready for ERP 160 Transactions");
    };
</script>

</body>
</html>
