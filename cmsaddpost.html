<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Manager - Add Form (ERP19 Clone)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation */
        .top-nav { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .home-link { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .setting-btn { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; }

        /* Page Header */
        .page-header { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; }
        .page-header span { color: #999; font-weight: normal; font-size: 14px; }

        /* Buttons as Anchor Tags */
        .all-btn-link { text-decoration: none !important; background-color: #337ab7; color: white !important; padding: 7px 15px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }

        /* Form Styling - Exact matching erp19.png */
        .form-container { background: #fff; border: 1px solid #ddd; margin-bottom: 50px; }
        .form-row-custom { display: flex; border-bottom: 1px solid #eee; min-height: 42px; }
        .label-cell { 
            background: #f1f3f4; width: 220px; padding: 10px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-cell { flex: 1; padding: 8px 15px; display: flex; align-items: center; flex-wrap: wrap; }
        
        .form-control, .form-select { border-radius: 0; border: 1px solid #ccc; font-size: 13px; padding: 5px 10px; height: 32px; }
        textarea.form-control { height: auto; }

        /* Red Mandatory Indicator */
        .req-border { border-left: 2px solid red !important; }

        /* Toolbar Mockup (Blue style from ERP) */
        .editor-box { width: 100%; border: 1px solid #ccc; }
        .toolbar { background: #337ab7; padding: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
        .tool-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 2px 7px; font-size: 11px; cursor: pointer; }

        /* Footer */
        .footer-action { background: #f1f3f4; padding: 12px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 6px; }
        .footer-a { text-decoration: none; padding: 7px 20px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; }
        .bg-reset { background: #999; }
        .bg-submit { background: #286090; }

        @media (max-width: 768px) { .form-row-custom { flex-direction: column; } .label-cell { width: 100%; text-align: left; justify-content: flex-start; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>
            <a href="#" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted"> <i class="fa fa-angle-right mx-1"></i> Post</span>
        </div>
        <a href="#" class="setting-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <div class="page-header">Post Manager <span>» Add form</span></div>
        
        <div class="text-center mb-3">
            <a href="post-list.html" class="all-btn-link"><i class="fa fa-list"></i> All Post</a>
        </div>

        <form class="form-container shadow-sm">
            <div class="form-row-custom">
                <div class="label-cell">Category</div>
                <div class="input-cell">
                    <select class="form-select w-100">
                        <option>Select Category</option>
                    </select>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Title</div>
                <div class="input-cell">
                    <input type="text" class="form-control w-100" placeholder="Title">
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Short Description</div>
                <div class="input-cell">
                    <textarea class="form-control w-100" rows="2"></textarea>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Image</div>
                <div class="input-cell">
                    <input type="file" class="form-control w-auto me-2">
                    <small class="text-primary"><i class="fa fa-question-circle"></i> Recommended Image Size: 870px X 439px(72dpi)</small>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Detail Description</div>
                <div class="input-cell p-0">
                    <div class="editor-box">
                        <div class="toolbar">
                            <button type="button" class="tool-btn"><i class="fa fa-magic"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-bold"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-italic"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-underline"></i></button>
                            <button type="button" class="tool-btn">Open Sans <i class="fa fa-caret-down"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-font"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-align-left"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-table"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-link"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-image"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-code"></i></button>
                            <button type="button" class="tool-btn"><i class="fa fa-question-circle"></i></button>
                        </div>
                        <textarea class="form-control border-0 w-100" rows="10"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Publish Date</div>
                <div class="input-cell">
                    <input type="date" class="form-control req-border" style="width: 250px;">
                </div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">SEO Title</div>
                <div class="input-cell"><input type="text" class="form-control w-100" placeholder="SEO Title"></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">SEO Keyword</div>
                <div class="input-cell"><input type="text" class="form-control w-100" placeholder="SEO Keyword"></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">SEO Description</div>
                <div class="input-cell"><textarea class="form-control w-100" rows="3" placeholder="SEO Description"></textarea></div>
            </div>

            <div class="form-row-custom">
                <div class="label-cell">Status</div>
                <div class="input-cell">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="st" id="act" checked>
                        <label class="form-check-label" for="act">Active</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="st" id="inact">
                        <label class="form-check-label" for="inact">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="footer-action">
                <a href="#" class="footer-a bg-reset"><i class="fa fa-undo"></i> Reset</a>
                <a href="javascript:void(0)" class="footer-a bg-submit" onclick="alert('Form Submitted!')"><i class="fa fa-save"></i> Submit</a>
            </div>
        </form>
    </div>

</body>
</html>
