<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Breadcrumb Navigation */
        .top-nav-bar {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .home-link { text-decoration: none; color: #337ab7; font-size: 13px; }
        .settings-icon-btn { background: #f0ad4e; color: white; border: none; padding: 5px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title */
        .page-header-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; }
        .page-header-title span { color: #999; font-weight: normal; font-size: 15px; }

        /* Action Buttons Group */
        .action-container { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .a-btn { 
            text-decoration: none; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .a-primary { background-color: #337ab7; } /* All Notice */
        .a-dark-blue { background-color: #286090; } /* Add Notice */
        .a-success { background-color: #337ab7; } /* Active */
        .a-warning { background-color: #f0ad4e; } /* In-Active */
        .a-danger { background-color: #d9534f; } /* Delete */

        /* Filter Section */
        .filter-strip { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
        }
        .filter-strip a { text-decoration: none; color: #337ab7; font-weight: bold; font-size: 15px; }

        /* Table UI - Matching erp16.png */
        .table-responsive-wrapper { padding: 0 5px; }
        .notice-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .notice-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Red Top Border */
            font-size: 13px; text-transform: uppercase;
        }
        .notice-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .no-data-text { color: #333; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-nav-bar">
        <div>
            <a href="#" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Notice</span>
        </div>
        <a href="#" class="settings-icon-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-3">
        <div class="page-header-title">Notice Manager <span>» List</span></div>
        
        <div class="action-container">
            <a href="#" class="a-btn a-primary"><i class="fa fa-list"></i> All Notice</a>
            <a href="cmsaddnotice.html" class="a-btn a-dark-blue"><i class="fa fa-plus"></i> Add Notice</a>
        </div>

        <div class="filter-strip shadow-sm">
            <a href="#"><i class="fa fa-angle-double-right"></i> Filter Notice <i class="fa fa-filter"></i></a>
        </div>

        <div class="action-container">
            <a href="#" class="a-btn a-primary"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="a-btn a-warning"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="a-btn a-danger"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-responsive-wrapper">
            <table class="notice-table">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox"></th>
                        <th style="width: 20%;">TITLE</th>
                        <th>DESCRIPTION</th>
                        <th style="width: 15%;">LAST UPDATED</th>
                        <th style="width: 15%;">STATUS</th>
                        <th style="width: 5%;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="no-data-text">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
