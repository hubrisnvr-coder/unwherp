<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonial Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Breadcrumb Navigation */
        .erp-top-bar {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-top-bar a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .settings-gear-icon { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Heading */
        .page-header-erp { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .page-header-erp span { color: #999; font-weight: normal; font-size: 14px; }

        /* Navigation Buttons (Anchor Tags) */
        .btn-flex-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .erp-anchor-btn { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; transition: 0.2s;
        }
        .bg-btn-blue { background-color: #337ab7; }
        .bg-btn-dark { background-color: #286090; }
        .bg-btn-orange { background-color: #f0ad4e; }
        .bg-btn-red { background-color: #d9534f; }
        .erp-anchor-btn:hover { opacity: 0.9; }

        /* Filter Section Strip */
        .filter-strip { 
            border: 1px solid #ddd; background: #fff; padding: 11px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold; font-size: 14px;
        }

        /* Table Design matching erp36.png */
        .table-wrap-erp { padding: 0 4px; }
        .list-table-erp { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .list-table-erp th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Required Red Top Border */
            font-size: 13px; text-transform: uppercase;
        }
        .list-table-erp td { border: 1px solid #ddd; padding: 12px 10px; font-size: 14px; color: #333; }
        .empty-row-text { text-align: left; padding-left: 15px !important; color: #444; }
    </style>
</head>
<body>

    <div class="erp-top-bar">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Testimonial</span>
        </div>
        <a href="#" class="settings-gear-icon"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="page-header-erp">Testimonial Manager <span>» List</span></h2>
        
        <div class="btn-flex-container mt-3">
            <a href="#" class="erp-anchor-btn bg-btn-blue"><i class="fa fa-list"></i> All Testimonial</a>
            <a href="cmsaddnewtestimonial.html" class="erp-anchor-btn bg-btn-dark"><i class="fa fa-plus"></i> Add Testimonial</a>
        </div>

        <a href="javascript:void(0);" class="filter-strip shadow-sm" onclick="alert('Opening Testimonial Filter...')">
            <i class="fa fa-angle-double-right"></i> Filter Testimonial <i class="fa fa-filter"></i>
        </a>

        <div class="btn-flex-container">
            <a href="#" class="erp-anchor-btn bg-btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-anchor-btn bg-btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-anchor-btn bg-btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-wrap-erp">
            <table class="list-table-erp shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="masterCheckbox"></th>
                        <th>DETAIL</th>
                        <th>STATUS</th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="empty-row-text">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox toggle functionality
        document.getElementById('masterCheckbox').onclick = function() {
            let boxes = document.querySelectorAll('input[type="checkbox"]');
            boxes.forEach(box => box.checked = this.checked);
        }
    </script>

</body>
</html>
