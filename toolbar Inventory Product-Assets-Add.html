<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 185 - Product/Assets Manager Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header */
        .page-header-main { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        
        /* Navigation Tabs */
        .nav-container { background: #fff; padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; gap: 5px; }
        .erp-btn { font-size: 12px; padding: 6px 12px; border-radius: 4px; color: #fff !important; border: none; font-weight: 600; cursor: pointer; }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }

        /* Bulk Button */
        .bulk-action-row { padding: 10px 15px; text-align: right; }
        .btn-bulk { background-color: #337ab7; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; }

        /* Form Container */
        .form-wrapper { margin: 0 15px 20px 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        
        /* Tab Title Style */
        .tab-title { border-bottom: 1px solid #ddd; padding: 0 15px; display: flex; }
        .tab-active { border: 1px solid #ddd; border-bottom: none; padding: 8px 20px; color: #f0ad4e; font-weight: bold; background: #fff; margin-bottom: -1px; margin-top: 5px; border-radius: 4px 4px 0 0; cursor: pointer; }

        .info-strip { background: #337ab7; color: white; padding: 5px 15px; font-size: 12px; display: inline-block; border-radius: 0 15px 15px 0; margin: 15px 0; }

        /* Form Layout */
        .f-row { display: flex; align-items: stretch; margin-bottom: 2px; }
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 150px; text-transform: uppercase; font-size: 11px; }
        .f-input-box { border: 1px solid #ddd; height: 35px; width: 100%; padding: 0 10px; outline: none; border-left: 2px solid red; }
        .f-input-no-red { border-left: 1px solid #ddd; }
        
        textarea.f-input-box { height: 80px; padding: 10px; border-left: 1px solid #ddd; }

        /* Image Section */
        .image-section-title { text-align: center; color: #d9534f; font-weight: bold; padding: 10px; border-top: 1px solid #eee; margin-top: 10px; }
        .product-preview { width: 80px; height: 80px; border: 1px solid #ddd; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }

        /* Footer Buttons */
        .form-footer { background: #eee; padding: 15px; text-align: right; border-top: 1px solid #ddd; }
        .btn-reset { background: #aaa; color: #fff; border: none; padding: 8px 25px; border-radius: 4px; margin-right: 5px; }
        .btn-register { background: #1a4d80; color: #fff; border: none; padding: 8px 25px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 16px;">Product/Assets Manager</strong> <span style="color:#999;">» Registration</span>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="btnLog('Detail Tab Clicked', 'blue')"><i class="fa fa-list"></i> Detail</button>
    <button class="erp-btn bg-green" onclick="btnLog('Registration Tab Active', 'green')"><i class="fa fa-plus-circle"></i> Registration</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Bulk Registration Clicked', 'blue')"><i class="fa fa-upload"></i> Bulk Registration</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Category Tab Clicked', 'blue')"><i class="fa fa-tags"></i> Category</button>
</div>

<div class="bulk-action-row">
    <button class="btn-bulk" onclick="btnLog('Bulk Product Registration Clicked', 'navy')"><i class="fa fa-upload"></i> Bulk Product Registration</button>
</div>

<div class="form-wrapper">
    <div class="tab-title">
        <div class="tab-active" onclick="toggleForm()">Product Info</div>
    </div>

    <div id="registrationContent">
        <form action="register_product.php" method="POST" enctype="multipart/form-data" id="productForm">
            <div class="p-3">
                <div class="info-strip">Red mark input field are required.</div>

                <div class="row g-0 f-row">
                    <div class="col-md-6 d-flex">
                        <div class="f-label">CATEGORY</div>
                        <select name="category" class="f-input-box" required>
                            <option value="">Select Category</option>
                        </select>
                        <select name="sub_category" class="f-input-box f-input-no-red">
                            <option value="">Select Sub Category....</option>
                        </select>
                    </div>
                    <div class="col-md-6 d-flex">
                        <div class="f-label">CODE</div>
                        <input type="text" name="code" class="f-input-box f-input-no-red" value="PRO848660" readonly>
                    </div>
                </div>

                <div class="row g-0 f-row">
                    <div class="col-md-8 d-flex">
                        <div class="f-label">NAME</div>
                        <input type="text" name="product_name" class="f-input-box" required>
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">WARRANTY/EXPIRE</div>
                        <input type="text" name="warranty" class="f-input-box f-input-no-red">
                    </div>
                </div>

                <div class="row g-0 f-row">
                    <div class="col-md-4 d-flex">
                        <div class="f-label">STOCK</div>
                        <input type="number" name="stock" class="f-input-box f-input-no-red">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">COST PRICE</div>
                        <input type="text" name="cost_price" class="f-input-box f-input-no-red">
                    </div>
                    <div class="col-md-4 d-flex">
                        <div class="f-label">SALE PRICE</div>
                        <input type="text" name="sale_price" class="f-input-box f-input-no-red">
                    </div>
                </div>

                <div class="row g-0 f-row">
                    <div class="col-md-12 d-flex">
                        <div class="f-label">DESCRIPTION</div>
                        <textarea name="description" class="f-input-box"></textarea>
                    </div>
                </div>

                <div class="image-section-title"><i class="fa fa-plus"></i> Image</div>
                <div class="row g-0 f-row align-items-center">
                    <div class="col-md-8 d-flex">
                        <div class="f-label">PRODUCT</div>
                        <input type="file" name="product_image" class="f-input-box f-input-no-red" style="padding-top: 5px;">
                    </div>
                    <div class="col-md-4 ps-3">
                        <div class="product-preview">
                            <i class="fa fa-user fa-3x text-lightgray" style="color:#ccc;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <button type="reset" class="btn-reset" onclick="btnLog('Form Reset Clicked', 'gray')">Reset</button>
                <button type="submit" class="btn-register" onclick="btnLog('Register Button Clicked', 'navy')">Register</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Console Logger
    function btnLog(msg, color) {
        console.log(`%c [ERP-185] %c ${msg}`, 
        `color: white; background: ${color}; padding: 3px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #000; font-weight: bold;");
    }

    // Toggle Form Content (Filter jaisa hide/show)
    function toggleForm() {
        const content = document.getElementById('registrationContent');
        if (content.style.display === "none") {
            content.style.display = "block";
            btnLog("Product Info Section: Shown", "green");
        } else {
            content.style.display = "none";
            btnLog("Product Info Section: Hidden", "red");
        }
    }

    // PHP Form Submit Simulation
    document.getElementById('productForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog("Form submitted to register_product.php", "purple");
        alert("Product Registration Data sent to server!");
    };

    window.onload = function() {
        btnLog("Page Loaded - Gear Icon Removed", "black");
    };
</script>

</body>
</html>
