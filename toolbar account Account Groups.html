<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 162 - Account Group Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 11px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; overflow-x: hidden; }
        
        /* Top Navigation */
        .page-header-main { background: #fff; padding: 5px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .settings-gear { position: absolute; right: 15px; top: 8px; color: #f0ad4e; font-size: 16px; cursor: pointer; }
        
        .nav-container { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        .erp-btn {
            display: inline-block;
            margin: 2px;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 3px;
            color: #ffffff !important;
            border: none;
            cursor: pointer;
            text-decoration: none !important;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }
        .bg-orange { background-color: #f0ad4e; }
        .bg-red { background-color: #d9534f; }

        /* Sidebar Form */
        .sidebar-form { background: #fff; border-right: 1px solid #ddd; height: calc(100vh - 120px); padding: 15px; }
        .form-label-custom { font-weight: bold; background: #eee; padding: 5px; display: block; border: 1px solid #ddd; margin-bottom: 0; text-transform: uppercase; }
        .form-control-custom { border-radius: 0; border: 1px solid #ddd; height: 30px; font-size: 11px; margin-bottom: 10px; width: 100%; outline: none; padding: 0 5px; }
        .form-control-custom:focus { border-color: #337ab7; }

        /* Main Table Section */
        .main-content { padding: 15px; background: #fff; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 8px; text-align: center; font-size: 10px;
            border-bottom: 2px solid red; /* Signature ERP line */
        }
        .erp-table tbody td { border: 1px solid #eee; padding: 5px; text-align: center; vertical-align: middle; font-size: 10px; }

        /* Small UI Elements */
        .status-badge { background: #337ab7; color: #fff; padding: 2px 6px; border-radius: 2px; border: none; font-size: 9px; }
        .action-icon-btn { border: none; padding: 3px 6px; border-radius: 2px; color: white; margin: 0 1px; }
        .btn-edit { background: #5cb85c; }
        .btn-del { background: #d9534f; }
        
        .search-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .toggle-section { display: block; } /* Initial state for form */

        /* Success Message bar */
        .msg-bar { background: #dff0d8; border: 1px solid #d6e9c6; color: #3c763d; padding: 5px 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7;">Account Group Manager</strong> <span style="color:#999;">» Detail</span>
    <div class="settings-gear" onclick="logAction('Settings')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="logAction('Student Fee')">Student Fee</button>
    <button class="erp-btn bg-blue" onclick="logAction('Staff Payroll')">Staff Payroll</button>
    <button class="erp-btn bg-blue" onclick="logAction('Ledger')">Ledger</button>
    <button class="erp-btn bg-blue" onclick="logAction('Transactions')">Transactions</button>
    <button class="erp-btn bg-blue" onclick="logAction('Bank')">Bank</button>
</div>

<div class="nav-container" style="background:#f9f9f9;">
    <button class="erp-btn bg-blue" onclick="logAction('Detail')"><i class="fa fa-list"></i> Detail</button>
    <button class="erp-btn bg-blue" onclick="logAction('Transaction')"><i class="fa fa-plus"></i> Transaction</button>
    <button class="erp-btn bg-blue" onclick="logAction('Multi Adj')"><i class="fa fa-plus"></i> Multi Adjustment</button>
    <button class="erp-btn bg-blue" onclick="logAction('Acc To Acc')"><i class="fa fa-exchange-alt"></i> Acc To Acc</button>
    <button class="erp-btn bg-blue" onclick="logAction('Ledgers')"><i class="fa fa-address-book"></i> Ledgers</button>
    <button class="erp-btn bg-green" onclick="logAction('Acc Group')"><i class="fa fa-layer-group"></i> Acc Group</button>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar-form" id="filterSection">
            <h6 class="text-primary mb-3" onclick="toggleFilter()" style="cursor:pointer">
                <i class="fa fa-search"></i> Create Account Group 
            </h6>
            
            <form id="groupForm" onsubmit="event.preventDefault(); logAction('Form Submitted');">
                <label class="form-label-custom">Account</label>
                <input type="text" name="account_name" class="form-control-custom" placeholder="Group Name">
                
                <label class="form-label-custom">Alias Name</label>
                <input type="text" name="alias_name" class="form-control-custom" placeholder="Alias Name">
                
                <label class="form-label-custom">Debit</label>
                <select name="debit_type" class="form-control-custom">
                    <option value="">Select +/-</option>
                    <option value="+">+</option>
                    <option value="-">-</option>
                </select>
                
                <label class="form-label-custom">Credit</label>
                <select name="credit_type" class="form-control-custom">
                    <option value="">Select +/-</option>
                    <option value="+">+</option>
                    <option value="-">-</option>
                </select>

                <div class="text-end">
                    <button type="submit" class="erp-btn bg-blue w-100 mt-2">
                        <i class="fa fa-plus-square"></i> Create
                    </button>
                </div>
            </form>
        </div>

        <div class="col-md-9 main-content">
            <div class="msg-bar">Account Group Active Successfully.</div>
            
            <div class="text-center mb-3">
                <button class="erp-btn bg-blue" onclick="logAction('Bulk Active')">Active</button>
                <button class="erp-btn bg-orange" onclick="logAction('Bulk Inactive')">In-Active</button>
                <button class="erp-btn bg-red" onclick="logAction('Bulk Delete')">Delete</button>
            </div>

            <div class="search-row">
                <div>
                    Display <select class="p-1 border"><option>All</option></select> records
                </div>
                <div>
                    <button class="btn btn-outline-secondary btn-sm" onclick="logAction('Refresh')"><i class="fa fa-sync"></i> Refresh</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="logAction('PDF')"><i class="fa fa-file-pdf"></i></button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="logAction('Excel')"><i class="fa fa-file-excel"></i></button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="logAction('Print')"><i class="fa fa-print"></i></button>
                    <span class="ms-2">Search:</span> <input type="text" class="border p-1" style="width:120px;">
                </div>
            </div>

            <div class="table-responsive">
                <table class="erp-table">
                    <thead>
                        <tr>
                            <th width="30px"><input type="checkbox" onclick="toggleCheckAll(this)"></th>
                            <th width="40px">S.N.</th>
                            <th>ACCOUNT GROUP</th>
                            <th>TYPE</th>
                            <th>DEBIT</th>
                            <th>CREDIT</th>
                            <th>STATUS</th>
                            <th width="80px">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td><input type="checkbox" class="row-check"></td>
                            <td>1</td>
                            <td class="text-start text-primary">ACCOUNTS PAYABLE - [1]</td>
                            <td>LIABILITY</td>
                            <td>DECREASE</td>
                            <td>INCREASE</td>
                            <td><button class="status-badge">Active <i class="fa fa-caret-down"></i></button></td>
                            <td>
                                <button class="action-icon-btn btn-edit" onclick="logAction('Edit 1')"><i class="fa fa-edit"></i></button>
                                <button class="action-icon-btn btn-del" onclick="logAction('Delete 1')"><i class="fa fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" class="row-check"></td>
                            <td>2</td>
                            <td class="text-start text-primary">ACCOUNTS RECEIVABLE - [2]</td>
                            <td>ASSET</td>
                            <td>INCREASE</td>
                            <td>DECREASE</td>
                            <td><button class="status-badge">Active <i class="fa fa-caret-down"></i></button></td>
                            <td>
                                <button class="action-icon-btn btn-edit" onclick="logAction('Edit 2')"><i class="fa fa-edit"></i></button>
                                <button class="action-icon-btn btn-del" onclick="logAction('Delete 2')"><i class="fa fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="d-flex justify-content-between mt-2" style="font-size:10px; color:#777;">
                <div>Showing 1 to 2 of 52 entries</div>
                <div class="btn-group">
                    <button class="btn btn-sm btn-light border" disabled>Previous</button>
                    <button class="btn btn-sm btn-primary">1</button>
                    <button class="btn btn-sm btn-light border">Next</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Console logging function for buttons
    function logAction(actionName) {
        console.log("%c [ERP 162]: " + actionName + " clicked", "color: #337ab7; font-weight: bold;");
    }

    // Toggle Sidebar/Filter
    function toggleFilter() {
        const form = document.getElementById('groupForm');
        if(form.style.display === "none") {
            form.style.display = "block";
            logAction("Filter Form Shown");
        } else {
            form.style.display = "none";
            logAction("Filter Form Hidden");
        }
    }

    // Checkbox All Toggle
    function toggleCheckAll(source) {
        const checkboxes = document.querySelectorAll('.row-check');
        checkboxes.forEach(cb => cb.checked = source.checked);
        logAction("Toggle All Checkboxes: " + source.checked);
    }

    // Initialize - PHP ready
    window.onload = function() {
        console.log("ERP 162 Page Initialized. Ready for PHP dynamic data.");
    };
</script>

</body>
</html>
