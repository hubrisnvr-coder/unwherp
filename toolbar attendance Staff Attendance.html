<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 179 - Staff Attendance Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Typography & Global Styles */
        body { background-color: #f4f7f6; font-size: 14px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Top Header & Breadcrumb */
        .page-header-main { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .settings-gear { 
            position: absolute; right: 20px; top: 10px; color: #f0ad4e; font-size: 22px; cursor: pointer; 
            border: 1px solid #f0ad4e; border-radius: 4px; padding: 4px 10px; background: #fff8ee; 
        }

        /* Navigation Section */
        .nav-container { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .erp-btn {
            font-size: 13px; padding: 7px 16px; border-radius: 4px; color: #fff !important; 
            border: none; cursor: pointer; text-decoration: none !important; font-weight: 600; transition: 0.3s;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }
        .active-tab { border: 2px solid #000; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* Filter Section */
        .filter-wrapper { margin: 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        .filter-header { 
            background: #fff; padding: 12px; text-align: center; color: #337ab7; 
            cursor: pointer; font-weight: bold; font-size: 16px; border-bottom: 1px solid #eee;
        }
        .filter-content { display: block; padding: 25px; background: #fdfdfd; }
        
        /* Grid Layout for Filter Labels and Inputs */
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 140px; text-transform: uppercase; font-size: 12px; }
        .f-input-box { border: 1px solid #ddd; height: 38px; font-size: 14px; width: 100%; padding: 0 10px; outline: none; }
        .f-input-box:focus { border-color: #337ab7; box-shadow: 0 0 5px rgba(51,122,183,0.3); }
        .f-sep { background: #eee; border: 1px solid #ddd; padding: 8px; width: 45px; text-align: center; font-weight: bold; }

        /* Table Styling */
        .table-container { background: #fff; margin: 0 15px; border: 1px solid #ddd; overflow-x: auto; }
        .erp-table { width: 100%; border-collapse: collapse; min-width: 1500px; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 10px 4px; text-align: center; font-size: 12px; white-space: nowrap;
        }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 12px 6px; text-align: center; color: #555; }
        
        /* Red Line Border - Matching Screenshot Detail */
        .red-line-top { border-top: 3px solid red !important; }

        /* Action Buttons */
        .action-bar { margin: 15px; text-align: center; }
        .btn-status { font-size: 13px; padding: 7px 20px; color: #fff; border-radius: 4px; margin: 0 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-filter-submit { background-color: #1a4d80; color: white; border: none; padding: 12px 40px; border-radius: 4px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 20px;">Staff Attendance Manager</strong> <span style="color:#999;">» Detail</span>
    <div class="settings-gear" onclick="btnLog('Settings Gear Icon Clicked', 'orange')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <div>
        <button class="erp-btn bg-green active-tab" onclick="btnLog('Attendance Detail Tab', 'green')"><i class="fa fa-list"></i> Attendance Detail</button>
        <button class="erp-btn bg-blue" onclick="btnLog('Add/Edit Staff Attendance', 'blue')"><i class="fa fa-plus-circle"></i> Add / Edit Staff Attendance</button>
    </div>
    <div>
        <button class="erp-btn bg-blue" onclick="btnLog('Student Regular Attendance', 'blue')"><i class="fa fa-calendar-alt"></i> Student Regular Attendance</button>
        <button class="erp-btn bg-blue" onclick="btnLog('Student Subject Wise Attendance', 'blue')"><i class="fa fa-book"></i> Student Subject Wise Attendance</button>
        <button class="erp-btn bg-green" onclick="btnLog('Staff Attendance View', 'green')"><i class="fa fa-user-tie"></i> Staff Attendance</button>
    </div>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down me-2" id="filterIcon"></i> FILTER STAFF ATTENDANCE <i class="fa fa-filter ms-2"></i>
    </div>
    <div class="filter-content" id="filterBox">
        <form id="attendanceForm" action="staff_process.php" method="POST">
            <div class="row g-3">
                <div class="col-md-4 d-flex">
                    <div class="f-label">REG.NO.</div>
                    <input type="text" name="reg_no" class="f-input-box" placeholder="Enter Reg. No.">
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">JOIN DATE</div>
                    <input type="date" class="f-input-box">
                    <div class="f-sep"><i class="fa fa-arrows-left-right"></i></div>
                    <input type="date" class="f-input-box">
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">DESIGNATION</div>
                    <select class="f-input-box"><option>Select Designation</option></select>
                    <div class="f-label ms-1" style="width:100px;">STATUS</div>
                    <select class="f-input-box"><option>Status</option></select>
                </div>

                <div class="col-md-4 d-flex">
                    <div class="f-label">YEAR</div>
                    <select class="f-input-box"><option>Select Year</option></select>
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">MONTH</div>
                    <select class="f-input-box"><option>Select Month</option></select>
                </div>

                <div class="col-md-4 text-end">
                    <button type="reset" class="btn btn-outline-secondary me-2" onclick="btnLog('Filter Reset', 'gray')">Clear</button>
                    <button type="submit" class="btn-filter-submit" onclick="btnLog('Filter Staff Data Executed', 'navy')"><i class="fa fa-search"></i> FILTER</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="action-bar">
    <button class="btn-status bg-primary" onclick="btnLog('Bulk Status: Active', 'blue')"><i class="fa fa-check"></i> Active</button>
    <button class="btn-status" style="background:#f0ad4e;" onclick="btnLog('Bulk Status: In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
    <button class="btn-status" style="background:#d9534f;" onclick="btnLog('Bulk Action: Delete Records', 'red')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div class="table-container">
    <table class="erp-table">
        <thead>
            <tr class="red-line-top">
                <th width="40"><input type="checkbox" onclick="btnLog('Master Checkbox Toggled', 'black')"></th>
                <th width="50">S.N.</th>
                <th width="70">YEAR</th>
                <th width="80">MONTH</th>
                <th width="90">REG.NO.</th>
                <th width="200">STAFF NAME</th>
                <script>
                    for(let i=1; i<=31; i++) {
                        document.write(`<th width="32" title="Day ${i}">${i}</th>`);
                    }
                </script>
                <th style="background:#e8f5e9">PRESENT</th>
                <th style="background:#ffebee">ABSENT</th>
                <th style="background:#fff3e0">LATE</th>
                <th style="background:#e3f2fd">LEAVE</th>
                <th style="background:#f3e5f5">HOLIDAY</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="45" style="padding:60px; text-align:center; color:#888; background:#fff;">
                    <i class="fa fa-folder-open fa-2x mb-3 d-block"></i>
                    No Staff Attendance data found. Please use the filter above to show records.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Colorful Console Logger
    function btnLog(msg, color) {
        console.log(`%c [ERP-179 LOG] %c ${msg}`, 
        `color: white; background: ${color}; padding: 4px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #333; font-weight: bold; border-bottom: 1px solid #333;");
    }

    // 2. Toggle Filter Section Functionality
    function toggleFilter() {
        const box = document.getElementById('filterBox');
        const icon = document.getElementById('filterIcon');
        if (box.style.display === "none") {
            box.style.display = "block";
            icon.className = "fa fa-chevron-down me-2";
            btnLog("Filter Section Expanded", "#1a4d80");
        } else {
            box.style.display = "none";
            icon.className = "fa fa-chevron-up me-2";
            btnLog("Filter Section Collapsed", "#1a4d80");
        }
    }

    // 3. Prevent Form Reload for Demo (PHP Ready)
    document.getElementById('attendanceForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog("Form data sent to staff_process.php", "purple");
    };

    // Page Load Signal
    window.onload = function() {
        btnLog("Staff Attendance Detail Page Initialized", "#000");
    };
</script>

</body>
</html>
