<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 165 - Bank Manager Add</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 11px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header & Settings Icon */
        .page-header-main { background: #fff; padding: 8px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .settings-gear { 
            position: absolute; right: 15px; top: 6px; color: #f0ad4e; font-size: 18px; cursor: pointer; 
            border: 1px solid #f0ad4e; border-radius: 4px; padding: 2px 6px; background: #fff8ee; 
        }

        /* Navigation Buttons */
        .nav-container { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        .erp-btn {
            display: inline-block; margin: 2px; font-size: 11px; padding: 5px 12px; border-radius: 4px;
            color: #ffffff !important; border: none; cursor: pointer; text-decoration: none !important; font-weight: 500;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }

        /* Form Layout Styles (Screenshot Matching) */
        .form-wrapper { margin: 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; overflow: hidden; }
        .form-header { 
            background: #fff; padding: 10px; text-align: center; color: #337ab7; 
            cursor: pointer; font-weight: bold; border-bottom: 1px solid #eee;
        }
        .form-content { padding: 25px; background: #f9f9f9; }
        
        /* Custom Label Styling to match image */
        .label-cell { 
            background: #eee; border: 1px solid #ddd; padding: 6px 12px; font-weight: bold; 
            text-align: right; text-transform: uppercase; height: 35px; display: flex; align-items: center; justify-content: flex-end;
        }
        .input-cell { border-radius: 0; border: 1px solid #ddd; height: 35px; font-size: 12px; transition: border 0.3s; }
        .input-cell:focus { border-color: #f0ad4e; box-shadow: none; outline: none; }
        
        /* Red line accent on required fields as per ERP style */
        .req-border { border-left: 2px solid red !important; }

        /* Action Buttons Area */
        .action-bar { background: #eee; padding: 15px; text-align: center; border-top: 1px solid #ddd; }
        .btn-footer { padding: 8px 20px; font-weight: bold; border-radius: 4px; border: none; font-size: 12px; margin: 0 5px; color: white; }
        .btn-reset { background-color: #b0bec5; }
        .btn-save { background-color: #337ab7; }
        .btn-save-another { background-color: #449d44; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7;">Bank Manager</strong> <span style="color:#999;">» Add</span>
    <div class="settings-gear" onclick="logAction('Settings Icon')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="logAction('Student Fee')"><i class="fa fa-users"></i> Student Fee</button>
    <button class="erp-btn bg-blue" onclick="logAction('Staff Payroll')"><i class="fa fa-user-tie"></i> Staff Payroll</button>
    <button class="erp-btn bg-blue" onclick="logAction('Ledger')"><i class="fa fa-book"></i> Ledger</button>
    <button class="erp-btn bg-blue" onclick="logAction('Transactions')"><i class="fa fa-exchange-alt"></i> Transactions</button>
    <button class="erp-btn bg-green" onclick="logAction('Bank Top')"><i class="fa fa-university"></i> Bank</button>
</div>

<div class="nav-container" style="background:#f9f9f9; padding: 5px;">
    <button class="erp-btn bg-blue" onclick="logAction('Manage Bank')"><i class="fa fa-university"></i> Manage Bank</button>
    <button class="erp-btn bg-green" onclick="logAction('Add New Bank Tab')"><i class="fa fa-plus"></i> Add New Bank</button>
    <button class="erp-btn bg-blue" onclick="logAction('Transactions Detail')"><i class="fa fa-list"></i> Transactions Detail</button>
    <button class="erp-btn bg-blue" onclick="logAction('Bank Transaction')"><i class="fa fa-exchange-alt"></i> Bank Transaction</button>
</div>

<div class="form-wrapper">
    <div class="form-header" onclick="toggleForm()">
        <i class="fa fa-plus-circle me-1"></i> Add New Bank <i class="fa fa-chevron-down ms-2" id="toggleIcon"></i>
    </div>
    
    <div class="form-content" id="bankFormMain">
        <form id="addBankForm" action="your_php_script.php" method="POST">
            
            <div class="row g-0 mb-3">
                <div class="col-md-2 label-cell">Bank</div>
                <div class="col-md-4">
                    <input type="text" name="bank_name" class="form-control input-cell" placeholder="Enter Bank Name">
                </div>
                <div class="col-md-2 label-cell">Branch</div>
                <div class="col-md-4">
                    <input type="text" name="branch" class="form-control input-cell req-border" placeholder="Enter Branch Location">
                </div>
            </div>

            <div class="row g-0 mb-4">
                <div class="col-md-2 label-cell">Account Number</div>
                <div class="col-md-4">
                    <input type="text" name="acc_number" class="form-control input-cell req-border" placeholder="Enter Account Number">
                </div>
                <div class="col-md-2 label-cell">Account Name</div>
                <div class="col-md-4">
                    <input type="text" name="acc_name" class="form-control input-cell req-border" placeholder="Enter Account Name">
                </div>
            </div>

            <div class="action-bar">
                <button type="button" class="btn-footer btn-reset" onclick="resetForm()">
                    <i class="fa fa-sync-alt"></i> Reset
                </button>
                <button type="submit" class="btn-footer btn-save" onclick="logAction('Save Button')">
                    <i class="fa fa-save"></i> Save
                </button>
                <button type="button" class="btn-footer btn-save-another" onclick="logAction('Save & Add Another')">
                    <i class="fa fa-plus-square"></i> Save And Add Another
                </button>
            </div>
            
        </form>
    </div>
</div>

<script>
    // Console logging for all interactions
    function logAction(name) {
        console.log("%c [ERP-165]: " + name + " clicked", "color: #337ab7; font-weight: bold; background: #eee; padding: 2px 5px;");
    }

    // Toggle Form Visibility (Hide/Show)
    function toggleForm() {
        const content = document.getElementById('bankFormMain');
        const icon = document.getElementById('toggleIcon');
        
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.className = "fa fa-chevron-down ms-2";
            logAction("Form Expanded");
        } else {
            content.style.display = "none";
            icon.className = "fa fa-chevron-up ms-2";
            logAction("Form Collapsed");
        }
    }

    // Reset Form
    function resetForm() {
        if(confirm("Are you sure you want to clear the form?")) {
            document.getElementById('addBankForm').reset();
            logAction("Form Reset performed");
        }
    }

    // On Load
    window.onload = function() {
        console.log("ERP 165 - Bank Manager Add Page Loaded successfully.");
        console.log("PHP Hint: Use $_POST['bank_name'], $_POST['branch'], etc., to process data.");
    };
</script>

</body>
</html>
