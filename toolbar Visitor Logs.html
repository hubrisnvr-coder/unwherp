<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Logs Manager - Clean Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
        }

        /* Header Navigation */
        .page-breadcrumb {
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }
        .page-breadcrumb a {
            color: #337ab7;
            text-decoration: none;
            font-weight: 600;
        }
        .page-breadcrumb span {
            color: #999;
        }

        /* Navigation Buttons Wrapper */
        .nav-actions {
            background-color: #fcfcfc;
            border: 1px solid #e7e7e7;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-nav {
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 13px;
            color: #fff !important;
            text-decoration: none;
            display: inline-block;
            margin: 2px;
            border: none;
        }
        .bg-green { background-color: #5cb85c; }
        .bg-blue { background-color: #337ab7; }

        /* Filter Section */
        .filter-panel {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            color: #337ab7;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* Status Buttons */
        .status-buttons {
            text-align: center;
            margin-bottom: 10px;
        }
        .btn-status {
            padding: 2px 10px;
            font-size: 12px;
            border-radius: 4px;
            margin: 0 2px;
        }

        /* Table Styling with Red Border as per erp52 */
        .visitor-table {
            width: 100%;
            border-collapse: collapse;
        }
        .visitor-table thead th {
            background-color: #e8f5fe;
            color: #337ab7;
            text-align: center;
            padding: 10px;
            border: 1px solid #d4e8f7;
            font-weight: bold;
            text-transform: uppercase;
        }
        .visitor-table thead {
            border-bottom: 2px solid #ff0000;
        }
        .visitor-table tbody td {
            padding: 12px;
            border: 1px solid #eee;
            color: #555;
        }
        .empty-row {
            background-color: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container-fluid px-4 mt-2">
        
        <div class="page-breadcrumb">
            <a href="#">Visitor Logs Manager</a> <span> » Detail</span>
        </div>

        <div class="nav-actions">
            <a href="javascript:void(0)" class="btn-nav bg-green" onclick="handleAction('Log Detail')">
                <i class="fa fa-list"></i> Log Detail
            </a>
            <a href="javascript:void(0)" class="btn-nav bg-blue" onclick="handleAction('New Visitor')">
                <i class="fa fa-plus"></i> New Visitor
            </a>
            <a href="javascript:void(0)" class="btn-nav bg-blue" onclick="handleAction('Visit Purpose')">
                <i class="fa fa-list-ul"></i> Visit Purpose
            </a>
            <a href="javascript:void(0)" class="btn-nav bg-blue" onclick="handleAction('Postal Exchange')">
                <i class="fa fa-envelope"></i> Postal Exchange
            </a>
            <a href="javascript:void(0)" class="btn-nav bg-green" onclick="handleAction('Visitor Log')">
                <i class="fa fa-history"></i> Visitor Log
            </a>
        </div>

        <div class="filter-panel" onclick="handleAction('Filter Trigger')">
            <span style="color: #f0ad4e;">»</span> Filter Visitor Logs <i class="fa fa-filter"></i>
        </div>

        <div class="status-buttons">
            <button class="btn btn-primary btn-status" onclick="handleAction('Active')">
                <i class="fa fa-check"></i> Active
            </button>
            <button class="btn btn-warning btn-status text-white" onclick="handleAction('In-Active')">
                <i class="fa fa-times"></i> In-Active
            </button>
            <button class="btn btn-danger btn-status" onclick="handleAction('Delete')">
                <i class="fa fa-trash"></i> Delete
            </button>
        </div>

        <div class="table-responsive">
            <table class="visitor-table text-center">
                <thead>
                    <tr>
                        <th style="width: 45px;"><input type="checkbox"></th>
                        <th>S.N.</th>
                        <th>Purpose</th>
                        <th>Token</th>
                        <th>Date</th>
                        <th>Detail</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="empty-row">
                        <td colspan="7" class="text-start ps-3">
                            No Visitor Logs data found. Please Filter Visitor Logs to show.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function handleAction(name) {
            console.log("Action: " + name);
            alert("Aapne '" + name + "' par click kiya.");
        }
    </script>
</body>
</html>
