<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Breadcrumb Bar */
        .top-breadcrumb {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .home-link { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .cog-btn { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title Section */
        .page-header-text { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; margin-bottom: 0; }
        .page-header-text span { color: #999; font-weight: normal; font-size: 15px; }

        /* Anchor Tag Buttons Styling */
        .action-row-btns { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .erp-a-tag { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; 
        }
        .btn-blue-primary { background-color: #337ab7; }
        .btn-blue-darker { background-color: #286090; }
        .btn-orange-warn { background-color: #f0ad4e; }
        .btn-red-danger { background-color: #d9534f; }

        /* Filter Gallery Strip */
        .filter-gallery-strip { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold;
        }

        /* Table Design - Exact Matching erp26.png */
        .table-container-box { padding: 0 5px; }
        .gallery-list-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .gallery-list-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Exact Red Top Border */
            font-size: 13px; text-transform: uppercase;
        }
        .gallery-list-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .no-data-msg { color: #333; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div class="top-breadcrumb">
        <div>
            <a href="#" class="home-link"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Gallery</span>
        </div>
        <a href="#" class="cog-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-3">
        <h2 class="page-header-text">Gallery Manager <span>» List</span></h2>
        
        <div class="action-row-btns mt-3">
            <a href="#" class="erp-a-tag btn-blue-primary"><i class="fa fa-list"></i> All Gallery</a>
            <a href="cmsAddNewGalleries.html" class="erp-a-tag btn-blue-darker"><i class="fa fa-plus"></i> Add Gallery</a>
        </div>

        <a href="javascript:void(0);" class="filter-gallery-strip shadow-sm" onclick="alert('Filter Gallery menu activated!')">
            <i class="fa fa-angle-double-right"></i> Filter Gallery <i class="fa fa-filter"></i>
        </a>

        <div class="action-row-btns">
            <a href="#" class="erp-a-tag btn-blue-primary"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-a-tag btn-orange-warn"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-a-tag btn-red-danger"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-container-box">
            <table class="gallery-list-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="selectAll"></th>
                        <th style="width: 50%;">TITLE</th>
                        <th>STATUS</th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data-msg">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox "Select All" logic
        document.getElementById('selectAll').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = this.checked);
        }
    </script>

</body>
</html>
