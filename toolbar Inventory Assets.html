<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 183 - Asset Manager Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Global Styles */
        body { background-color: #f4f7f6; font-size: 14px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header Without Gear Button */
        .page-header-main { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }

        /* Top Action Buttons */
        .top-nav-container { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: flex-end; gap: 5px; }
        .erp-btn {
            font-size: 13px; padding: 7px 16px; border-radius: 4px; color: #fff !important; 
            border: none; cursor: pointer; text-decoration: none !important; font-weight: 600; transition: 0.3s;
        }
        .bg-green { background-color: #449d44; }
        .bg-blue { background-color: #337ab7; }

        /* Split Layout */
        .main-content { display: flex; padding: 20px; gap: 20px; }
        .form-section { flex: 0 0 35%; background: #fff; border: 1px solid #ddd; border-radius: 4px; height: fit-content; }
        .list-section { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 4px; }

        /* Create Section Styling */
        .section-title { 
            padding: 12px; color: #337ab7; font-weight: bold; font-size: 16px; 
            border-bottom: 1px solid #eee; text-align: center; cursor: pointer;
        }
        .form-body { padding: 25px; background: #fdfdfd; }
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: center; width: 120px; text-transform: uppercase; font-size: 12px; border-right: 2px solid red; }
        .f-input-box { border: 1px solid #ddd; height: 38px; font-size: 14px; width: 100%; padding: 0 10px; outline: none; }

        /* Table Area Controls */
        .table-controls { padding: 10px; text-align: right; border-bottom: 1px solid #eee; }
        .btn-status { font-size: 12px; padding: 5px 12px; border-radius: 4px; color: #fff; border: none; font-weight: bold; margin-left: 3px; }
        .bg-status-blue { background-color: #337ab7; }
        .bg-status-orange { background-color: #f0ad4e; }
        .bg-status-red { background-color: #d9534f; }

        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 12px; text-align: center; font-size: 13px;
        }
        .red-line-top { border-top: 3px solid red !important; }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 12px; text-align: center; color: #666; }

        /* Create Button */
        .btn-create { background-color: #1a4d80; color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; display: flex; align-items: center; gap: 5px; float: right; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 18px;">Asset Manager</strong> <span style="color:#999;">» Detail</span>
</div>

<div class="top-nav-container">
    <button class="erp-btn bg-green" onclick="btnLog('Assets Tab Clicked', 'green')"><i class="fa fa-list"></i> Assets</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Sem Assets Tab Clicked', 'blue')"><i class="fa fa-th-list"></i> Sem Assets</button>
</div>

<div class="main-content">
    
    <div class="form-section">
        <div class="section-title" onclick="toggleFilter()">
            <i class="fa fa-plus-circle me-2" id="filterIcon"></i> Create Asset
        </div>
        <div class="form-body" id="filterBox">
            <form action="asset_process.php" method="POST" id="assetForm">
                <div class="d-flex align-items-center mb-4">
                    <div class="f-label">ASSET TITLE</div>
                    <input type="text" name="asset_title" class="f-input-box" placeholder="e.g. Laptop" required>
                </div>
                
                <div class="clearfix">
                    <button type="submit" class="btn-create" onclick="btnLog('Create Button Processed', 'navy')">
                        <i class="fa fa-save"></i> Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="list-section">
        <div class="table-controls">
            <button class="btn-status bg-status-blue" onclick="btnLog('Bulk Status: Active', 'blue')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-status bg-status-orange" onclick="btnLog('Bulk Status: In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-status bg-status-red" onclick="btnLog('Bulk Status: Delete', 'red')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <table class="erp-table">
            <thead>
                <tr class="red-line-top">
                    <th width="50"><input type="checkbox" onclick="btnLog('Select All Checked', 'black')"></th>
                    <th width="80">S.N.</th>
                    <th>ASSET</th>
                    <th>STATUS</th>
                    <th width="100">ACTION</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" style="padding: 40px; font-style: italic; color: #999;">
                        No Asset data found. Please Filter Asset to show.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Unified Console Logger - Har button ke liye
    function btnLog(action, color) {
        console.log(`%c [ERP-LOG] %c ${action}`, 
        `color: white; background: ${color}; padding: 4px 10px; border-radius: 4px; font-weight: bold;`, 
        "color: #111; font-weight: bold;");
    }

    // 2. Toggle Filter (Create Asset Section)
    function toggleFilter() {
        const box = document.getElementById('filterBox');
        const icon = document.getElementById('filterIcon');
        if (box.style.display === "none") {
            box.style.display = "block";
            icon.className = "fa fa-plus-circle me-2";
            btnLog("Create Asset Form: Shown", "#1a4d80");
        } else {
            box.style.display = "none";
            icon.className = "fa fa-minus-circle me-2";
            btnLog("Create Asset Form: Hidden", "#1a4d80");
        }
    }

    // 3. Form Submission Simulation
    document.getElementById('assetForm').onsubmit = function(e) {
        e.preventDefault();
        const val = this.asset_title.value;
        btnLog(`Data Sent to PHP: ${val}`, "purple");
        alert("Asset " + val + " create karne ke liye PHP ko data bhej diya gaya hai.");
    };

    // Initial Page Load Log
    window.onload = function() {
        btnLog("ERP 183 Asset Manager Loaded (No Settings Gear)", "black");
    };
</script>

</body>
</html>
