<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 231 - Food Item Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --erp-blue: #337ab7;
            --erp-green: #5cb85c;
            --erp-orange: #f0ad4e;
            --erp-red: #d9534f;
            --erp-bg: #f4f7f6;
            --label-bg: #eeeeee;
            --table-header-bg: #d9edf7;
            --border-color: #ddd;
        }

        body { 
            background-color: var(--erp-bg); 
            font-size: 13px; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #333; 
        }

        /* Header Branding */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        .gear-icon { position: absolute; right: 20px; top: 12px; color: var(--erp-orange); font-size: 18px; cursor: pointer; }

        /* Module Navigation Tabs (Right aligned) */
        .module-nav { background: #fff; padding: 10px; display: flex; justify-content: flex-end; gap: 5px; border-bottom: 1px solid var(--border-color); padding-right: 30px; }
        .btn-mod { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; text-decoration: none; display: flex; align-items: center; gap: 5px; border: none; }

        /* Sub Navigation Tabs (Center aligned) */
        .sub-nav { background: #fff; padding: 15px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid var(--border-color); }
        .btn-sub { font-size: 13px; padding: 6px 16px; border-radius: 4px; color: #fff !important; border: none; display: flex; align-items: center; gap: 6px; }

        .bg-blue { background-color: var(--erp-blue); }
        .bg-green { background-color: var(--erp-green); }
        .bg-orange { background-color: var(--erp-orange); }
        .bg-red { background-color: var(--erp-red); }

        /* Main Content Grid */
        .main-container { padding: 20px; display: flex; gap: 20px; }
        
        /* Left Section: Create Form */
        .create-panel { width: 35%; background: #fff; border: 1px solid var(--border-color); border-radius: 4px; transition: 0.3s; }
        .panel-title { color: var(--erp-blue); font-weight: bold; text-align: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; }
        .panel-body { padding: 15px; background: #f9f9f9; }

        .erp-input-group { display: flex; align-items: stretch; margin-bottom: 10px; border: 1px solid #ccc; border-left: 3px solid #ff0000; }
        .erp-label { background: var(--label-bg); padding: 8px; font-weight: bold; width: 110px; text-align: center; border-right: 1px solid #ccc; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .erp-field { flex-grow: 1; border: none; padding: 8px; outline: none; background: white; }

        .btn-create-submit { background: var(--erp-blue); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; float: right; margin-top: 15px; display: flex; align-items: center; gap: 8px; }

        /* Right Section: List Table */
        .list-panel { width: 65%; }
        .action-row { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-action { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; border: none; }

        .table-wrapper { background: #fff; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead tr { border-bottom: 2px solid #ff0000; }
        .erp-table th { background: var(--table-header-bg); color: #31708f; padding: 10px; text-align: center; border: 1px solid #bce8f1; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .erp-table td { padding: 15px; border: 1px solid #eee; text-align: center; color: #999; font-style: italic; }

        .hidden { display: none !important; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:var(--erp-blue);">Food Item Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="erpLog('Settings menu opened')"></i>
</div>

<div class="module-nav">
    <button class="btn-mod bg-blue" onclick="erpLog('Resident Module Access')"><i class="fa fa-users"></i> Resident</button>
    <button class="btn-mod bg-green" onclick="erpLog('Hostel Module Access')"><i class="fa fa-bed"></i> Hostel</button>
    <button class="btn-mod bg-green" onclick="erpLog('Food & Meal Module Active')"><i class="fa fa-utensils"></i> Food & Meal</button>
</div>

<div class="sub-nav">
    <button class="btn-sub bg-blue" onclick="erpLog('Navigating to Food & Meal')"><i class="fa fa-utensils"></i> Food & Meal</button>
    <button class="btn-sub bg-blue" onclick="erpLog('Navigating to Eating Time')"><i class="fa fa-history"></i> Eating Time</button>
    <button class="btn-sub bg-blue" onclick="erpLog('Navigating to Food Category')"><i class="fa fa-list"></i> Food Category</button>
    <button class="btn-sub bg-green" id="toggleFilterBtn" onclick="toggleFilter()"><i class="fa fa-hamburger"></i> Food Item</button>
</div>

<div class="main-container">
    
    <div class="create-panel" id="filterPanel">
        <div class="panel-title"><i class="fa fa-search"></i> Create Food Item</div>
        <div class="panel-body">
            <form id="foodItemForm" action="process_food_item.php" method="POST" enctype="multipart/form-data">
                
                <div class="erp-input-group">
                    <div class="erp-label">CATEGORY</div>
                    <select name="category_id" class="erp-field">
                        <option value="">Select Category...</option>
                    </select>
                </div>

                <div class="erp-input-group">
                    <div class="erp-label">ITEM</div>
                    <input type="text" name="item_name" class="erp-field" placeholder="">
                </div>

                <div class="erp-input-group">
                    <div class="erp-label">PRICE</div>
                    <input type="number" name="item_price" class="erp-field" placeholder="">
                </div>

                <div class="erp-input-group">
                    <div class="erp-label" style="height: 60px;">DESC.</div>
                    <textarea name="item_desc" class="erp-field" style="height: 60px;"></textarea>
                </div>

                <div class="erp-input-group">
                    <div class="erp-label">IMAGE</div>
                    <input type="file" name="item_image" class="erp-field">
                </div>

                <div class="clearfix">
                    <button type="submit" class="btn-create-submit" onclick="erpLog('Saving New Food Item')">
                        <i class="fa fa-save"></i> Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="list-panel">
        <div class="action-row">
            <button class="btn-action bg-blue" onclick="erpLog('Bulk Action: Set Active')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-action bg-orange" onclick="erpLog('Bulk Action: Set In-Active')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-action bg-red" onclick="erpLog('Bulk Action: Delete Selection')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <div class="table-wrapper">
            <table class="erp-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" onclick="erpLog('Select All toggled')"></th>
                        <th style="width: 50px;">S.N.</th>
                        <th>CATEGORY</th>
                        <th>FOOD ITEM</th>
                        <th>PRICE</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6">No Food Item data found. Please Filter Food Item to show.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    /**
     * Filter Hide/Show Logic
     * Screenshot ke hisaab se "Food Item" tab par click karne se form toggle hota hai
     */
    function toggleFilter() {
        const panel = document.getElementById('filterPanel');
        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            erpLog("Filter/Create Panel: SHOWN");
        } else {
            panel.classList.add('hidden');
            erpLog("Filter/Create Panel: HIDDEN");
        }
    }

    /**
     * Professional Browser Console Logs
     */
    function erpLog(msg) {
        const now = new Date();
        const timestamp = now.toLocaleTimeString();
        console.log(`%c[ERP-231]%c ${timestamp} - %c${msg}`, 
            "color: white; background: #337ab7; padding: 2px 5px; border-radius: 3px;", 
            "color: #888;", 
            "color: #000; font-weight: bold;");
    }

    // Initial Page Load Log
    window.onload = function() {
        erpLog("Food Item Manager Loaded Successfully");
    };
</script>

</body>
</html>
