<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Setting Manager - ERP93</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <style>
        body { margin: 0; padding: 15px; background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Navigation Styles */
        .header-nav { text-align: center; margin-bottom: 20px; }
        .header-nav h4 { color: #2e6da4; margin-bottom: 10px; font-size: 15px; font-weight: bold; }
        .nav-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; }
        .btn-top {
            color: white !important; padding: 6px 12px; text-decoration: none; border-radius: 4px;
            font-size: 12px; display: flex; align-items: center; gap: 6px; background-color: #337ab7; font-weight: bold;
        }
        .btn-top.active { background-color: #5cb85c; }

        /* Content Box */
        .main-box { background: #fff; border: 1px solid #ddd; border-top: none; }
        .box-header { background: #fff; border: 1px solid #ddd; padding: 10px; color: #2e6da4; font-weight: bold; font-size: 14px; text-align: center; }
        
        .zoom-label { background: #337ab7; color: white; display: inline-block; padding: 4px 10px; font-size: 12px; font-weight: bold; margin-bottom: -1px; }

        /* Zoom Table Layout */
        .config-table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; }
        .config-table th { background: #f9f9f9; color: #2e6da4; border: 1px solid #ddd; padding: 8px; font-size: 12px; text-transform: uppercase; border-top: 2px solid red; }
        .config-table td { border: 1px solid #ddd; padding: 10px; vertical-align: middle; }

        .logo-col { width: 20%; text-align: center; background: #fafafa; }
        .logo-col img { max-width: 150px; height: auto; }
        
        .form-col { width: 60%; padding: 0 !important; }
        .inner-row { display: flex; border-bottom: 1px solid #eee; }
        .inner-row:last-child { border-bottom: none; }
        .inner-label { width: 150px; background: #f5f5f5; padding: 10px; font-size: 11px; font-weight: bold; border-right: 1px solid #ddd; }
        .inner-input { flex: 1; padding: 5px; }
        .inner-input input { width: 100%; padding: 6px; border: 1px solid #ccc; font-size: 13px; outline: none; box-sizing: border-box; }

        .action-col { width: 10%; text-align: center; }
        .status-col { width: 10%; text-align: center; }

        /* Buttons */
        .btn-update { background: #2e6da4; color: white !important; border: none; padding: 8px 15px; border-radius: 3px; font-size: 13px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .status-select { background: #337ab7; color: white; padding: 5px; border-radius: 3px; border: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-nav">
    <h4>Meeting Setting Manager » <span>Detail</span></h4>
    <div class="nav-links">
        <a href="javascript:void(0);" onclick="settingNav('GENERAL')" class="btn-top"><i class="fa fa-cog"></i> General Setting</a>
        <a href="javascript:void(0);" onclick="settingNav('ONLINE_REG')" class="btn-top"><i class="fa fa-id-card-o"></i> Online Registration</a>
        <a href="javascript:void(0);" onclick="settingNav('SMS')" class="btn-top"><i class="fa fa-mobile"></i> SMS Setting</a>
        <a href="javascript:void(0);" onclick="settingNav('EMAIL')" class="btn-top"><i class="fa fa-envelope"></i> E-Mail Setting</a>
        <a href="javascript:void(0);" onclick="settingNav('ALERT')" class="btn-top"><i class="fa fa-bell"></i> Alert Setting</a>
        <a href="javascript:void(0);" onclick="settingNav('PAYMENT')" class="btn-top"><i class="fa fa-dollar"></i> Payment Gateway</a>
        <a href="javascript:void(0);" onclick="settingNav('MEETING')" class="btn-top active"><i class="fa fa-video-camera"></i> Meeting - Remote Class</a>
    </div>
</div>

<div class="box-header"><i class="fa fa-list"></i> Meeting Setting List</div>

<div style="margin-top: 20px;">
    <div class="zoom-label"># ZOOM</div>
    <table class="config-table">
        <thead>
            <tr>
                <th style="width: 40px;">S.N.</th>
                <th style="width: 200px;">Gateway</th>
                <th>Config</th>
                <th style="width: 100px;"></th>
                <th style="width: 100px;">Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="text-align: center;">1</td>
                <td class="logo-col">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fb/Zoom_Communications_Logo.svg" alt="Zoom">
                    <div style="color: #337ab7; font-size: 12px; margin-top: 5px;">Video Communications</div>
                </td>
                <td class="form-col">
                    <div class="inner-row">
                        <div class="inner-label">KEY</div>
                        <div class="inner-input"><input type="text" id="zoom_key" placeholder=""></div>
                    </div>
                    <div class="inner-row">
                        <div class="inner-label">SECRET</div>
                        <div class="inner-input"><input type="password" id="zoom_secret" placeholder=""></div>
                    </div>
                    <div class="inner-row">
                        <div class="inner-label">EMAIL</div>
                        <div class="inner-input"><input type="email" id="zoom_email" placeholder=""></div>
                    </div>
                </td>
                <td class="action-col">
                    <a href="javascript:void(0);" onclick="updateZoomConfig()" class="btn-update"><i class="fa fa-save"></i> Update</a>
                </td>
                <td class="status-col">
                    <select class="status-select" onchange="updateStatus(this.value)">
                        <option value="active">Active</option>
                        <option value="inactive">In-Active</option>
                    </select>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Navigation function for top buttons
    function settingNav(type) {
        console.log("Navigating to: " + type);
        alert("Switching to Setting: " + type);
        // PHP connection example: window.location.href = "settings.php?page=" + type;
    }

    // Function to update Zoom Configuration
    function updateZoomConfig() {
        const key = document.getElementById('zoom_key').value;
        const secret = document.getElementById('zoom_secret').value;
        const email = document.getElementById('zoom_email').value;

        console.log("Updating Zoom Config:", { key, secret, email });
        alert("Zoom Settings Updated via JavaScript! Connect your PHP script here.");
    }

    // Function to update status dropdown
    function updateStatus(val) {
        console.log("Status changed to: " + val);
        alert("Status updated to: " + val);
    }
</script>

</body>
</html>
