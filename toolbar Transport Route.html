<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 221 - Route Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --erp-blue: #337ab7;
            --erp-green: #5cb85c;
            --erp-orange: #f0ad4e;
            --erp-red: #d9534f;
            --erp-bg: #f4f7f6;
            --label-bg: #eeeeee;
        }

        body { background-color: var(--erp-bg); font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-icon { position: absolute; right: 20px; top: 12px; color: #f0ad4e; font-size: 18px; cursor: pointer; }

        /* Navigation */
        .nav-main { background: #fff; padding: 10px; display: flex; justify-content: center; gap: 5px; border-bottom: 1px solid #ddd; }
        .btn-nav { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; border: none; display: flex; align-items: center; gap: 5px; }
        
        .bg-blue { background-color: var(--erp-blue); }
        .bg-green { background-color: var(--erp-green); }
        .bg-orange { background-color: var(--erp-orange); }
        .bg-red { background-color: var(--erp-red); }

        /* Layout Structure */
        .main-content { padding: 20px; display: flex; gap: 20px; }
        .left-panel { width: 30%; }
        .right-panel { width: 70%; }

        /* Form Card */
        .erp-card { background: #fff; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; }
        .card-header-custom { padding: 10px; text-align: center; color: var(--erp-blue); font-weight: bold; border-bottom: 1px solid #eee; font-size: 15px; }
        .card-body-custom { padding: 15px; }

        /* Input Styling */
        .input-row { display: flex; margin-bottom: 10px; align-items: stretch; }
        .label-box { background: var(--label-bg); padding: 8px; border: 1px solid #ccc; font-weight: bold; width: 100px; text-align: center; font-size: 11px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .field-box { flex-grow: 1; border: 1px solid #ccc; padding: 8px; outline: none; }
        .required-border { border-left: 3px solid red !important; }

        /* Section Title Bar */
        .section-bar { background: #f5f5f5; padding: 6px; text-align: center; font-weight: bold; font-size: 12px; border: 1px solid #ddd; margin: 15px 0 10px 0; text-transform: uppercase; }

        /* Table Styling */
        .table-controls { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-action-small { padding: 3px 10px; font-size: 12px; color: #fff; border-radius: 3px; border: none; }
        
        .erp-table { width: 100%; border-collapse: collapse; background: #fff; }
        .erp-table th { background: #d9edf7; color: #31708f; border: 1px solid #bce8f1; padding: 10px; text-align: center; text-transform: uppercase; font-size: 12px; }
        .erp-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .table-header-line { border-bottom: 2px solid red; }

        .btn-create { background: var(--erp-blue); color: #fff; border: none; padding: 8px 20px; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:var(--erp-blue);">Route Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="erpLog('Settings Toggle')"></i>
</div>

<div class="nav-main">
    <button class="btn-nav bg-blue" onclick="erpLog('User Module Selected')"><i class="fa fa-user"></i> User</button>
    <button class="btn-nav bg-green" onclick="erpLog('Route Module Active')"><i class="fa fa-route"></i> Route</button>
    <button class="btn-nav bg-blue" onclick="erpLog('Vehicle Module Selected')"><i class="fa fa-bus"></i> Vehicle</button>
</div>

<div class="main-content">
    
    <div class="left-panel">
        <div class="erp-card">
            <div class="card-header-custom" id="filterBtn" style="cursor: pointer;" onclick="toggleForm()">
                <i class="fa fa-search"></i> Create Route
            </div>
            <div id="formSection" class="card-body-custom">
                <form id="routeForm" action="save_route.php" method="POST">
                    <div class="input-row">
                        <div class="label-box">Route</div>
                        <input type="text" name="route_name" class="field-box required-border" placeholder="Enter Route Name">
                    </div>
                    <div class="input-row">
                        <div class="label-box">Rent</div>
                        <input type="number" name="route_rent" class="field-box required-border" placeholder="Enter Rent Amount">
                    </div>
                    <div class="input-row">
                        <div class="label-box">Desc.</div>
                        <textarea name="route_desc" class="field-box" rows="3" placeholder="Description"></textarea>
                    </div>

                    <div class="section-bar">Find Vehicle & Add</div>
                    
                    <div class="input-row">
                        <select name="vehicle_select" class="field-box">
                            <option value="">Select Vehicles...</option>
                            <option value="bus01">Bus 01 - NL01-1234</option>
                        </select>
                    </div>
                    
                    <button type="button" class="btn-nav bg-blue w-100 justify-content-center mb-3" onclick="erpLog('Vehicle Added to Route')">
                        <i class="fa fa-plus"></i> Add Vehicle
                    </button>

                    <div class="erp-table-mini mb-3">
                        <table class="erp-table">
                            <thead>
                                <tr class="table-header-line">
                                    <th>Number | Model</th>
                                    <th>Type</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="2" style="color:#999; font-style:italic;">No vehicle added</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <button type="submit" class="btn-create">
                        <i class="fa fa-save"></i> Create
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="table-controls">
            <button class="btn-action-small bg-blue" onclick="erpLog('Status: Active filtered')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-action-small bg-orange" onclick="erpLog('Status: In-Active filtered')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-action-small bg-red" onclick="erpLog('Action: Delete Triggered')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <div class="erp-table-container">
            <table class="erp-table">
                <thead>
                    <tr class="table-header-line">
                        <th style="width: 40px;"><input type="checkbox"></th>
                        <th style="width: 50px;">S.N.</th>
                        <th>Route</th>
                        <th>Vehicle</th>
                        <th style="width: 120px;">Status</th>
                        <th style="width: 60px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" style="padding: 25px; color: #888;">
                            No Route data found. Please Filter Route to show.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    /**
     * Filter/Form Hide-Show Functionality
     */
    function toggleForm() {
        const form = document.getElementById('formSection');
        form.classList.toggle('hidden');
        erpLog(form.classList.contains('hidden') ? "Create Route Panel Hidden" : "Create Route Panel Visible");
    }

    /**
     * Professional Logging
     */
    function erpLog(message) {
        console.log(
            `%c [ERP-221] %c ${message}`, 
            "color: white; background: #337ab7; padding: 2px 8px; border-radius: 3px; font-weight: bold;", 
            "color: #333;"
        );
    }

    // Default Log
    window.onload = function() {
        erpLog("Route Manager Detail Page Initialized");
    };
</script>

</body>
</html>
