<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Manager | ERP 106</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary-blue: #337ab7;
            --success-green: #5cb85c;
            --warning-orange: #f0ad4e;
            --danger-red: #d9534f;
            --dark-blue: #2e6da4;
            --border-color: #ddd;
            --light-bg: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--light-bg);
            margin: 0; padding: 20px; font-size: 13px;
        }

        .main-container {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,.05);
        }

        .header-path {
            text-align: center; color: var(--primary-blue);
            font-size: 14px; padding: 10px; border-bottom: 1px solid #eee; margin: 0;
        }

        /* Top Navigation */
        .top-nav { display: flex; justify-content: center; gap: 5px; padding: 15px; }
        .nav-link {
            display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px;
            border-radius: 4px; text-decoration: none; color: white; font-size: 12px;
            background-color: var(--primary-blue); cursor: pointer; border: none;
        }
        .nav-link.active { background-color: #449d44; } /* Green color for active Detail */

        /* Filter Section */
        .filter-section { border: 1px solid #bce8f1; margin: 0 15px 20px; border-radius: 4px; overflow: hidden; }
        .filter-toggle {
            background-color: #d9edf7; color: var(--primary-blue); padding: 8px;
            text-align: center; font-weight: bold; cursor: pointer; border-bottom: 1px solid #bce8f1;
        }
        .filter-body { padding: 15px; background: #fff; display: block; } /* Toggleable if needed */
        
        .search-row { display: flex; border: 1px solid #ccc; border-radius: 2px; height: 34px; margin-bottom: 15px; }
        .search-label {
            background: #f5f5f5; padding: 0 15px; display: flex; align-items: center;
            font-weight: bold; font-size: 11px; border-right: 1px solid #ccc; min-width: 250px;
            justify-content: center;
        }
        .search-input { flex: 1; border: none; outline: none; padding: 0 10px; }

        .filter-footer { background: #f5f5f5; padding: 10px 15px; text-align: right; border-top: 1px solid #ddd; }
        .btn-filter { background: var(--dark-blue); color: white; border: none; padding: 6px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }

        /* Action Buttons */
        .table-actions { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .action-btn { color: white; padding: 5px 12px; border-radius: 4px; font-size: 12px; text-decoration: none; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .btn-blue { background: var(--primary-blue); }
        .btn-orange { background: var(--warning-orange); }
        .btn-red { background: var(--danger-red); }

        /* Table */
        .table-wrapper { padding: 0 15px 15px; overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; }
        .data-table th { 
            background: #eef1f5; color: var(--primary-blue); padding: 10px; 
            text-align: left; border-bottom: 1px solid #ddd; border-top: 2px solid #d9534f; font-size: 12px;
        }
        .data-table td { padding: 10px; border-bottom: 1px solid #eee; color: #666; font-size: 12px; }
        .no-data { text-align: center; color: #999; font-style: italic; padding: 20px !important; }

    </style>
</head>
<body>

<div class="main-container">
    <h3 class="header-path">Guardian Manager » Detail</h3>

    <div class="top-nav">
        <a class="nav-link active" onclick="jsNavigation('Detail')"><i class="fa fa-list"></i> Detail</a>
        <a class="nav-link" onclick="jsNavigation('Registration')"><i class="fa fa-plus"></i> Registration</a>
    </div>

    <div class="filter-section">
        <div class="filter-toggle" onclick="toggleFilter()">
            <i class="fa fa-angle-double-down"></i> Filter Guardian <i class="fa fa-filter"></i>
        </div>
        <form id="guardianFilterForm" class="filter-body">
            <div class="search-row">
                <div class="search-label">SEARCH USING NAME | MOBILE NO. | EMAIL-ID</div>
                <input type="text" name="search_term" class="search-input">
            </div>
            <div class="filter-footer">
                <a class="btn-filter" onclick="executeFilter()"><i class="fa fa-filter"></i> Filter</a>
            </div>
        </form>
    </div>

    <div class="table-actions">
        <a class="action-btn btn-blue" onclick="handleAction('Active Status')"><i class="fa fa-check"></i> Active</a>
        <a class="action-btn btn-orange" onclick="handleAction('In-Active Status')"><i class="fa fa-close"></i> In-Active</a>
        <a class="action-btn btn-red" onclick="handleAction('Delete Guardian')"><i class="fa fa-trash"></i> Delete</a>
    </div>

    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 30px;"><input type="checkbox"></th>
                    <th>S.N.</th>
                    <th>NAME</th>
                    <th>ADDRESS</th>
                    <th>CONTACT</th>
                    <th>STUDENTS</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="7" class="no-data">No Guardian data found. Please Filter Guardian to show.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    /**
     * Top Navigation Logic
     */
    function jsNavigation(target) {
        console.log("Navigating to: " + target);
        alert("Navigating to " + target + " Page...");
        // window.location.href = target.toLowerCase() + ".php";
    }

    /**
     * Filter Execution
     */
    function executeFilter() {
        const searchTerm = document.getElementsByName('search_term')[0].value;
        console.log("Filtering for: " + searchTerm);
        alert("Filter Applied for: " + (searchTerm || "All Records"));
        // Connect to PHP: document.getElementById('guardianFilterForm').submit();
    }

    /**
     * Table Actions (Active/In-active/Delete)
     */
    function handleAction(actionType) {
        console.log("Action Triggered: " + actionType);
        alert("JavaScript Call: " + actionType);
    }

    /**
     * Toggle Filter View
     */
    function toggleFilter() {
        const body = document.querySelector('.filter-body');
        body.style.display = (body.style.display === 'none') ? 'block' : 'none';
        console.log("Filter Visibility Toggled");
    }
</script>

</body>
</html>
