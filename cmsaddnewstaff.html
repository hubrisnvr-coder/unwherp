<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Manager - Add Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Breadcrumb Header */
        .erp-header {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-header a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .setting-gear-icon { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title */
        .erp-title-main { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .erp-title-main span { color: #999; font-weight: normal; font-size: 14px; }

        /* Navigation Button */
        .btn-back-nav { 
            text-decoration: none !important; background-color: #337ab7; color: white !important; 
            padding: 7px 18px; border-radius: 3px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; 
        }

        /* Form Table Style Layout */
        .form-card-erp { background: #fff; border: 1px solid #ddd; border-radius: 2px; margin-top: 10px; margin-bottom: 50px; }
        .form-row-erp { display: flex; border-bottom: 1px solid #eee; min-height: 45px; flex-wrap: wrap; }
        
        .label-col { 
            background: #f1f3f4; width: 180px; padding: 10px 15px; 
            font-weight: bold; font-size: 11px; color: #555; 
            text-align: right; border-right: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: flex-end;
            text-transform: uppercase;
        }
        .input-col { flex: 1; padding: 8px 15px; display: flex; align-items: center; min-width: 250px; }
        .split-col { flex: 1; display: flex; align-items: center; border-right: 1px solid #eee; }

        .form-control-erp { 
            width: 100%; border-radius: 0; border: 1px solid #ccc; 
            font-size: 13px; padding: 5px 10px; height: 32px;
        }
        textarea.form-control-erp { height: auto; }
        .form-control-erp:focus { outline: none; border-color: #337ab7; }

        /* Red Mandatory Indicator */
        .req-border { border-left: 2px solid red !important; }

        /* Fake Editor Toolbar UI */
        .editor-toolbar { 
            background: #d9edf7; border: 1px solid #bce8f1; padding: 5px; 
            display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 0;
            width: 100%;
        }
        .editor-btn { background: #fff; border: 1px solid #ccc; padding: 2px 6px; font-size: 12px; cursor: pointer; }

        /* Footer Section */
        .form-footer-erp { background: #f1f3f4; padding: 15px; text-align: center; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 10px; }
        .anchor-action-btn { text-decoration: none; padding: 7px 22px; font-size: 13px; color: white !important; border-radius: 3px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-reset { background: #999; }
        .btn-submit { background: #286090; }

        .help-text { font-size: 11px; color: #888; margin-top: 4px; }

        @media (max-width: 992px) { .form-row-erp { flex-direction: column; } .label-col { width: 100%; text-align: left; justify-content: flex-start; } .split-col { border-right: none; border-bottom: 1px solid #eee; } }
    </style>
</head>
<body>
<br>
    <div class="erp-header">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Staffs</span>
        </div>
        <!--
        <a href="#" class="setting-gear-icon"><i class="fa fa-cog"></i></a>
        -->
    </div>

    <div class="container-fluid mt-2">
        <h2 class="erp-title-main">Staff Manager <span>» Add form</span></h2>
        
        <div class="text-center mb-2">
            <a href="staff-list.html" class="btn-back-nav"><i class="fa fa-list"></i> All Staff</a>
        </div>

        <div class="form-card-erp shadow-sm">
            
            <div class="form-row-erp">
                <div class="split-col">
                    <div class="label-col">Full Name</div>
                    <div class="input-col"><input type="text" class="form-control-erp req-border"></div>
                </div>
                <div class="split-col">
                    <div class="label-col">Designation</div>
                    <div class="input-col"><input type="text" class="form-control-erp req-border"></div>
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-col">Address</div>
                <div class="input-col"><input type="text" class="form-control-erp"></div>
            </div>

            <div class="form-row-erp">
                <div class="split-col">
                    <div class="label-col">Telephone</div>
                    <div class="input-col"><input type="text" class="form-control-erp"></div>
                </div>
                <div class="split-col">
                    <div class="label-col">Mobile</div>
                    <div class="input-col"><input type="text" class="form-control-erp req-border"></div>
                </div>
            </div>

            <div class="form-row-erp">
                <div class="split-col">
                    <div class="label-col">Alternative Contact</div>
                    <div class="input-col"><input type="text" class="form-control-erp"></div>
                </div>
                <div class="split-col">
                    <div class="label-col">E-Mail</div>
                    <div class="input-col"><input type="email" class="form-control-erp"></div>
                </div>
            </div>

            <div class="form-row-erp" style="min-height: 150px;">
                <div class="label-col">Description</div>
                <div class="input-col" style="flex-direction: column; align-items: flex-start;">
                    <div class="editor-toolbar">
                        <span class="editor-btn"><b>B</b></span>
                        <span class="editor-btn"><i>I</i></span>
                        <span class="editor-btn"><u>U</u></span>
                        <span class="editor-btn"><i class="fa fa-align-left"></i></span>
                        <span class="editor-btn"><i class="fa fa-link"></i></span>
                        <span class="editor-btn"><i class="fa fa-image"></i></span>
                        <span class="editor-btn">Open Sans <i class="fa fa-caret-down"></i></span>
                    </div>
                    <textarea class="form-control-erp" rows="6" style="border-top: none;"></textarea>
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-col">Image</div>
                <div class="input-col">
                    <div class="w-100">
                        <input type="file" class="form-control-erp" style="padding-top: 3px;">
                        <div class="help-text"><i class="fa fa-question-circle text-info"></i> Recomended Minimum Image Size 175px X 196px(72dpi)</div>
                    </div>
                </div>
            </div>

            <div class="form-row-erp">
                <div class="label-col">Twitter URL</div>
                <div class="input-col"><input type="text" class="form-control-erp" placeholder="Twitter URL"></div>
            </div>
            <div class="form-row-erp">
                <div class="label-col">Linkedin URL</div>
                <div class="input-col"><input type="text" class="form-control-erp" placeholder="Linkedin URL"></div>
            </div>
            <div class="form-row-erp">
                <div class="label-col">Facebook URL</div>
                <div class="input-col"><input type="text" class="form-control-erp" placeholder="Facebook URL"></div>
            </div>

            <div class="form-row-erp">
                <div class="label-col">Rank</div>
                <div class="input-col"><input type="number" class="form-control-erp req-border" value="10" style="width: 100px;"></div>
            </div>

            <div class="form-row-erp">
                <div class="label-col">Status</div>
                <div class="input-col">
                    <div class="d-flex gap-3">
                        <label class="d-flex align-items-center gap-2" style="font-size: 13px;">
                            <input type="radio" name="status" checked> Active
                        </label>
                        <label class="d-flex align-items-center gap-2" style="font-size: 13px;">
                            <input type="radio" name="status"> Inactive
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-footer-erp">
                <a href="javascript:void(0)" class="anchor-action-btn btn-reset" onclick="window.location.reload();">
                    <i class="fa fa-undo"></i> Reset
                </a>
                <a href="javascript:void(0)" class="anchor-action-btn btn-submit" onclick="alert('Staff Added Successfully!')">
                    <i class="fa fa-save"></i> Submit
                </a>
            </div>

        </div>
    </div>

</body>
</html>
