<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 178 - Subject Attendance (1-31 Days)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Typography & Global */
        body { background-color: #f4f7f6; font-size: 14px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        .page-header-main { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .settings-gear { 
            position: absolute; right: 20px; top: 10px; color: #f0ad4e; font-size: 22px; cursor: pointer; 
            border: 1px solid #f0ad4e; border-radius: 4px; padding: 4px 10px; background: #fff8ee; 
        }

        /* Navigation */
        .nav-container { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .erp-btn {
            font-size: 13px; padding: 7px 16px; border-radius: 4px; color: #fff !important; 
            border: none; cursor: pointer; text-decoration: none !important; font-weight: 600; transition: 0.3s;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }
        .active-tab { border: 2px solid #000; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* Filter Section */
        .filter-wrapper { margin: 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        .filter-header { 
            background: #fff; padding: 12px; text-align: center; color: #337ab7; 
            cursor: pointer; font-weight: bold; font-size: 16px; border-bottom: 1px solid #eee;
        }
        .filter-content { display: block; padding: 25px; background: #fdfdfd; }
        
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 150px; text-transform: uppercase; font-size: 12px; }
        .f-input-box { border: 1px solid #ddd; height: 38px; font-size: 14px; width: 100%; padding: 0 10px; outline: none; }
        .f-input-box:focus { border-color: #337ab7; box-shadow: 0 0 5px rgba(51,122,183,0.3); }

        /* Table UI */
        .table-container { background: #fff; margin: 0 15px; border: 1px solid #ddd; overflow-x: auto; }
        .erp-table { width: 100%; border-collapse: collapse; min-width: 1550px; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 10px 4px; text-align: center; font-size: 12px; white-space: nowrap;
        }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 12px 6px; text-align: center; color: #555; }
        
        /* Matching Screenshot Detail */
        .red-line-top { border-top: 3px solid red !important; }

        /* Action Buttons */
        .action-bar { margin: 15px; text-align: center; }
        .btn-status { font-size: 13px; padding: 7px 20px; color: #fff; border-radius: 4px; margin: 0 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-filter-submit { background-color: #1a4d80; color: white; border: none; padding: 12px 40px; border-radius: 4px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 20px;">Subject Attendance Manager</strong> <span style="color:#999;">» Detail</span>
    <div class="settings-gear" onclick="btnLog('Settings Gear Icon')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <div>
        <button class="erp-btn bg-green active-tab" onclick="btnLog('Attendance Detail Tab')"><i class="fa fa-list"></i> Attendance Detail</button>
        <button class="erp-btn bg-blue" onclick="btnLog('Add/Edit Subject Attendance')"><i class="fa fa-plus"></i> Add / Edit Subject Attendance</button>
        <button class="erp-btn bg-blue" onclick="btnLog('Subject Attendance Alert')"><i class="fa fa-bell"></i> Subject Attendance Alert</button>
    </div>
    <div>
        <button class="erp-btn bg-blue" onclick="btnLog('Student Regular Attendance')"><i class="fa fa-calendar-check"></i> Student Regular Attendance</button>
        <button class="erp-btn bg-green" onclick="btnLog('Student Subject Wise Attendance')"><i class="fa fa-book"></i> Student Subject Wise Attendance</button>
        <button class="erp-btn bg-blue" onclick="btnLog('Staff Attendance View')"><i class="fa fa-user-tie"></i> Staff Attendance</button>
    </div>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down me-2" id="filterIcon"></i> Filter Subject Attendance <i class="fa fa-filter ms-2"></i>
    </div>
    <div class="filter-content" id="filterBox">
        <form id="erpForm">
            <div class="row g-3">
                <div class="col-md-4 d-flex">
                    <div class="f-label">REG.NO.</div>
                    <input type="text" name="reg_no" class="f-input-box" placeholder="Registration No.">
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">REG. DATE</div>
                    <input type="date" class="f-input-box">
                    <div class="f-label" style="width:40px; text-align:center;">to</div>
                    <input type="date" class="f-input-box">
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">STATUS</div>
                    <select class="f-input-box"><option>Select Academic Status</option></select>
                    <select class="f-input-box ms-1"><option>Status</option></select>
                </div>

                <div class="col-md-6 d-flex">
                    <div class="f-label">PROGRAM/CLASS</div>
                    <select class="f-input-box"><option>Select Program/Class</option></select>
                </div>
                <div class="col-md-6 d-flex">
                    <div class="f-label">SEMESTER</div>
                    <select class="f-input-box"><option>Select Semester/Section</option></select>
                </div>

                <div class="col-md-4 d-flex">
                    <div class="f-label">YEAR</div>
                    <select class="f-input-box"><option>2024</option></select>
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">MONTH</div>
                    <select class="f-input-box"><option>March</option></select>
                </div>
                <div class="col-md-4 d-flex">
                    <div class="f-label">SUBJECT</div>
                    <select class="f-input-box"><option>Select Subject</option></select>
                </div>

                <div class="col text-end">
                    <button type="reset" class="btn btn-light border btn-sm me-2" onclick="btnLog('Filter Reset')">Reset</button>
                    <button type="submit" class="btn-filter-submit" onclick="btnLog('Filter Submitted')"><i class="fa fa-search"></i> FILTER DATA</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="action-bar">
    <button class="btn-status bg-primary" onclick="btnLog('Action: Active')"><i class="fa fa-check"></i> Active</button>
    <button class="btn-status" style="background:#f0ad4e;" onclick="btnLog('Action: In-Active')"><i class="fa fa-pause"></i> In-Active</button>
    <button class="btn-status" style="background:#d9534f;" onclick="btnLog('Action: Delete')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div class="table-container">
    <table class="erp-table">
        <thead>
            <tr class="red-line-top">
                <th><input type="checkbox" onclick="btnLog('Master Checkbox Toggled')"></th>
                <th>S.N.</th>
                <th>YEAR</th>
                <th>MONTH</th>
                <th>REG.NO.</th>
                <th>NAME OF STUDENT</th>
                <th>SUBJECT</th>
                <th>TYPE</th>
                <script>
                    for(let i=1; i<=31; i++) {
                        document.write(`<th width="30">${i}</th>`);
                    }
                </script>
                <th style="background:#e8f5e9">PRESENT</th>
                <th style="background:#ffebee">ABSENT</th>
                <th style="background:#fff3e0">LATE</th>
                <th style="background:#e3f2fd">LEAVE</th>
                <th style="background:#f3e5f5">HOLIDAY</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="45" style="padding:60px; text-align:center; background:#fff; color:#999; font-size: 16px;">
                    <i class="fa fa-info-circle me-2"></i> No Subject Attendance data found. Please use the filter above.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Working Console Logs
    function btnLog(name) {
        console.log(`%c [ERP-LOG] %c User Clicked: ${name}`, 
        "color: #fff; background: #1a4d80; padding: 5px; border-radius: 3px; font-weight: bold;", 
        "color: #1a4d80; font-weight: bold; text-decoration: underline;");
    }

    // 2. Filter Hide/Show Function
    function toggleFilter() {
        const box = document.getElementById('filterBox');
        const icon = document.getElementById('filterIcon');
        if (box.style.display === "none") {
            box.style.display = "block";
            icon.className = "fa fa-chevron-down me-2";
            btnLog('Filter Section Shown');
        } else {
            box.style.display = "none";
            icon.className = "fa fa-chevron-up me-2";
            btnLog('Filter Section Hidden');
        }
    }

    // 3. Form Submit Prevent & Log
    document.getElementById('erpForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog('Database Query Execution Started...');
    };

    window.onload = function() {
        btnLog('ERP 178 Page Ready');
    };
</script>

</body>
</html>
