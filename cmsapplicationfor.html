<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Breadcrumb Top Bar */
        .erp-header {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-header a { text-decoration: none; color: #337ab7; font-size: 13px; }
        .settings-gear { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; }

        /* Page Heading matching erp43.png */
        .manager-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 15px; margin-bottom: 0; }
        .manager-title span { color: #999; font-weight: normal; font-size: 14px; }

        /* Button Container */
        .btn-flex-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        
        /* Anchor Tag Buttons */
        .erp-btn-a { 
            text-decoration: none !important; padding: 7px 15px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; transition: 0.2s;
        }
        .btn-blue-erp { background-color: #337ab7; }
        .btn-navy-erp { background-color: #286090; }
        .btn-orange-erp { background-color: #f0ad4e; }
        .btn-red-erp { background-color: #d9534f; }
        .erp-btn-a:hover { opacity: 0.85; transform: translateY(-1px); }

        /* Filter Section Strip */
        .filter-bar-erp { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; 
            color: #337ab7; font-weight: bold; font-size: 15px;
        }

        /* Table Structure */
        .table-outer { padding: 0 5px; }
        .table-custom { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .table-custom th { 
            background: #eef7fb; color: #31708f; padding: 12px 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Signature Red Line */
            font-size: 13px; text-transform: uppercase;
        }
        .table-custom td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .no-data { text-align: left; padding-left: 20px !important; color: #666; }
    </style>
</head>
<body>

    <div class="erp-header">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Notice</span>
        </div>
        <a href="#" class="settings-gear"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="manager-title">RegisterFor/Programme/Course Manager <span>» List</span></h2>
        
        <div class="btn-flex-container mt-3">
            <a href="#" class="erp-btn-a btn-blue-erp">
                <i class="fa fa-list"></i> All RegisterFor/Programme/Course
            </a>
            <a href="#" class="erp-btn-a btn-navy-erp">
                <i class="fa fa-plus"></i> Add RegisterFor/Programme/Course
            </a>
        </div>

        <a href="javascript:void(0);" class="filter-bar-erp shadow-sm" onclick="alert('Opening Filter...')">
            <i class="fa fa-angle-double-right"></i> Filter RegisterFor/Programme/Course <i class="fa fa-filter"></i>
        </a>

        <div class="btn-flex-container">
            <a href="#" class="erp-btn-a btn-blue-erp"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-btn-a btn-orange-erp"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-btn-a btn-red-erp"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-outer">
            <table class="table-custom shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="checkAll"></th>
                        <th>TITLE</th>
                        <th>LAST UPDATED</th>
                        <th style="width: 120px;">STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data py-3">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox toggle functionality
        document.getElementById('checkAll').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(item => item.checked = this.checked);
        }
    </script>

</body>
</html>
