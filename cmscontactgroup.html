<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Group Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Breadcrumb Top Bar */
        .erp-header {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-header a { text-decoration: none; color: #337ab7; font-size: 13px; }
        .gear-settings { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; }

        /* Page Heading */
        .page-heading-erp { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 15px; margin-bottom: 0; }
        .page-heading-erp span { color: #999; font-weight: normal; font-size: 14px; }

        /* Button Wrapper */
        .btn-action-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        
        /* Action Link Buttons */
        .erp-link-btn { 
            text-decoration: none !important; padding: 7px 18px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; 
        }
        .btn-blue { background-color: #337ab7; }
        .btn-navy { background-color: #286090; }
        .btn-orange { background-color: #f0ad4e; }
        .btn-red { background-color: #d9534f; }

        /* Filter Strip */
        .filter-section-btn { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; 
            color: #337ab7; font-weight: bold; font-size: 15px;
        }

        /* Table Styling */
        .table-container { padding: 0 5px; }
        .erp-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .erp-table th { 
            background: #eef7fb; color: #31708f; padding: 12px 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* ERP Signature Red Border */
            font-size: 12px; text-transform: uppercase;
        }
        .erp-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 13px; color: #333; }
        
        /* No data styling */
        .empty-row { text-align: left; padding-left: 20px !important; color: #666; }
    </style>
</head>
<body>

    <div class="erp-header">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 11px;"> <i class="fa fa-angle-right mx-1"></i> Notice</span>
        </div>
        <a href="#" class="gear-settings"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="page-heading-erp">Contact Group Manager <span>» List</span></h2>
        
        <div class="btn-action-row mt-3">
            <a href="#" class="erp-link-btn btn-blue"><i class="fa fa-list"></i> All Contact Group</a>
            <a href="contact-group-add.html" class="erp-link-btn btn-navy"><i class="fa fa-plus"></i> Add Contact Group</a>
        </div>

        <a href="javascript:void(0);" class="filter-section-btn shadow-sm" onclick="alert('Filter Toggle')">
            <i class="fa fa-angle-double-right"></i> Filter Contact Group <i class="fa fa-filter"></i>
        </a>

        <div class="btn-action-row">
            <a href="#" class="erp-link-btn btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="erp-btn-a erp-link-btn btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="erp-btn-a erp-link-btn btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-container">
            <table class="erp-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="masterCheckbox"></th>
                        <th>TITLE</th>
                        <th>TOTAL CONTACT</th>
                        <th>LAST UPDATED</th>
                        <th style="width: 150px;">STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="empty-row py-3">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox "Select All" functionality
        document.getElementById('masterCheckbox').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            for (let checkbox of checkboxes) {
                checkbox.checked = this.checked;
            }
        }
    </script>

</body>
</html>
