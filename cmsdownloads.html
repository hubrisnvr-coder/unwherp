<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation/Breadcrumb */
        .erp-header-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .breadcrumb-item-custom { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .settings-gear { background: #f0ad4e; color: white; border: none; padding: 5px 10px; border-radius: 4px; text-decoration: none; }

        /* Title Area */
        .manager-title { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; margin-bottom: 0; }
        .manager-title span { color: #999; font-weight: normal; font-size: 15px; }

        /* Buttons Styling (Using Anchor Tags) */
        .btn-group-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .anchor-btn { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; 
        }
        .btn-blue { background-color: #337ab7; }
        .btn-dark-blue { background-color: #286090; }
        .btn-orange { background-color: #f0ad4e; }
        .btn-red { background-color: #d9534f; }

        /* Filter Section */
        .filter-bar-strip { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold;
        }

        /* Table Design - Exact Matching erp28.png */
        .table-wrap { padding: 0 5px; }
        .erp-list-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .erp-list-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Required Red Top Border */
            font-size: 13px; text-transform: uppercase;
        }
        .erp-list-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .no-data-text { color: #333; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div class="erp-header-nav">
        <div>
            <a href="#" class="breadcrumb-item-custom"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Download</span>
        </div>
        <a href="#" class="settings-gear"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-3">
        <h2 class="manager-title">Download Manager <span>» List</span></h2>
        
        <div class="btn-group-row mt-3">
            <a href="#" class="anchor-btn btn-blue"><i class="fa fa-list"></i> All Download</a>
            <a href="cmsaddnewdownloads.html" class="anchor-btn btn-dark-blue"><i class="fa fa-plus"></i> Add Download</a>
        </div>

        <a href="javascript:void(0);" class="filter-bar-strip shadow-sm" onclick="alert('Filter Download Panel Opened!')">
            <i class="fa fa-angle-double-right"></i> Filter Download <i class="fa fa-filter"></i>
        </a>

        <div class="btn-group-row">
            <a href="#" class="anchor-btn btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="anchor-btn btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="anchor-btn btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-wrap">
            <table class="erp-list-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="masterCheck"></th>
                        <th style="width: 50%;">DETAIL</th>
                        <th>STATUS</th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data-text">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Select All Checkboxes Logic
        document.getElementById('masterCheck').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(c => c.checked = this.checked);
        }
    </script>

</body>
</html>
