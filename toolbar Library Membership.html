<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 202 - Members Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-size: 11px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header Section */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .gear-icon { position: absolute; right: 15px; top: 10px; color: #f0ad4e; font-size: 18px; cursor: pointer; }

        /* Multi-level Navigation */
        .nav-wrap { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }

        .btn-erp { font-size: 10px; padding: 4px 10px; border-radius: 4px; border: none; color: #fff !important; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .bg-green { background-color: #5cb85c; }
        .bg-blue { background-color: #337ab7; }
        .bg-orange { background-color: #f0ad4e; }
        .bg-red { background-color: #d9534f; }

        /* Filter Section Styling */
        .filter-wrapper { margin: 15px 20px; }
        .filter-header { color: #337ab7; font-weight: bold; text-align: center; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
        .filter-box { background: #fff; border: 1px solid #c8d9e2; border-radius: 4px; overflow: hidden; }
        
        .f-row { display: flex; border-bottom: 1px solid #eee; }
        .f-group { display: flex; flex: 1; border-right: 1px solid #eee; }
        .f-group:last-child { border-right: none; }
        .f-label { background: #f9f9f9; padding: 10px; font-weight: bold; width: 130px; text-align: right; border-right: 1px solid #eee; text-transform: uppercase; }
        .f-input-area { flex: 1; padding: 5px 10px; display: flex; align-items: center; }
        .f-control { width: 100%; border: 1px solid #ddd; height: 32px; padding: 0 8px; outline: none; border-radius: 2px; }
        .req-border { border-left: 2px solid red !important; }

        /* Action Bar */
        .filter-footer { background: #f5f5f5; padding: 15px; text-align: right; }
        .btn-filter { background: #337ab7; color: white; border: none; padding: 6px 18px; border-radius: 3px; font-weight: bold; }

        /* Status & Table Layer */
        .status-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .table-container { background: #fff; border: 1px solid #ddd; margin: 0 20px 20px 20px; border-radius: 4px; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table th { background: #d9edf7; color: #31708f; border: 1px solid #bce8f1; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; }
        .erp-table td { border: 1px solid #ddd; padding: 12px; text-align: center; color: #666; font-style: italic; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:#337ab7;">Members Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="log('Settings Icon Clicked', 'orange')"></i>
</div>

<div class="nav-wrap">
    <div class="nav-row">
        <button class="btn-erp bg-blue" onclick="log('Nav: Book Detail')"><i class="fa fa-book"></i> Book Detail</button>
        <button class="btn-erp bg-blue" onclick="log('Nav: Issue History')"><i class="fa fa-history"></i> Issue History</button>
        <button class="btn-erp bg-green" onclick="log('Nav: Membership Active')"><i class="fa fa-users"></i> Membership</button>
        <button class="btn-erp bg-blue" onclick="log('Nav: Students Member')"><i class="fa fa-user-graduate"></i> Students Member</button>
        <button class="btn-erp bg-blue" onclick="log('Nav: Staffs Member')"><i class="fa fa-user-tie"></i> Staffs Member</button>
        <button class="btn-erp bg-blue" onclick="log('Nav: Student Request')"><i class="fa fa-user-plus"></i> Student Request</button>
        <button class="btn-erp bg-blue" onclick="log('Nav: Staff Request')"><i class="fa fa-user-tag"></i> Staff Request</button>
        <button class="btn-erp bg-orange" onclick="log('Nav: Return Period Over', 'orange')"><i class="fa fa-clock"></i> Return Period Over</button>
    </div>
    <div class="nav-row">
        <button class="btn-erp bg-green" onclick="log('Sub: Member Detail')"><i class="fa fa-users"></i> Member Detail</button>
        <button class="btn-erp bg-blue" onclick="log('Sub: Add Member')"><i class="fa fa-plus-circle"></i> Add Member</button>
    </div>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-chevron-down"></i> Filter Members <i class="fa fa-filter"></i>
    </div>
    
    <div id="filterContent" class="filter-box">
        <form action="filter_members.php" method="GET" id="memberFilterForm">
            <div class="f-row">
                <div class="f-group">
                    <div class="f-label">MEMBER TYPE</div>
                    <div class="f-input-area">
                        <select name="member_type" class="f-control req-border">
                            <option value="">Select Member Type</option>
                            <option value="student">Student</option>
                            <option value="staff">Staff</option>
                        </select>
                    </div>
                </div>
                <div class="f-group">
                    <div class="f-label">REG NO.</div>
                    <div class="f-input-area">
                        <input type="text" name="reg_no" class="f-control" placeholder="Registration Number">
                    </div>
                </div>
                <div class="f-group">
                    <div class="f-label">STATUS</div>
                    <div class="f-input-area">
                        <select name="status" class="f-control">
                            <option value="">Status</option>
                            <option value="1">Active</option>
                            <option value="0">In-Active</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="filter-footer">
                <button type="submit" class="btn-filter" onclick="log('Filtering Data...', 'navy')">
                    <i class="fa fa-filter"></i> Filter
                </button>
            </div>
        </form>
    </div>
</div>

<div class="status-bar">
    <button class="btn-erp bg-blue" onclick="log('Set Status: Active')"><i class="fa fa-check"></i> Active</button>
    <button class="btn-erp bg-orange" onclick="log('Set Status: In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
    <button class="btn-erp bg-red" onclick="log('Action: Delete', 'red')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div class="table-container">
    <table class="erp-table">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="checkAll"></th>
                <th>S.N.</th>
                <th>USER TYPE</th>
                <th>REG. NO.</th>
                <th>STATUS</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="6">No Members data found. Please Filter Members to show.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    /**
     * Console Logger for ERP Actions
     */
    function log(message, color = "#337ab7") {
        console.log(`%c [ERP-202] %c ${message}`, 
        `color: white; background: ${color}; padding: 2px 8px; border-radius: 3px; font-weight: bold;`, 
        "color: #000; font-weight: 500;");
    }

    /**
     * Toggle Filter Visibility
     */
    function toggleFilter() {
        const filterBox = document.getElementById('filterContent');
        const icon = document.querySelector('.filter-header i.fa-chevron-down, .filter-header i.fa-chevron-up');
        
        if (filterBox.classList.contains('hidden')) {
            filterBox.classList.remove('hidden');
            icon.className = 'fa fa-chevron-down';
            log("Filter Section: Shown", "green");
        } else {
            filterBox.classList.add('hidden');
            icon.className = 'fa fa-chevron-up';
            log("Filter Section: Hidden", "red");
        }
    }

    /**
     * Check All Checkboxes
     */
    document.getElementById('checkAll').onclick = function() {
        log("Select All Toggle Clicked");
    };

    /**
     * Form Submission Handle (PHP Ready)
     */
    document.getElementById('memberFilterForm').onsubmit = function(e) {
        log("Form Submitted to filter_members.php", "purple");
        // e.preventDefault(); // Testing ke liye ise uncomment karein
    };

    window.onload = function() {
        log("ERP 202 Loaded Successfully");
    };
</script>

</body>
</html>
