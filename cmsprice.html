<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Navigation Top Bar */
        .erp-top-nav {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .erp-top-nav a { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .config-gear { background: #f0ad4e; color: white !important; padding: 6px 10px; border-radius: 4px; text-decoration: none; }

        /* Main Page Heading */
        .pricing-header { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 16px; margin-bottom: 0; }
        .pricing-header span { color: #999; font-weight: normal; font-size: 14px; }

        /* Button Container */
        .btn-group-erp { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        
        /* Standard Anchor Buttons */
        .a-btn-erp { 
            text-decoration: none !important; padding: 6px 15px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 7px; transition: 0.2s;
        }
        .btn-blue { background-color: #337ab7; }
        .btn-navy { background-color: #286090; }
        .btn-orange { background-color: #f0ad4e; }
        .btn-red { background-color: #d9534f; }
        .a-btn-erp:hover { opacity: 0.9; }

        /* Filter Section Strip */
        .filter-section { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; 
            color: #337ab7; font-weight: bold; font-size: 15px;
        }

        /* Pricing Table Styling */
        .table-container { padding: 0 5px; }
        .erp-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .erp-table th { 
            background: #eef7fb; color: #31708f; padding: 12px 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* Signature Red Border */
            font-size: 13px; text-transform: uppercase;
        }
        .erp-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }
    </style>
</head>
<body>

    <div class="erp-top-nav">
        <div>
            <a href="#"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Pricing</span>
        </div>
        <a href="#" class="config-gear"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-2">
        <h2 class="pricing-header">Pricing Manager <span>» List</span></h2>
        
        <div class="btn-group-erp mt-3">
            <a href="#" class="a-btn-erp btn-blue"><i class="fa fa-list"></i> All Pricing</a>
            <a href="cmsaddnewprice.html" class="a-btn-erp btn-navy"><i class="fa fa-plus"></i> Add Pricing</a>
        </div>

        <a href="javascript:void(0);" class="filter-section shadow-sm" onclick="alert('Opening Filter...')">
            <i class="fa fa-angle-double-right"></i> Filter Pricing <i class="fa fa-filter"></i>
        </a>

        <div class="btn-group-erp">
            <a href="#" class="a-btn-erp btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="a-btn-erp btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="a-btn-erp btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-container">
            <table class="erp-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 50px;"><input type="checkbox" id="selectAll"></th>
                        <th>TITLE</th>
                        <th>PRICE</th>
                        <th>RANK</th>
                        <th>STATUS</th>
                        <th style="width: 80px;">ACTION</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="text-start ps-3 py-3">No data found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Checkbox toggle script
        document.getElementById('selectAll').onclick = function() {
            let checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(c => c.checked = this.checked);
        }
    </script>

</body>
</html>
