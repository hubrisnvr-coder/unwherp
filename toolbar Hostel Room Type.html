<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 227 - Room Type Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --erp-blue: #337ab7;
            --erp-green: #5cb85c;
            --erp-orange: #f0ad4e;
            --erp-red: #d9534f;
            --erp-bg: #f4f7f6;
            --label-bg: #eeeeee;
            --table-header-bg: #d9edf7;
            --border-color: #ddd;
        }

        body { background-color: var(--erp-bg); font-size: 13px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Top Page Header */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        .gear-icon { position: absolute; right: 20px; top: 12px; color: var(--erp-orange); font-size: 18px; cursor: pointer; }

        /* Top Right Module Navigation */
        .module-nav { background: #fff; padding: 10px; display: flex; justify-content: flex-end; gap: 5px; border-bottom: 1px solid var(--border-color); padding-right: 30px; }
        .btn-mod { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; text-decoration: none; display: flex; align-items: center; gap: 5px; border: none; }
        
        /* Sub Navigation Tabs */
        .sub-nav { background: #fff; padding: 15px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid var(--border-color); }
        .btn-sub { font-size: 13px; padding: 6px 16px; border-radius: 4px; color: #fff !important; border: none; display: flex; align-items: center; gap: 6px; }

        .bg-blue { background-color: var(--erp-blue); }
        .bg-green { background-color: var(--erp-green); }
        .bg-orange { background-color: var(--erp-orange); }
        .bg-red { background-color: var(--erp-red); }

        /* Main Content Layout */
        .content-wrapper { padding: 20px; display: flex; gap: 20px; align-items: flex-start; }
        
        /* Left Side: Create Form */
        .create-section { width: 35%; background: #fff; border: 1px solid var(--border-color); padding: 0; border-radius: 4px; }
        .section-title { color: var(--erp-blue); font-weight: bold; text-align: center; padding: 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        .form-body { padding: 20px; background: #f9f9f9; }
        
        .input-group-erp { display: flex; align-items: stretch; margin-bottom: 20px; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .label-erp { background: var(--label-bg); padding: 10px; font-weight: bold; width: 100px; text-align: center; border-right: 1px solid #ddd; border-left: 1px solid #ff0000; display: flex; align-items: center; justify-content: center; }
        .input-erp { flex-grow: 1; border: none; padding: 10px; outline: none; }

        .btn-create { background: var(--erp-blue); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; float: right; display: flex; align-items: center; gap: 8px; margin-top: 10px; }

        /* Right Side: Table List */
        .list-section { width: 65%; }
        .action-bar { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-action { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; border: none; }

        .table-container { background: #fff; border: 1px solid var(--border-color); overflow: hidden; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead tr { border-bottom: 2px solid #ff0000; }
        .erp-table th { background: var(--table-header-bg); color: #31708f; padding: 12px; text-align: center; border: 1px solid #bce8f1; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .erp-table td { padding: 12px; border: 1px solid #eee; text-align: center; color: #555; }

        .hidden { display: none; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:var(--erp-blue);">Room Type Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="erpAction('Global Settings Clicked')"></i>
</div>

<div class="module-nav">
    <button class="btn-mod bg-blue" onclick="erpAction('Resident Module')"><i class="fa fa-users"></i> Resident</button>
    <button class="btn-mod bg-green" onclick="erpAction('Hostel Module')"><i class="fa fa-bed"></i> Hostel</button>
    <button class="btn-mod bg-blue" onclick="erpAction('Food & Meal Module')"><i class="fa fa-utensils"></i> Food & Meal</button>
</div>

<div class="sub-nav">
    <button class="btn-sub bg-blue" onclick="erpAction('Navigating to Detail')"><i class="fa fa-list"></i> Detail</button>
    <button class="btn-sub bg-blue" onclick="erpAction('Navigating to Add Hostel')"><i class="fa fa-plus"></i> Add Hostel</button>
    <button class="btn-sub bg-green" onclick="toggleFilter()"><i class="fa fa-th-list"></i> RoomType</button>
    <button class="btn-sub bg-blue" onclick="erpAction('Navigating to Bed Status')"><i class="fa fa-bed"></i> Bed Status</button>
</div>

<div class="content-wrapper">
    
    <div class="create-section" id="createFilterPanel">
        <div class="section-title"><i class="fa fa-search"></i> Create Room Type</div>
        <div class="form-body">
            <form id="roomTypeForm" action="save_room_type.php" method="POST">
                <div class="input-group-erp">
                    <div class="label-erp">ROOM TYPE</div>
                    <input type="text" name="room_type_name" class="input-erp" placeholder="">
                </div>
                <div class="clearfix">
                    <button type="submit" class="btn-create" onclick="erpAction('Creating Room Type...')">
                        <i class="fa fa-save"></i> Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="list-section">
        <div class="action-bar">
            <button class="btn-action bg-blue" onclick="erpAction('Bulk Action: Active')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-action bg-orange" onclick="erpAction('Bulk Action: In-Active')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-action bg-red" onclick="erpAction('Bulk Action: Delete')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <div class="table-container">
            <table class="erp-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" onclick="erpAction('Select All Toggle')"></th>
                        <th style="width: 80px;">S.N.</th>
                        <th>ROOM TYPE</th>
                        <th>STATUS</th>
                        <th style="width: 60px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="padding: 30px; color: #999; font-style: italic;">
                            No Room Type data found. Please Filter Room Type to show.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    /**
     * Hide/Show Filter (Left Panel) Logic
     * Jaisa aapne request kiya tha: Filter button par hide/show rakhna.
     */
    function toggleFilter() {
        const panel = document.getElementById('createFilterPanel');
        if (panel.style.display === "none") {
            panel.style.display = "block";
            erpAction("Room Type Panel Shown");
        } else {
            panel.style.display = "none";
            erpAction("Room Type Panel Hidden");
        }
    }

    /**
     * Professional Console Logger
     */
    function erpAction(message) {
        const time = new Date().toLocaleTimeString();
        console.log(
            `%c [ERP-227] %c ${time} %c ${message}`, 
            "color: white; background: #337ab7; padding: 2px 8px; border-radius: 3px; font-weight: bold;", 
            "color: #888;",
            "color: #000; font-weight: 500;"
        );
    }

    // Initialize Page
    window.onload = function() {
        erpAction("Room Type Manager Page Loaded");
    };
</script>

</body>
</html>
