<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 229 - Eating Time Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --erp-blue: #337ab7;
            --erp-green: #5cb85c;
            --erp-orange: #f0ad4e;
            --erp-red: #d9534f;
            --erp-bg: #f4f7f6;
            --label-bg: #eeeeee;
            --table-header-bg: #d9edf7;
            --border-color: #ddd;
        }

        body { 
            background-color: var(--erp-bg); 
            font-size: 13px; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #333; 
        }

        /* Page Header */
        .page-header { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        .gear-icon { position: absolute; right: 20px; top: 12px; color: var(--erp-orange); font-size: 18px; cursor: pointer; }

        /* Top Right Module Navigation */
        .module-nav { background: #fff; padding: 10px; display: flex; justify-content: flex-end; gap: 5px; border-bottom: 1px solid var(--border-color); padding-right: 30px; }
        .btn-mod { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; text-decoration: none; display: flex; align-items: center; gap: 5px; border: none; }

        /* Navigation Tabs (Center) */
        .sub-nav { background: #fff; padding: 15px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid var(--border-color); }
        .btn-sub { font-size: 13px; padding: 6px 16px; border-radius: 4px; color: #fff !important; border: none; display: flex; align-items: center; gap: 6px; }

        .bg-blue { background-color: var(--erp-blue); }
        .bg-green { background-color: var(--erp-green); }
        .bg-orange { background-color: var(--erp-orange); }
        .bg-red { background-color: var(--erp-red); }

        /* Content Layout */
        .main-content { padding: 20px; display: flex; gap: 20px; }
        
        /* Left: Create Form Section */
        .form-section { width: 35%; background: #fff; border: 1px solid var(--border-color); border-radius: 4px; }
        .form-title { color: var(--erp-blue); font-weight: bold; text-align: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; }
        .form-body { padding: 20px; background: #f9f9f9; }

        .erp-input-group { display: flex; align-items: stretch; margin-bottom: 15px; border: 1px solid #ccc; border-left: 3px solid #ff0000; }
        .erp-label { background: var(--label-bg); padding: 10px; font-weight: bold; width: 100px; text-align: center; border-right: 1px solid #ccc; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .erp-input { flex-grow: 1; border: none; padding: 10px; outline: none; }

        .btn-submit-container { padding: 15px; background: #eee; border-top: 1px solid #ddd; }
        .btn-create { background: var(--erp-blue); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; float: right; display: flex; align-items: center; gap: 8px; }

        /* Right: Table List Section */
        .list-section { width: 65%; }
        .action-bar { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-action { font-size: 12px; padding: 4px 12px; border-radius: 4px; color: #fff !important; border: none; }

        .table-container { background: #fff; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead tr { border-bottom: 2px solid #ff0000; }
        .erp-table th { background: var(--table-header-bg); color: #31708f; padding: 10px; text-align: center; border: 1px solid #bce8f1; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .erp-table td { padding: 15px; border: 1px solid #eee; text-align: center; color: #888; font-style: italic; }

        .clearfix::after { content: ""; clear: both; display: table; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="page-header">
    <strong style="color:var(--erp-blue);">Eating Time Manager</strong> <span style="color:#999;">» Detail</span>
    <i class="fa fa-cog gear-icon" onclick="erpLog('Global Settings Clicked')"></i>
</div>

<div class="module-nav">
    <button class="btn-mod bg-blue" onclick="erpLog('Resident Module Selected')"><i class="fa fa-users"></i> Resident</button>
    <button class="btn-mod bg-blue" onclick="erpLog('Hostel Module Selected')"><i class="fa fa-bed"></i> Hostel</button>
    <button class="btn-mod bg-green" onclick="erpLog('Food & Meal Module Active')"><i class="fa fa-utensils"></i> Food & Meal</button>
</div>

<div class="sub-nav">
    <button class="btn-sub bg-blue" onclick="erpLog('Navigating to Food & Meal')"><i class="fa fa-utensils"></i> Food & Meal</button>
    <button class="btn-sub bg-green" onclick="toggleFormPanel()"><i class="fa fa-history"></i> Eating Time</button>
    <button class="btn-sub bg-blue" onclick="erpLog('Navigating to Food Category')"><i class="fa fa-list"></i> Food Category</button>
    <button class="btn-sub bg-blue" onclick="erpLog('Navigating to Food Item')"><i class="fa fa-hamburger"></i> Food Item</button>
</div>

<div class="main-content">
    
    <div class="form-section" id="eatingTimePanel">
        <div class="form-title"><i class="fa fa-search"></i> Create Eating Time</div>
        <div class="form-body">
            <form id="eatingTimeForm" method="POST" action="save_eating_time.php">
                <div class="erp-input-group">
                    <div class="erp-label">TITLE</div>
                    <input type="text" name="eating_title" class="erp-input" placeholder="">
                </div>
                <div class="erp-input-group">
                    <div class="erp-label">TIME</div>
                    <input type="text" name="eating_time_val" class="erp-input" value="1:12:00">
                </div>
                <div class="btn-submit-container clearfix">
                    <button type="submit" class="btn-create" onclick="erpLog('Submitting New Eating Time Data')">
                        <i class="fa fa-save"></i> Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="list-section">
        <div class="action-bar">
            <button class="btn-action bg-blue" onclick="erpLog('Action: Set Active')"><i class="fa fa-check"></i> Active</button>
            <button class="btn-action bg-orange" onclick="erpLog('Action: Set In-Active')"><i class="fa fa-times"></i> In-Active</button>
            <button class="btn-action bg-red" onclick="erpLog('Action: Bulk Delete')"><i class="fa fa-trash"></i> Delete</button>
        </div>

        <div class="table-container">
            <table class="erp-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" onclick="erpLog('Select All Rows Toggle')"></th>
                        <th style="width: 60px;">S.N.</th>
                        <th>EATING TIME</th>
                        <th>TIME</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5">No Eating Time data found. Please Filter Eating Time to show.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    /**
     * Panel Toggle Function (Jaisa aapne request kiya tha)
     * "Eating Time" button par click karne se form hide/show hoga.
     */
    function toggleFormPanel() {
        const panel = document.getElementById('eatingTimePanel');
        if (panel.style.display === "none") {
            panel.style.display = "block";
            erpLog("Create Eating Time Panel: SHOWN");
        } else {
            panel.style.display = "none";
            erpLog("Create Eating Time Panel: HIDDEN");
        }
    }

    /**
     * Professional Console Logging System
     */
    function erpLog(msg) {
        const now = new Date();
        const timestamp = now.toLocaleTimeString();
        console.log(`%c[ERP-229]%c ${timestamp} - %c${msg}`, 
            "color: white; background: #337ab7; padding: 2px 5px; border-radius: 3px;", 
            "color: #888;", 
            "color: #333; font-weight: bold;");
    }

    // Page Load Alert
    window.onload = function() {
        erpLog("Eating Time Manager Detail Page Loaded Successfully");
    };
</script>

</body>
</html>
