<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Designation Manager - Detail</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .manager-container { background: #fff; border: 1px solid #ddd; padding: 15px; }

        /* Title */
        .page-title { text-align: center; color: #337ab7; font-size: 18px; margin-bottom: 20px; font-weight: bold; }
        .page-title span { color: #999; font-weight: normal; }

        /* Top Navigation */
        .nav-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin-bottom: 25px; }
        .btn-nav { text-decoration: none !important; color: #fff !important; padding: 7px 14px; font-size: 13px; border-radius: 4px; display: inline-flex; align-items: center; gap: 7px; border: none; }
        .btn-blue { background: #337ab7; }
        .btn-green { background: #5cb85c; } /* Designation active color */

        /* Layout (Left Form, Right Table) */
        .main-content { display: flex; gap: 20px; margin-top: 20px; }
        .left-form { flex: 0 0 350px; }
        .right-table { flex: 1; }

        /* Form Styling */
        .form-header { color: #337ab7; font-weight: bold; margin-bottom: 15px; font-size: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-row { display: flex; align-items: stretch; margin-bottom: 12px; border: 1px solid #ddd; }
        .label-box { background: #eee; min-width: 100px; padding: 8px; font-size: 12px; font-weight: bold; text-align: right; border-right: 1px solid #ddd; display: flex; align-items: center; justify-content: flex-end; }
        .input-box { flex: 1; border: none; padding: 8px; outline: none; font-size: 13px; border-left: 3px solid red; } 

        /* Button Styling */
        .btn-create { background: #337ab7; color: white !important; padding: 10px 25px; text-decoration: none !important; display: inline-flex; align-items: center; gap: 8px; border-radius: 2px; font-size: 14px; cursor: pointer; }
        .action-bar { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-action { padding: 4px 10px; font-size: 12px; color: white !important; text-decoration: none !important; border-radius: 3px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        
        .bg-active { background: #337ab7; }
        .bg-inactive { background: #f0ad4e; }
        .bg-delete { background: #d9534f; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #ddd; }
        th { background: #f5fafd; color: #337ab7; padding: 10px; text-align: left; border: 1px solid #ddd; text-transform: uppercase; }
        td { padding: 12px 10px; border: 1px solid #ddd; }
        .no-data-msg { text-align: center; color: #666; padding: 30px; border-top: 2px solid red; }
    </style>
</head>
<body class="notranslate"> <div class="manager-container">
    <div class="page-title">Designation Manager <span>» Detail</span></div>

    <div class="nav-group">
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Staff Detail')"><i class="fa fa-list"></i> Staff Detail</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Registration')"><i class="fa fa-plus"></i> Registration</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Bulk Registration')"><i class="fa fa-upload"></i> Bulk Registration</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Documents')"><i class="fa fa-file-text"></i> Documents</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Notes')"><i class="fa fa-sticky-note"></i> Notes</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Payroll')"><i class="fa fa-calculator"></i> Payroll</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Library')"><i class="fa fa-book"></i> Library</a>
        <a href="#" class="btn-nav btn-blue" onclick="appAction('Attendance')"><i class="fa fa-calendar-check-o"></i> Attendance</a>
        <a href="#" class="btn-nav btn-green" onclick="appAction('Designation')"><i class="fa fa-star"></i> Designation</a>
    </div>

    <div class="main-content">
        <div class="left-form">
            <div class="form-header"><i class="fa fa-search"></i> Create Designation</div>
            <div class="input-row">
                <div class="label-box">DESIGNATION</div>
                <input type="text" class="input-box" id="designation_name">
            </div>
            <div style="text-align: right; background: #f5f5f5; padding: 20px; border: 1px solid #ddd; border-top: none;">
                <a href="#" class="btn-create" onclick="appAction('Create Designation Submit')">
                    <i class="fa fa-save"></i> Create
                </a>
            </div>
        </div>

        <div class="right-table">
            <div class="action-bar">
                <a href="#" class="btn-action bg-active" onclick="appAction('Set Active')"><i class="fa fa-check"></i> Active</a>
                <a href="#" class="btn-action bg-inactive" onclick="appAction('Set In-Active')"><i class="fa fa-times"></i> In-Active</a>
                <a href="#" class="btn-action bg-delete" onclick="appAction('Delete Selected')"><i class="fa fa-trash"></i> Delete</a>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 25px;"><input type="checkbox"></th>
                        <th>S.N.</th>
                        <th>DESIGNATION</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data-msg">No Designation data found. Please Filter Designation to show.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function appAction(name) {
        console.log("Action: " + name);
        alert("Working: " + name);
    }
    document.querySelectorAll('a').forEach(anchor => {
        anchor.addEventListener('click', function(e) { e.preventDefault(); });
    });
</script>

</body>
</html>
