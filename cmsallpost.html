<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Manager - List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Top Navigation / Breadcrumb */
        .top-nav-header {
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
        }
        .breadcrumb-text { text-decoration: none; color: #337ab7; font-size: 13px; font-weight: 500; }
        .breadcrumb-text i { margin-right: 5px; }
        .cog-settings { background: #f0ad4e; color: white; border: none; padding: 5px 10px; border-radius: 4px; text-decoration: none; }

        /* Page Title */
        .page-title-main { text-align: center; color: #337ab7; font-weight: bold; padding: 15px; font-size: 18px; margin-bottom: 0; }
        .page-title-main span { color: #999; font-weight: normal; font-size: 15px; }

        /* Button Groups (All Anchor Tags) */
        .btn-wrapper { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .a-btn-custom { 
            text-decoration: none !important; padding: 6px 14px; font-size: 13px; color: white !important; 
            border-radius: 3px; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s;
        }
        .btn-blue { background-color: #337ab7; }
        .btn-dark-blue { background-color: #286090; }
        .btn-orange { background-color: #f0ad4e; }
        .btn-red { background-color: #d9534f; }
        .a-btn-custom:hover { opacity: 0.85; transform: translateY(-1px); }

        /* Filter Box */
        .filter-post-bar { 
            border: 1px solid #ddd; background: #fff; padding: 12px; 
            text-align: center; margin: 15px 0; border-radius: 2px;
            cursor: pointer; display: block; text-decoration: none; color: #337ab7; font-weight: bold;
        }

        /* Table Design - Exact erp18.png Style */
        .table-container { padding: 0 5px; }
        .post-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; }
        .post-table th { 
            background: #d9edf7; color: #31708f; padding: 10px; 
            border: 1px solid #bce8f1; text-align: center; 
            border-top: 2px solid #d9534f; /* The distinct red border */
            font-size: 13px; text-transform: uppercase;
        }
        .post-table td { border: 1px solid #ddd; padding: 15px 10px; font-size: 14px; color: #333; }

        .no-data-found { color: #333; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-nav-header">
        <div>
            <a href="#" class="breadcrumb-text"><i class="fa fa-home"></i> Home</a> 
            <span class="text-muted" style="font-size: 12px;"> <i class="fa fa-angle-right mx-1"></i> Post</span>
        </div>
        <a href="#" class="cog-settings"><i class="fa fa-cog"></i></a>
    </div>

    <div class="container-fluid mt-3">
        <h2 class="page-title-main">Post Manager <span>» List</span></h2>
        
        <div class="btn-wrapper mt-3">
            <a href="#" class="a-btn-custom btn-blue"><i class="fa fa-list"></i> All Post</a>
            <a href="cmsaddpost.html" class="a-btn-custom btn-dark-blue"><i class="fa fa-plus"></i> Add Post</a>
        </div>

        <a href="javascript:void(0);" class="filter-post-bar shadow-sm" onclick="toggleFilter()">
            <i class="fa fa-angle-double-right"></i> Filter Post <i class="fa fa-filter"></i>
        </a>

        <div class="btn-wrapper">
            <a href="#" class="a-btn-custom btn-blue"><i class="fa fa-check"></i> Active</a>
            <a href="#" class="a-btn-custom btn-orange"><i class="fa fa-times"></i> In-Active</a>
            <a href="#" class="a-btn-custom btn-red"><i class="fa fa-trash"></i> Delete</a>
        </div>

        <div class="table-container">
            <table class="post-table shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 60px;"><input type="checkbox" id="selectAll"></th>
                        <th>TITLE</th>
                        <th style="width: 30%;">STATUS</th>
                        <th style="width: 8%;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data-found text-start">No data fount.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function toggleFilter() {
            alert("Filter options will open here!");
        }

        // Checkbox select all logic
        document.getElementById('selectAll').onclick = function() {
            var checkboxes = document.querySelectorAll('input[type="checkbox"]');
            for (var checkbox of checkboxes) {
                checkbox.checked = this.checked;
            }
        }
    </script>

</body>
</html>
