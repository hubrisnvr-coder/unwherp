<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 182 - Monthly Calendar Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Styling */
        body { background-color: #f4f7f6; font-size: 14px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        /* Header & Gear Icon */
        .page-header-main { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #ddd; position: relative; }
        .settings-gear { 
            position: absolute; right: 20px; top: 10px; color: #f0ad4e; font-size: 22px; cursor: pointer; 
            border: 1px solid #f0ad4e; border-radius: 4px; padding: 4px 10px; background: #fff8ee; 
        }

        /* Top Navigation Tabs */
        .nav-container { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: flex-end; gap: 5px; }
        .erp-btn {
            font-size: 13px; padding: 7px 16px; border-radius: 4px; color: #fff !important; 
            border: none; cursor: pointer; text-decoration: none !important; font-weight: 600; transition: 0.3s;
        }
        .bg-blue { background-color: #337ab7; }
        .bg-green { background-color: #449d44; }

        /* Action Buttons (List / Add) */
        .action-nav { padding: 15px; display: flex; gap: 5px; }

        /* Filter Section Styling */
        .filter-wrapper { margin: 0 15px 15px 15px; border: 1px solid #c8d9e2; border-radius: 4px; background: #fff; }
        .filter-header { 
            background: #fff; padding: 10px; text-align: center; color: #337ab7; 
            cursor: pointer; font-weight: bold; font-size: 16px; border-bottom: 1px solid #eee;
        }
        .filter-content { display: block; padding: 25px; background: #fdfdfd; }
        
        .f-label { background: #eee; border: 1px solid #ddd; padding: 8px; font-weight: bold; text-align: right; width: 160px; text-transform: uppercase; font-size: 13px; }
        .f-input-box { border: 1px solid #ddd; height: 38px; font-size: 14px; width: 100%; padding: 0 10px; outline: none; }
        .f-input-box:focus { border-color: #337ab7; }

        /* Table Styling */
        .table-container { background: #fff; margin: 0 15px; border: 1px solid #ddd; }
        .erp-table { width: 100%; border-collapse: collapse; }
        .erp-table thead th { 
            background-color: #eef5f9; color: #337ab7; border: 1px solid #dee2e6; 
            padding: 12px 6px; text-align: center; font-size: 13px;
        }
        .erp-table tbody td { border: 1px solid #dee2e6; padding: 12px; text-align: center; color: #555; }
        
        /* Red Line Indicator */
        .red-line-top { border-top: 3px solid red !important; }

        /* Status Buttons */
        .status-bar { text-align: center; margin-bottom: 10px; }
        .btn-status { font-size: 12px; padding: 5px 15px; color: #fff; border-radius: 4px; margin: 0 2px; border: none; font-weight: bold; }
        
        .btn-filter-submit { background-color: #1a4d80; color: white; border: none; padding: 10px 30px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="page-header-main">
    <strong style="color:#337ab7; font-size: 18px;">Monthly Calendar Manager</strong> <span style="color:#999;">» Detail</span>
    <div class="settings-gear" onclick="btnLog('Settings Clicked', 'orange')"><i class="fa fa-cog"></i></div>
</div>

<div class="nav-container">
    <button class="erp-btn bg-blue" onclick="btnLog('Student Regular Attendance', 'blue')"><i class="fa fa-calendar-alt"></i> Student Regular Attendance</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Student Subject Wise Attendance', 'blue')"><i class="fa fa-book"></i> Student Subject Wise Attendance</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Staff Attendance', 'blue')"><i class="fa fa-user-tie"></i> Staff Attendance</button>
</div>

<div class="action-nav">
    <button class="erp-btn bg-green" onclick="btnLog('List View Clicked', 'green')"><i class="fa fa-list"></i> List</button>
    <button class="erp-btn bg-blue" onclick="btnLog('Add New Calendar Clicked', 'blue')"><i class="fa fa-plus-circle"></i> Add</button>
</div>

<div class="filter-wrapper">
    <div class="filter-header" onclick="toggleFilter()">
        <i class="fa fa-search me-2"></i> Search Attendance 
    </div>
    <div class="filter-content" id="filterBox">
        <form id="calendarForm" action="calendar_process.php" method="POST">
            <div class="row g-0 align-items-center">
                <div class="col-md-6 d-flex">
                    <div class="f-label">YEAR</div>
                    <select name="year" class="f-input-box">
                        <option value="">Select Year</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
                <div class="col-md-5 d-flex">
                    <div class="f-label">MONTH</div>
                    <select name="month" class="f-input-box">
                        <option value="">Select Month</option>
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                    </select>
                </div>
                <div class="col-md-1 text-end">
                    <button type="submit" class="btn-filter-submit" onclick="btnLog('Filter Executed', 'navy')">
                        <i class="fa fa-filter"></i> Filter
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="status-bar">
    <button class="btn-status bg-primary" onclick="btnLog('Bulk Active', 'blue')"><i class="fa fa-check"></i> Active</button>
    <button class="btn-status" style="background:#f0ad4e;" onclick="btnLog('Bulk In-Active', 'orange')"><i class="fa fa-times"></i> In-Active</button>
    <button class="btn-status" style="background:#d9534f;" onclick="btnLog('Bulk Delete', 'red')"><i class="fa fa-trash"></i> Delete</button>
</div>

<div class="table-container">
    <table class="erp-table">
        <thead>
            <tr class="red-line-top">
                <th width="40"><input type="checkbox" onclick="btnLog('Select All Toggled', 'black')"></th>
                <th width="60">S.N.</th>
                <th>YEAR</th>
                <th>MONTH</th>
                <th>DAY IN MONTH</th>
                <th>HOLIDAY</th>
                <th>OPEN DAY</th>
                <th>STATUS</th>
                <th width="100"></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="9" style="padding:40px; color:#999; font-style: italic;">
                    No Monthly Calendar data found. Please Filter Monthly Calendar to show.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Console Logging Function
    function btnLog(msg, color) {
        console.log(`%c [ERP-182 LOG] %c ${msg}`, 
        `color: white; background: ${color}; padding: 3px 8px; border-radius: 4px; font-weight: bold;`, 
        "color: #000; font-weight: 500;");
    }

    // 2. Filter Hide/Show Toggle
    function toggleFilter() {
        const box = document.getElementById('filterBox');
        if (box.style.display === "none") {
            box.style.display = "block";
            btnLog("Search Section Shown", "#1a4d80");
        } else {
            box.style.display = "none";
            btnLog("Search Section Hidden", "#1a4d80");
        }
    }

    // 3. PHP Ready Form Submission
    document.getElementById('calendarForm').onsubmit = function(e) {
        e.preventDefault();
        btnLog("Form submitted to calendar_process.php", "purple");
        alert("Filtering data for selected Year/Month...");
    };

    // Initial Load
    window.onload = function() {
        btnLog("Monthly Calendar Manager Page Loaded", "black");
    };
</script>

</body>
</html>
